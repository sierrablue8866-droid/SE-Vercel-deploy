<!-- @dsCard group="Type" viewport="700x210" name="Display — Cormorant Garamond" subtitle="Editorial serif, set light & large for quiet luxury" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 26px 28px; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--tx-m); width: 90px; flex-shrink: 0; letter-spacing: .04em; }
</style>
</head>
<body>
  <div class="stack">
    <div class="line"><span class="tag">display-xl</span><span class="sb-display" style="font-size:52px">Find Your <span class="gold-static">Dream Home</span></span></div>
    <div class="line"><span class="tag">display-l</span><span class="sb-display-l" style="font-size:34px">Intelligence-led advisory</span></div>
    <div class="line"><span class="tag">h1 / italic</span><span class="sb-h1"><em style="font-weight:500">Curated in New Cairo</em></span></div>
    <div class="line"><span class="tag">h2</span><span class="sb-h2">Twelve compounds, one lens</span></div>
  </div>
</body>
</html>
