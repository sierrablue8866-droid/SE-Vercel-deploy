<!-- @dsCard group="Colors" viewport="700x172" name="Dark Theme Surfaces" subtitle="The signature deep-navy surface stack (default theme)" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px 24px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { flex: 1; min-width: 96px; border-radius: var(--radius-md); overflow: hidden; border: var(--border-hair); }
  .chip { height: 56px; }
  .meta { padding: 8px 10px; background: var(--bg-e); }
  .name { font-family: var(--font-ui); font-weight: 600; font-size: 11px; color: var(--tx-s); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--tx-m); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="meta"><div class="name">bg</div><div class="hex">#0B1A2E</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-d)"></div><div class="meta"><div class="name">bg-d</div><div class="hex">#081526</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-e)"></div><div class="meta"><div class="name">bg-e</div><div class="hex">#102238</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-e2)"></div><div class="meta"><div class="name">bg-e2</div><div class="hex">#152C48</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surf); backdrop-filter:blur(2px)"></div><div class="meta"><div class="name">surf</div><div class="hex">wht .065</div></div></div>
  </div>
</body>
</html>
