<!DOCTYPE html>
<html data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px 24px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { flex: 1; min-width: 96px; border-radius: var(--radius-md); overflow: hidden; border: var(--border-hair); }
  .chip { height: 56px; }
  .meta { padding: 8px 10px; background: var(--bg-e); }
  .name { font-family: var(--font-ui); font-weight: 600; font-size: 11px; color: var(--tx-s); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--tx-m); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="meta"><div class="name">bg</div><div class="hex">#F7F4EC</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-d)"></div><div class="meta"><div class="name">bg-d</div><div class="hex">#EFE9DC</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-e)"></div><div class="meta"><div class="name">bg-e</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--tx)"></div><div class="meta"><div class="name">text</div><div class="hex">#0D2035</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold)"></div><div class="meta"><div class="name">gold</div><div class="hex">#C8961A</div></div></div>
  </div>
</body>
</html>
