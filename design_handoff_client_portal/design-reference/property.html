<!-- @dsCard group="Web App" viewport="1440x1024" name="Portal · Property Detail" subtitle="Listing page — gallery, specs, AI score, agent sidebar, mini-map, similar homes" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sierra Estates · Property</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>
<script src="data.js"></script>
<script src="shared.js"></script>
<style>
.p-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:26px;flex-wrap:wrap;}
.p-head .ptype{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--pri);font-weight:600;margin-bottom:8px;}
[dir="rtl"] .p-head .ptype{letter-spacing:.03em;font-family:var(--font);}
.p-head h1{font-size:34px;letter-spacing:-.02em;}
.p-head .addr{display:flex;align-items:center;gap:7px;margin-top:8px;font-size:14.5px;}
.p-head .addr .i{color:var(--muted);width:16px;height:16px;}
.p-head .price{font-family:var(--mono);font-weight:700;font-size:32px;color:var(--ink);text-align:end;white-space:nowrap;}
.p-head .price small{display:block;font-size:12px;color:var(--muted);font-weight:400;margin-top:4px;letter-spacing:.08em;text-transform:uppercase;}
/* gallery */
.gallery{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:220px 220px;gap:12px;margin-bottom:44px;}
.gallery .g{border-radius:var(--r-card);overflow:hidden;position:relative;cursor:pointer;}
.gallery .g:first-child{grid-row:1/3;}
.gallery .g img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--silk);}
.gallery .g:hover img{transform:scale(1.05);}
.gallery .g .more{position:absolute;inset:0;background:rgba(0,25,45,.6);display:grid;place-items:center;color:#fff;font-weight:700;font-size:16px;z-index:2;}
/* layout */
.p-cols{display:grid;grid-template-columns:1fr 350px;gap:36px;align-items:start;}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);padding:28px;margin-bottom:24px;}
.panel h3{font-size:19px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.panel h3 .i{color:var(--pri);}
.spec-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.spec{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:16px;text-align:center;}
.spec .i{width:20px;height:20px;color:var(--pri);}
.spec b{display:block;font-size:17px;color:var(--ink);margin-top:6px;}
.spec span{font-size:11px;color:var(--muted);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;}
.desc{font-size:15px;line-height:1.8;}
.feats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.feats span{display:inline-flex;gap:9px;align-items:center;font-size:13.5px;color:var(--text);}
.feats .i{width:16px;height:16px;color:var(--green);}
#mini-map{height:300px;border-radius:10px;z-index:1;background:var(--bg);}
/* agent card */
.agent-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);padding:26px;position:sticky;top:100px;}
.agent-card .a-top{display:flex;gap:14px;align-items:center;margin-bottom:18px;}
.agent-card img{width:62px;height:62px;border-radius:14px;object-fit:cover;}
.agent-card .a-role{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--pri);margin-bottom:3px;}
[dir="rtl"] .agent-card .a-role{letter-spacing:.02em;font-family:var(--font);}
.agent-card h4{font-size:17px;}
.agent-card .a-sub{font-size:12.5px;color:var(--muted);}
.agent-card .btn{width:100%;margin-bottom:10px;}
.btn-wa{background:#1fae54;color:#fff;}
.btn-wa:hover{background:#199247;}
.ai-banner{margin-top:18px;border:1px dashed var(--line-2);border-radius:10px;padding:14px;display:flex;gap:12px;align-items:center;font-size:12.5px;color:var(--text);}
.ai-banner b{color:var(--pri);font-family:var(--mono);font-size:18px;}
@media(max-width:1080px){.p-cols{grid-template-columns:1fr;}.gallery{grid-template-columns:1fr 1fr;grid-template-rows:200px 200px;}.gallery .g:first-child{grid-column:1/3;grid-row:1;}}
@media(max-width:680px){.spec-row,.feats{grid-template-columns:repeat(2,1fr);}.p-head .price{text-align:start;}}
</style>
</head>
<body>

<div id="site-chrome"></div>

<header class="page-hero" style="padding:40px 0 44px;" data-screen-label="Property breadcrumb">
  <div class="wrap">
    <div class="crumbs"><a href="index.html" data-i18n="crumbHome"></a><span class="sep">/</span><a href="properties.html" data-i18n="navProps"></a><span class="sep">/</span><span id="crumb-code"></span></div>
  </div>
</header>

<section class="block" style="padding-top:44px;" data-screen-label="Property detail">
  <div class="wrap">

    <div class="p-head rv">
      <div>
        <div class="ptype" id="p-type"></div>
        <h1 id="p-title"></h1>
        <div class="addr"><i data-lucide="map-pin" class="i"></i> <span id="p-addr"></span></div>
      </div>
      <div class="price"><span id="p-price"></span><small id="p-mode"></small></div>
    </div>

    <div class="gallery rv" id="p-gallery"></div>

    <div class="p-cols">
      <div>
        <div class="panel rv">
          <h3><i data-lucide="layout-dashboard" class="i"></i> <span data-i18n="overview"></span></h3>
          <div class="spec-row" id="p-specs"></div>
          <p class="desc" id="p-desc" style="margin-top:20px;"></p>
        </div>
        <div class="panel rv">
          <h3><i data-lucide="list-checks" class="i"></i> Amenities</h3>
          <div class="feats" id="p-feats"></div>
        </div>
        <div class="panel rv">
          <h3><i data-lucide="map" class="i"></i> <span data-i18n="location"></span></h3>
          <div id="mini-map"></div>
        </div>
      </div>

      <aside>
        <div class="agent-card rv d1">
          <div class="a-top">
            <img id="a-img" src="" alt="Listing advisor" loading="lazy"/>
            <div>
              <div class="a-role" data-i18n="advisor"></div>
              <h4 id="a-name"></h4>
              <div class="a-sub">Sierra Estates · New Cairo</div>
            </div>
          </div>
          <button class="btn btn-pri" type="button"><i data-lucide="calendar" class="i"></i> <span data-i18n="schedule"></span></button>
          <button class="btn btn-wa" type="button"><i data-lucide="message-circle" class="i"></i> <span data-i18n="wa"></span></button>
          <button class="btn btn-ghost" type="button"><i data-lucide="phone" class="i"></i> <span data-i18n="call"></span></button>
          <div class="ai-banner"><b id="a-ai"></b><span>Sierra AI score — benchmarked against 25 New Cairo compounds in real time.</span></div>
        </div>
      </aside>
    </div>

    <div class="sec-head rv" style="margin-top:56px;">
      <div>
        <div class="eyebrow" data-i18n="eyeList"></div>
        <h2 data-i18n="similar"></h2>
      </div>
      <a href="properties.html" class="sec-link"><span data-i18n="viewAll"></span> <i data-lucide="arrow-right" class="i" style="width:16px;height:16px"></i></a>
    </div>
    <div class="grid-props" id="sim-grid"></div>

  </div>
</section>

<footer id="site-footer"></footer>

<script>
(function () {
  'use strict';
  var D = window.HZDATA;
  var params = new URLSearchParams(location.search);
  var p;
  var cpdName = params.get('cpd'), uCode = params.get('u');
  if (cpdName && uCode) {
    var uc = D.compounds.find(function (c) { return c.n === cpdName; });
    var u = uc && D.unitsFor(uc.n).find(function (x) { return x.code === uCode; });
    if (u) {
      p = { id: -1, code: u.code, cmp: uc.n.replace(/\s*\(.*\)/, ''), zone: uc.z, type: u.type, beds: u.beds, bath: u.bath, area: u.area, egpM: u.egpM, usd: u.usd, ai: u.ai, mode: u.mode, agent: u.agent, ago: 'Live inventory', img: u.img };
    }
  }
  if (!p) {
    var id = parseInt(params.get('id') || '1', 10);
    p = D.listings.find(function (x) { return x.id === id; }) || D.listings[0];
  }
  var isAr = (localStorage.getItem('hzp-lang') || 'en') === 'ar';

  document.title = 'Sierra Estates · ' + p.type + ' in ' + p.cmp;
  document.getElementById('crumb-code').textContent = p.code;
  document.getElementById('p-type').textContent = p.code + ' · ' + p.type;
  document.getElementById('p-title').textContent = p.type + ' in ' + p.cmp;
  document.getElementById('p-addr').textContent = p.cmp + ', ' + p.zone + ', New Cairo';
  document.getElementById('p-price').textContent = D.price(p);
  document.getElementById('a-ai').textContent = 'AI ' + p.ai.toFixed(1);
  document.getElementById('a-name').textContent = p.agent;
  document.getElementById('a-img').src = D.agentImg;

  /* gallery: hero img + 4 interiors */
  var imgs = [p.img.replace('w=800', 'w=1400')].concat(D.interiors.slice(0, 4));
  document.getElementById('p-gallery').innerHTML = imgs.map(function (src, i) {
    var more = i === 4 ? '<span class="more">+12</span>' : '';
    return '<div class="g"><img src="' + src + '" alt="" loading="lazy"/>' + more + '</div>';
  }).join('');

  var specs = [
    ['bed-double', p.beds, 'beds'], ['bath', p.bath, 'baths'],
    ['scaling', p.area + ' m²', 'area'], ['sparkles', 'AI ' + p.ai.toFixed(1), 'aiScore']
  ];
  document.getElementById('p-specs').innerHTML = specs.map(function (s) {
    return '<div class="spec"><i data-lucide="' + s[0] + '" class="i"></i><b>' + s[1] + '</b><span>' + (s[2] === 'area' ? 'm²' : HZ.t(s[2])) + '</span></div>';
  }).join('');

  document.getElementById('p-desc').textContent = isAr
    ? 'وحدة ' + p.type + ' استثنائية في ' + p.cmp + ' — تشطيب فاخر، إطلالات مفتوحة، ومجتمع مغلق بخدمات متكاملة. موثّقة ميدانياً من فريق سيرا، ومسعّرة ببيانات السوق الحية عبر محرك AVM. متاحة للمعاينة خلال 24 ساعة.'
    : 'An exceptional ' + p.type.toLowerCase() + ' in ' + p.cmp + ' — premium finishing, open views, and a fully-serviced gated community. Verified on-site by the Sierra team and priced against live market data through our AVM engine. Available for viewing within 24 hours.';

  var featsEn = ['Private garden', 'Covered parking', 'Central AC', 'Smart home ready', 'Clubhouse access', "Kids' area", '24/7 security', 'Community pool', 'Fiber internet'];
  var featsAr = ['حديقة خاصة', 'جراج مغطى', 'تكييف مركزي', 'منزل ذكي', 'عضوية النادي', 'منطقة أطفال', 'أمن 24/7', 'حمام سباحة', 'إنترنت فايبر'];
  document.getElementById('p-feats').innerHTML = (isAr ? featsAr : featsEn).map(function (f) {
    return '<span><i data-lucide="check-circle-2" class="i"></i>' + f + '</span>';
  }).join('');

  /* similar: 3 others, closest ai */
  document.getElementById('sim-grid').innerHTML = D.listings
    .filter(function (x) { return x.id !== p.id; })
    .sort(function (a, b) { return Math.abs(a.ai - p.ai) - Math.abs(b.ai - p.ai); })
    .slice(0, 3).map(HZ.pcard).join('');

  HZ.mount('props');

  /* mini map at compound coords */
  var cpd = D.compounds.find(function (c) { return c.n.indexOf(p.cmp) >= 0 || p.cmp.indexOf(c.n.split(' (')[0]) >= 0; }) || D.compounds[5];
  var tiles = {
    light: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    dark: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
  };
  var map = L.map('mini-map', { scrollWheelZoom: false, zoomControl: true }).setView(cpd.c, 14);
  var layer = L.tileLayer(tiles[HZ.theme()], { attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 18 }).addTo(map);
  document.addEventListener('hzp:theme', function (e) { layer.setUrl(tiles[e.detail]); });
  L.marker(cpd.c, {
    icon: L.divIcon({ className: '', html: '<span style="display:inline-flex;width:18px;height:18px;border-radius:50%;background:#00aeff;border:3px solid #fff;box-shadow:0 3px 10px rgba(13,33,54,.4);"></span>', iconSize: [18, 18], iconAnchor: [9, 9] })
  }).addTo(map);
  /* Fix: invalidateSize after layout settles + on resize */
  setTimeout(function () { map.invalidateSize(); }, 200);
  setTimeout(function () { map.invalidateSize(); }, 800);
  window.addEventListener('resize', function () { map.invalidateSize(); });
})();
</script>
</body>
</html>
