<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sierra Estates · Virtual Tour</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/framer-motion@10.18.0/dist/framer-motion.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="data.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
html,body{width:100%;height:100%;background:#07111E;overflow:hidden;}
#root{width:100%;height:100%;}
::-webkit-scrollbar{display:none;}
@keyframes roomFade{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;
const G = '#C8961A', GL = '#E9C176', N = '#071422';
const Mo = (window.Motion || {}).motion;
const AP = (window.Motion || {}).AnimatePresence;

// Pull room data from HZDATA (data.js) — falls back to demo rooms if missing
var ROOMS = (window.HZDATA && window.HZDATA.rooms) ? window.HZDATA.rooms : [
  { name: 'Luxury Living Room', sub: 'Hyde Park · Grand Villa', img: 'https://images.unsplash.com/photo-1556228453-efd6c1ff04f6?w=1400&q=85' },
  { name: 'Master Bedroom Suite', sub: 'Mountain View iCity · Penthouse', img: 'https://images.unsplash.com/photo-1618773928121-c32242e63f39?w=1400&q=85' },
  { name: 'Garden Courtyard', sub: 'Villette · Villa G-Type', img: 'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1400&q=85' },
  { name: 'Infinity Pool & Deck', sub: 'Taj City · Signature Villa', img: 'https://images.unsplash.com/photo-1571003123894-1f0594d2b5d9?w=1400&q=85' },
  { name: 'Rooftop Sky Terrace', sub: 'Uptown Cairo · Penthouse', img: 'https://images.unsplash.com/photo-1622547748225-3fc4abd2cca0?w=1400&q=85' }
];

function Room(props) {
  var room = props.room;
  var drag = useRef({ x: 0, active: false, startX: 0 });
  var st = useState({ x: 50 });
  var pos = st[0], setPos = st[1];

  function onDown(e) {
    var cx = e.touches ? e.touches[0].clientX : e.clientX;
    drag.current = { active: true, startX: cx, startPos: pos.x };
  }
  function onMove(e) {
    if (!drag.current.active) return;
    var cx = e.touches ? e.touches[0].clientX : e.clientX;
    var dx = cx - drag.current.startX;
    var np = Math.max(0, Math.min(100, drag.current.startPos - dx / 8));
    setPos({ x: np });
  }
  function onUp() { drag.current.active = false; }

  return (
    <div
      onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
      onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
      style={{ position: 'absolute', inset: 0, overflow: 'hidden', cursor: 'grab', background: '#000' }}>
      <img src={room.img} alt={room.name} draggable="false"
        style={{
          position: 'absolute', top: '50%', left: (50 - pos.x * 0.16) + '%',
          transform: 'translate(-' + (40 + pos.x * 0.16) + '%,-50%) scale(1.18)',
          width: '145%', height: '145%', objectFit: 'cover', transition: drag.current.active ? 'none' : 'left .3s ease-out',
          userSelect: 'none', pointerEvents: 'none'
        }} />
      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to top,rgba(4,10,18,.75) 0%,rgba(4,10,18,0) 32%,rgba(4,10,18,0) 78%,rgba(4,10,18,.55) 100%)', pointerEvents: 'none' }} />
    </div>
  );
}

function App() {
  var st = useState(0);
  var idx = st[0], setIdx = st[1];
  var room = ROOMS[idx];

  function go(i) { setIdx((i + ROOMS.length) % ROOMS.length); }

  useEffect(function () {
    function onKey(e) {
      if (e.key === 'ArrowRight') go(idx + 1);
      if (e.key === 'ArrowLeft') go(idx - 1);
    }
    window.addEventListener('keydown', onKey);
    return function () { window.removeEventListener('keydown', onKey); };
  }, [idx]);

  var RoomLayer = <Room key={idx} room={room} />;

  return (
    <div style={{ position: 'absolute', inset: 0, fontFamily: 'Inter,sans-serif' }}>
      {RoomLayer}

      {/* top bar */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, padding: '18px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', zIndex: 5 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ width: 7, height: 7, borderRadius: '50%', background: G, boxShadow: '0 0 10px rgba(200,150,26,.8)' }} />
          <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 10.5, color: GL, letterSpacing: '.18em', textTransform: 'uppercase' }}>Sierra Virtual Tour</span>
        </div>
        <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 10, color: 'rgba(255,255,255,.55)', letterSpacing: '.1em' }}>{idx + 1} / {ROOMS.length}</div>
      </div>

      {/* room caption */}
      <div style={{ position: 'absolute', left: 24, bottom: 118, zIndex: 5, maxWidth: '80%' }}>
        <div style={{ fontFamily: "'Cormorant Garamond',serif", fontWeight: 500, fontSize: 30, color: '#fff', letterSpacing: '.01em', textShadow: '0 2px 20px rgba(0,0,0,.5)' }}>{room.name}</div>
        <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 10.5, color: G, letterSpacing: '.08em', marginTop: 6, opacity: .9 }}>{room.sub}</div>
      </div>

      {/* drag hint */}
      <div style={{ position: 'absolute', right: 24, bottom: 118, zIndex: 5, display: 'flex', alignItems: 'center', gap: 6, opacity: .55 }}>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><path d="M9 5l-6 7 6 7M15 5l6 7-6 7"/></svg>
        <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 9.5, color: '#fff', letterSpacing: '.1em' }}>DRAG TO LOOK</span>
      </div>

      {/* prev / next arrows */}
      <button onClick={function () { go(idx - 1); }} aria-label="previous room"
        style={{ position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)', zIndex: 5, width: 44, height: 44, borderRadius: '50%', background: 'rgba(7,17,30,.55)', border: '1px solid rgba(200,150,26,.4)', color: G, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M15 5l-7 7 7 7"/></svg>
      </button>
      <button onClick={function () { go(idx + 1); }} aria-label="next room"
        style={{ position: 'absolute', right: 14, top: '50%', transform: 'translateY(-50%)', zIndex: 5, width: 44, height: 44, borderRadius: '50%', background: 'rgba(7,17,30,.55)', border: '1px solid rgba(200,150,26,.4)', color: G, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M9 5l7 7-7 7"/></svg>
      </button>

      {/* thumbnail rail */}
      <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, zIndex: 5, padding: '14px 20px 20px', background: 'linear-gradient(to top,rgba(4,10,18,.85),transparent)' }}>
        <div style={{ display: 'flex', gap: 9, overflowX: 'auto' }}>
          {ROOMS.map(function (rm, i) {
            var active = i === idx;
            return (
              <button key={i} onClick={function () { setIdx(i); }} style={{
                position: 'relative', flexShrink: 0, width: 92, height: 62, borderRadius: 10, overflow: 'hidden', cursor: 'pointer', padding: 0,
                border: active ? '2px solid ' + G : '2px solid rgba(255,255,255,.15)', opacity: active ? 1 : .65, transition: 'all .2s'
              }}>
                <img src={rm.img} alt={rm.name} loading="lazy" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
