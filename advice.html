<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Sierra — Sierra Estates</title>
  <link rel="stylesheet" href="../assets/sierra.css?v=5" />
  <style>
    .chat-wrap { max-width: 720px; margin: 36px auto 0; }
    .chat { background: var(--surface); border: 1px solid var(--line); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-md); }
    .chat-head { display: flex; align-items: center; gap: 13px; padding: 18px 22px; background: linear-gradient(135deg, var(--navy), #16365a); color: #fff; }
    .chat-ava { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, var(--gold-lt), var(--gold)); display: grid; place-items: center; color: var(--navy-deep); font-family: var(--font-display); font-weight: 700; font-size: 20px; }
    .chat-head h3 { margin: 0; font-size: 16px; font-weight: 600; }
    .chat-head .stat { font-size: 11px; color: rgba(239,248,247,0.6); display: flex; align-items: center; gap: 6px; }
    .chat-head .dot { width: 7px; height: 7px; border-radius: 50%; background: #2ecc71; }
    .lang-toggle { margin-left: auto; display: flex; gap: 3px; background: rgba(255,255,255,0.1); border-radius: 999px; padding: 3px; }
    .lang-toggle button { border: none; background: transparent; color: rgba(255,255,255,0.6); font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 999px; cursor: pointer; }
    .lang-toggle button.on { background: var(--gold); color: var(--navy-deep); }
    .chat-body { padding: 22px; height: 420px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: var(--ivory); }
    .bubble { max-width: 78%; padding: 13px 17px; border-radius: 16px; font-size: 14px; line-height: 1.55; animation: sbFadeUp 0.4s var(--ease) both; }
    .bubble.bot { align-self: flex-start; background: var(--surface); border: 1px solid var(--line); border-bottom-left-radius: 5px; color: var(--navy); }
    .bubble.user { align-self: flex-end; background: linear-gradient(135deg, var(--navy), #16365a); color: #fff; border-bottom-right-radius: 5px; }
    .bubble.ar { direction: rtl; font-family: var(--font-ar); }
    .chat-foot { padding: 16px 18px; border-top: 1px solid var(--line); display: flex; gap: 10px; background: var(--surface); }
    .chat-foot input { flex: 1; border: 1px solid var(--line); border-radius: 999px; padding: 12px 18px; font-family: var(--font-ui); font-size: 14px; outline: none; color: var(--navy); }
    .chat-foot input:focus { border-color: var(--gold); }
    .chat-send { width: 46px; height: 46px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--gold-lt), var(--gold)); color: var(--navy-deep); cursor: pointer; display: grid; place-items: center; }
    .suggests { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; justify-content: center; }
    .suggests button { padding: 9px 16px; border-radius: 999px; border: 1px solid var(--line); background: var(--surface); cursor: pointer; font-family: var(--font-ui); font-size: 12px; color: var(--navy-soft); transition: all 220ms var(--ease); }
    .suggests button:hover { border-color: var(--gold); color: var(--gold-deep); }
  </style>
</head>
<body>
  <div class="sb-topbar">
    <a class="sb-brand" href="../Sierra Estates Landing.html"><span class="sb-brand-mark">S</span><span><span class="sb-brand-name">SIERRA ESTATES</span><span class="sb-brand-sub" style="display:block;">NEW CAIRO · REALTY</span></span></a>
    <a class="sb-back" href="../Sierra Estates Landing.html">← Back to home</a>
  </div>

  <main class="ai-page">
    <div class="sb-section">
      <div class="ai-hero reveal">
        <span class="sb-eyebrow">AI Support · Advisory</span>
        <h1>Ask Sierra</h1>
        <p>The best &amp; only AI broker in Egypt — bilingual, always on, and honest about yields and compounds.</p>
      </div>

      <div class="chat-wrap reveal">
        <div class="chat">
          <div class="chat-head">
            <div class="chat-ava">S</div>
            <div>
              <h3>Sierra</h3>
              <div class="stat"><span class="dot"></span> Online · replies in seconds</div>
            </div>
            <div class="lang-toggle" id="lang">
              <button class="on" data-l="en">EN</button>
              <button data-l="ar">ع</button>
            </div>
          </div>
          <div class="chat-body" id="body"></div>
          <div class="chat-foot">
            <input id="input" placeholder="Ask about a compound, budget, or yield…" />
            <button class="chat-send" id="send"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
          </div>
        </div>
        <div class="suggests" id="suggests"></div>
      </div>
    </div>
  </main>

  <script src="../assets/sierra.js?v=5"></script>
  <script>
    let lang = 'en';
    const body = document.getElementById('body'), input = document.getElementById('input');
    const SUGGESTS = {
      en: ['3-bed villa in Mivida under 15M', 'Best yield in New Cairo?', 'Rent vs resale in Madinaty'],
      ar: ['فيلا ٣ غرف في ميفيدا', 'أعلى عائد في القاهرة الجديدة؟', 'إيجار أم تمليك في مدينتي']
    };
    function reply(q) {
      const t = q.toLowerCase();
      if (lang === 'ar') {
        if (t.includes('ميفيدا')) return 'لقيتلك ٣ فيلات في ميفيدا بمستوى مطابقة ٩٦٪، تبدأ من ١٢.٥ مليون جنيه. أبعتلك التفاصيل؟ ✨';
        if (t.includes('عائد')) return 'أعلى العوائد دلوقتي في إيستاون وهايد بارك — حوالي ٨.٣٪ صافي سنوي. تحب تحليل ROI كامل؟';
        return 'تمام! قولي ميزانيتك والكمبوند المفضل، وهرشحلك أفضل الوحدات في ثوانٍ.';
      }
      if (t.includes('mivida')) return 'I found 3 villas in Mivida at a 96% match — from EGP 12.5M, 3–4 beds. Shall I send the full report? ✨';
      if (t.includes('yield') || t.includes('roi')) return 'Top yields right now are in Eastown and Hyde Park — around 8.3% net annually. Want the full ROI breakdown?';
      if (t.includes('madinaty')) return 'In Madinaty, resale outperforms on appreciation (~9%/yr) while rentals yield ~6%. For a 5-yr hold, resale wins. Your budget?';
      return "Great question. Tell me your budget and preferred compound, and I'll match the best units in seconds.";
    }
    function add(text, who, isAr) {
      const b = document.createElement('div');
      b.className = `bubble ${who}` + (isAr ? ' ar' : '');
      b.textContent = text; body.appendChild(b); body.scrollTop = body.scrollHeight;
    }
    function send(q) {
      if (!q.trim()) return;
      add(q, 'user', lang === 'ar'); input.value = '';
      setTimeout(() => add(reply(q), 'bot', lang === 'ar'), 600);
    }
    function renderSuggests() {
      const s = document.getElementById('suggests'); s.innerHTML = '';
      SUGGESTS[lang].forEach(q => { const btn = document.createElement('button'); btn.textContent = q; btn.onclick = () => send(q); s.appendChild(btn); });
    }
    function greet() {
      body.innerHTML = '';
      add(lang === 'ar' ? 'أهلاً بيك في سييرا 👋 أنا مستشارك العقاري الذكي. محتاج إيجار ولا تمليك؟' : "Welcome to Sierra 👋 I'm your AI property advisor. Looking to rent or buy?", 'bot', lang === 'ar');
    }
    document.getElementById('send').onclick = () => send(input.value);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') send(input.value); });
    document.querySelectorAll('#lang button').forEach(b => b.onclick = () => {
      document.querySelectorAll('#lang button').forEach(x => x.classList.remove('on'));
      b.classList.add('on'); lang = b.dataset.l;
      input.placeholder = lang === 'ar' ? 'اسأل عن كمبوند أو ميزانية أو عائد…' : 'Ask about a compound, budget, or yield…';
      input.style.direction = lang === 'ar' ? 'rtl' : 'ltr';
      greet(); renderSuggests();
    });
    greet(); renderSuggests();

    window.mountSierraAIHub('../');
    window.sbInitReveal();
  </script>
</body>
</html>
