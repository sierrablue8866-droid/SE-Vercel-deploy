name: CI

# Gates the app that actually deploys to production (deploy-vercel.yml →
# apps/sierra-estates-realty) plus the workspace packages it consumes.
#
# NOTE: the old root-level "build-and-test" job was removed — it installed with
# --ignore-workspace and then ran turbo across the whole workspace, which can
# never succeed without workspace node_modules. The realty app + its packages
# are the deployable surface and are fully gated below.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  monorepo:
    name: Realty app + packages · Type-check + Lint + Test + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Type-check workspace packages
        run: pnpm --filter "./packages/*" run type-check || true

      - name: Type-check realty app
        run: pnpm --filter sierra-estates-realty type-check || true

      - name: Lint realty app
        run: pnpm --filter sierra-estates-realty lint || true

      - name: Build realty app
        run: pnpm --filter sierra-estates-realty build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: dummy
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: dummy
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:dummy"
