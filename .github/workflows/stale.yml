name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark stale issues and pull requests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            Thank you for your contributions!
          close-issue-message: |
            This issue was closed because it has been stale for 14 days with no activity.
            Please re-open if still relevant.

          # PRs
          days-before-pr-stale: 21
          days-before-pr-close: 10
          stale-pr-label: 'stale'
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had
            recent activity. It will be closed in 10 days if no further activity occurs.
          close-pr-message: |
            This pull request was closed because it has been stale for 10 days with no activity.

          # Exemptions
          exempt-issue-labels: 'pinned,security,bug,in-progress'
          exempt-pr-labels: 'pinned,security,in-progress,do-not-close'
