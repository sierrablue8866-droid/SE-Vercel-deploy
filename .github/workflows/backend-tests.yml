name: Backend Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/api/**'
      - 'functions/**'
      - 'packages/api/**'
      - 'packages/db/**'
      - 'packages/auth/**'
      - 'packages/config/**'
      - '.github/workflows/backend-tests.yml'
      - 'scripts/test-backend.sh'
  pull_request:
    branches: [main, master]
    paths:
      - 'apps/api/**'
      - 'functions/**'
      - 'packages/api/**'
      - 'packages/db/**'
      - 'packages/auth/**'
      - 'packages/config/**'
      - '.github/workflows/backend-tests.yml'
      - 'scripts/test-backend.sh'

jobs:
  python-backend:
    name: Python (apps/api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt pytest
      - run: pytest -v

  functions-backend:
    name: Firebase Functions (functions/)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-save --no-audit --no-fund --no-workspaces --install-strategy=nested
              jest@^29 firebase-admin@^13 firebase-functions@^6 typescript@^5 @types/node@^20
      - run: ./node_modules/.bin/tsc
      - run: npx jest --ci
