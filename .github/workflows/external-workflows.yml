name: External Workflows — Sync Data with Sheets

# Each job guards on its required repository secrets: when secrets are not
# configured the job SKIPS gracefully (notice, green run) instead of failing
# every schedule. Configure secrets per workflows/GITHUB_SECRETS_SETUP.md.

on:
  schedule:
    # 9am daily — Search for new owner properties on PF/OLX
    - cron: '0 9 * * *'
    # 10am daily — Send WhatsApp outreach to owners
    - cron: '0 10 * * *'
    # 8am daily — Send email campaigns
    - cron: '0 8 * * *'
    # Every 30 minutes — Sync new units from Sheets to Firestore
    - cron: '*/30 * * * *'

  workflow_dispatch:
    inputs:
      workflow:
        description: 'Which workflow to run?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - owner-search
          - owner-contact
          - email-sender
          - unit-adder

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Owner Search (Daily at 9am UTC)
  # ─────────────────────────────────────────────────────────────
  owner-search:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' &&
      github.event.schedule == '0 9 * * *' ||
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.workflow == 'all' || github.event.inputs.workflow == 'owner-search')

    timeout-minutes: 10

    steps:
      - name: Check required secrets
        id: secrets
        env:
          PF_JWT: ${{ secrets.PROPERTY_FINDER_JWT_TOKEN }}
          GSA_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -z "$PF_JWT" ] || [ -z "$GSA_KEY" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Owner Search skipped::Required secrets not configured (PROPERTY_FINDER_JWT_TOKEN, GOOGLE_SERVICE_ACCOUNT_KEY). See workflows/GITHUB_SECRETS_SETUP.md"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.secrets.outputs.configured == 'true'

      - uses: actions/setup-node@v4
        if: steps.secrets.outputs.configured == 'true'
        with:
          node-version: '24'

      - name: Install workflow dependencies
        if: steps.secrets.outputs.configured == 'true'
        run: |
          cd workflows
          npm install --production

      - name: Run Owner Search
        if: steps.secrets.outputs.configured == 'true'
        run: cd workflows && npm run owner-search
        env:
          PROPERTY_FINDER_API_BASE: ${{ secrets.PROPERTY_FINDER_API_BASE }}
          PROPERTY_FINDER_JWT_TOKEN: ${{ secrets.PROPERTY_FINDER_JWT_TOKEN }}
          BROKER_INBOX_SHEET_ID: ${{ secrets.BROKER_INBOX_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Owner Search failed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Owner Contact (Daily at 10am UTC)
  # NOTE: independent of owner-search — the old `needs: owner-search`
  # meant this job was ALWAYS skipped on its 10am schedule (owner-search
  # only runs on the 9am cron, so the dependency was never satisfied).
  # ─────────────────────────────────────────────────────────────
  owner-contact:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' &&
      github.event.schedule == '0 10 * * *' ||
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.workflow == 'all' || github.event.inputs.workflow == 'owner-contact')

    timeout-minutes: 15

    steps:
      - name: Check required secrets
        id: secrets
        env:
          WA_TOKEN: ${{ secrets.WHATSAPP_API_TOKEN }}
          GSA_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -z "$WA_TOKEN" ] || [ -z "$GSA_KEY" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Owner Contact skipped::Required secrets not configured (WHATSAPP_API_TOKEN, GOOGLE_SERVICE_ACCOUNT_KEY). See workflows/GITHUB_SECRETS_SETUP.md"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.secrets.outputs.configured == 'true'

      - uses: actions/setup-node@v4
        if: steps.secrets.outputs.configured == 'true'
        with:
          node-version: '24'

      - name: Install workflow dependencies
        if: steps.secrets.outputs.configured == 'true'
        run: |
          cd workflows
          npm install --production

      - name: Run Owner Contact
        if: steps.secrets.outputs.configured == 'true'
        run: cd workflows && npm run owner-contact
        env:
          WHATSAPP_API_URL: ${{ secrets.WHATSAPP_API_URL }}
          WHATSAPP_API_TOKEN: ${{ secrets.WHATSAPP_API_TOKEN }}
          BROKER_INBOX_SHEET_ID: ${{ secrets.BROKER_INBOX_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

      - name: Notify on failure
        if: failure()
        run: echo "❌ Owner Contact failed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Email Sender (Daily at 8am UTC)
  # ─────────────────────────────────────────────────────────────
  email-sender:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' &&
      github.event.schedule == '0 8 * * *' ||
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.workflow == 'all' || github.event.inputs.workflow == 'email-sender')

    timeout-minutes: 10

    steps:
      - name: Check required secrets
        id: secrets
        env:
          SG_KEY: ${{ secrets.SENDGRID_API_KEY }}
          GSA_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -z "$SG_KEY" ] || [ -z "$GSA_KEY" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Email Sender skipped::Required secrets not configured (SENDGRID_API_KEY, GOOGLE_SERVICE_ACCOUNT_KEY). See workflows/GITHUB_SECRETS_SETUP.md"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.secrets.outputs.configured == 'true'

      - uses: actions/setup-node@v4
        if: steps.secrets.outputs.configured == 'true'
        with:
          node-version: '24'

      - name: Install workflow dependencies
        if: steps.secrets.outputs.configured == 'true'
        run: |
          cd workflows
          npm install --production

      - name: Run Email Sender
        if: steps.secrets.outputs.configured == 'true'
        run: cd workflows && npm run email-sender
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          BROKER_INBOX_SHEET_ID: ${{ secrets.BROKER_INBOX_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

      - name: Notify on failure
        if: failure()
        run: echo "❌ Email Sender failed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Unit Adder (Every 30 minutes)
  # ─────────────────────────────────────────────────────────────
  unit-adder:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' &&
      github.event.schedule == '*/30 * * * *' ||
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.workflow == 'all' || github.event.inputs.workflow == 'unit-adder')

    timeout-minutes: 5

    steps:
      - name: Check required secrets
        id: secrets
        env:
          GSA_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          SHEET_ID: ${{ secrets.BROKER_INBOX_SHEET_ID }}
        run: |
          if [ -z "$GSA_KEY" ] || [ -z "$SHEET_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Unit Adder skipped::Required secrets not configured (GOOGLE_SERVICE_ACCOUNT_KEY, BROKER_INBOX_SHEET_ID). See workflows/GITHUB_SECRETS_SETUP.md"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.secrets.outputs.configured == 'true'

      - uses: actions/setup-node@v4
        if: steps.secrets.outputs.configured == 'true'
        with:
          node-version: '24'

      - name: Install workflow dependencies
        if: steps.secrets.outputs.configured == 'true'
        run: |
          cd workflows
          npm install --production

      - name: Run Unit Adder
        if: steps.secrets.outputs.configured == 'true'
        run: cd workflows && npm run unit-adder
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          BROKER_INBOX_SHEET_ID: ${{ secrets.BROKER_INBOX_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

      - name: Notify on failure
        if: failure()
        run: echo "❌ Unit Adder failed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ─────────────────────────────────────────────────────────────
  # JOB 5: Health Check Summary
  # ─────────────────────────────────────────────────────────────
  summary:
    runs-on: ubuntu-latest
    needs: [owner-search, owner-contact, email-sender, unit-adder]
    if: always()

    steps:
      - name: Workflow Status Summary
        run: |
          echo "Owner Search: ${{ needs.owner-search.result }}"
          echo "Owner Contact: ${{ needs.owner-contact.result }}"
          echo "Email Sender: ${{ needs.email-sender.result }}"
          echo "Unit Adder: ${{ needs.unit-adder.result }}"

          if [[ "${{ needs.owner-search.result }}" == "failure" || \
                "${{ needs.owner-contact.result }}" == "failure" || \
                "${{ needs.email-sender.result }}" == "failure" || \
                "${{ needs.unit-adder.result }}" == "failure" ]]; then
            echo "❌ One or more workflows failed"
            exit 1
          else
            echo "✅ All workflows completed or skipped cleanly"
          fi
