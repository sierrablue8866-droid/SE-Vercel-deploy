version: 2
updates:
  # Monorepo root & apps
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    groups:
      next-ecosystem:
        patterns: ["next", "react", "react-dom", "@next/*", "eslint-config-next"]
      firebase-ecosystem:
        patterns: ["firebase", "firebase-admin", "firebase-functions"]
      opentelemetry:
        patterns: ["@opentelemetry/*"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*", "postcss", "autoprefixer"]
      typescript-tooling:
        patterns: ["typescript", "@types/*", "eslint", "eslint-*", "typescript-eslint"]
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "chore(actions)"
