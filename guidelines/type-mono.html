<!-- @dsCard group="Type" viewport="700x180" name="Mono & Eyebrow — JetBrains Mono" subtitle="Data, prices, SBR codes & the signature gold eyebrow" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px 28px; display: flex; flex-direction: column; gap: 16px; }
  .line { display: flex; align-items: center; gap: 16px; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--tx-m); width: 78px; flex-shrink: 0; }
  .price { font-family: var(--font-mono); font-weight: 700; font-size: 22px; color: var(--gold-lt); }
  .code { font-family: var(--font-mono); font-weight: 600; font-size: 13px; letter-spacing: .1em; color: var(--tx-s); background: var(--surf); border: var(--border-hair); padding: 4px 10px; border-radius: var(--radius-xs); }
</style>
</head>
<body>
  <div class="line"><span class="tag">eyebrow</span><span class="sb-eyebrow">Intelligence OS</span></div>
  <div class="line"><span class="tag">price</span><span class="price">EGP 14.2M</span><span class="price" style="font-size:15px;color:var(--tx-m)">$1,800/mo</span></div>
  <div class="line"><span class="tag">SBR code</span><span class="code">MV-VL-02</span><span class="code">HP-VL-04</span><span class="code">MDN-PH-01</span></div>
</body>
</html>
