name: Feature request
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: product
    attributes:
      label: Which product?
      options:
        - Cognitum Seed firmware
        - V0 Hub firmware
        - Management dashboard
        - Desktop optimizer (Windows/macOS)
        - Cogs / apps
        - Documentation
        - Other
    validations:
      required: true
