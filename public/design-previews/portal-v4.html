  .font-serif { font-family: 'Cormorant Garamond', serif; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }

  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: #f0ede5; }
  ::-webkit-scrollbar-thumb { background: rgba(7,20,34,0.2); border-radius: 5px; }

  /* Hero background — refined, soft & elegant */
  .hero-bg {
    background:
      linear-gradient(180deg, rgba(250,248,243,0.4) 0%, rgba(250,248,243,0.85) 70%, rgba(250,248,243,1) 100%),

      radial-gradient(ellipse at bottom right, rgba(230,57,70,0.05) 0%, transparent 50%),

    background-size: cover;
    background-position: center;
    background-attachment: scroll;
  }

  /* Logo aura */
  @keyframes aura-pulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }
  .logo-aura {
    position: relative;
  }
  .logo-aura::before {
    content: '';
    position: absolute;
    inset: -40px;
    background: radial-gradient(circle, rgba(230,57,70,0.2) 0%, rgba(200,150,26,0.1) 40%, transparent 70%);
    z-index: -1;
    animation: aura-pulse 4s ease-in-out infinite;
  }

  /* Filter bar dropdown */
  .pf-dropdown {
    position: relative;
  }
  .pf-dropdown-panel {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    min-width: 280px;
    background: white;
    border: 1px solid rgba(7,20,34,0.12);
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    padding: 16px;
    z-index: 50;
    animation: slideDown 200ms cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  /* Listing card hover */
  .listing-card {
    transition: all 400ms cubic-bezier(0.16,1,0.3,1);
  }
  .listing-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 50px rgba(7,20,34,0.12);
  }

  /* Pulse live */
  @keyframes pulse-live {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.7); }
    50% { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
  }
  .pulse-live { animation: pulse-live 2s ease-in-out infinite; }

  /* Stagger reveal */
  .stagger-child {
    opacity: 0;
    animation: reveal-up 600ms cubic-bezier(0.16,1,0.3,1) forwards;
  }
  @keyframes reveal-up {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Custom range slider */
  input[type=range].pf-range {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: linear-gradient(to right, #C8961A 0%, #C8961A var(--val), #e5e5e5 var(--val), #e5e5e5 100%);
    border-radius: 2px;
    outline: none;
  }
  input[type=range].pf-range::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: #C8961A;
    border-radius: 50%;

    to { opacity: 1; transform: translateX(0); }

// ─── INVENTORY ────────────────────────────────────────────────────────
const PROPERTIES = [
  {id:1,title:'The Glass Horizon Villa',compound:'New Cairo · Madinaty',price:8450000,priceLabel:'EGP 8.45M',beds:5,baths:6,area:'7,800',type:'villa',purpose:'resale',img:'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1200&q=85',gallery:['https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1200&q=85','https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=1200&q=85','https://images.unsplash.com/photo-1613490493576-7fde63acd811?w=1200&q=85','https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1200&q=85'],status:'verified',badge:'PREMIUM',pf_id:'PF-4921083',desc:'Premium standalone villa with panoramic golf views and meticulous architecture. Features 5 bedrooms, private pool, expansive garden, and modern open-plan living spaces. Located in the prestigious Madinaty community.',amenities:['Private Garden','Swimming Pool','Covered Parking','24/7 Security','Gym','Smart Home'],agent:'Tarek Hassan',agentPhone:'+20 100 999 1234'},
  {id:2,title:'Minimalist Waterfront Penthouse',compound:'Uptown Cairo · Mokattam',price:3120000,priceLabel:'EGP 3.12M',beds:3,baths:4,area:'3,400',type:'penthouse',purpose:'rent',img:'https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=1200&q=85',gallery:['https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=1200&q=85','https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1200&q=85','https://images.unsplash.com/photo-1613490493576-7fde63acd811?w=1200&q=85'],status:'owner',badge:'NEW',pf_id:'PF-4921085',desc:'Stunning minimalist penthouse with breathtaking Uptown Cairo views. Open-plan living space, floor-to-ceiling windows, premium finishes throughout. 3 spacious bedrooms with en-suite bathrooms.',amenities:['Sky Lounge','Private Terrace','Designer Kitchen','Maid Room','Smart Home','Concierge'],agent:'Layla Mahmoud',agentPhone:'+20 100 888 5678'},
  {id:3,title:'Obsidian High-Rise Studio',compound:'Mostakbal City',price:1250000,priceLabel:'EGP 1.25M',beds:1,baths:2,area:'1,150',type:'apartment',purpose:'rent',img:'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1200&q=85',gallery:['https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1200&q=85','https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1200&q=85'],status:'verified',badge:'FEATURED',pf_id:'PF-4921086',desc:'Sleek modern studio in vibrant Mostakbal City. Perfect for young professionals. Walking distance to dining, shopping, and metro stations.',amenities:['Concierge','24/7 Security','Covered Parking','Rooftop Pool'],agent:'Karim Mostafa',agentPhone:'+20 100 777 9012'},

// ─── PF-STYLE DROPDOWN COMPONENT ──────────────────────────────────────
function PFDropdown({label, value, children, onClose, isOpen, onClick}) {
  const ref = useRef(null);
  useEffect(()=>{
    if(!isOpen) return;
    const handle = (e) => { if(ref.current && !ref.current.contains(e.target)) onClose(); };
    setTimeout(()=>document.addEventListener('click', handle), 0);
    return () => document.removeEventListener('click', handle);
  },[isOpen, onClose]);
  return (
    <div className="pf-dropdown" ref={ref}>
      <button onClick={onClick} className="flex items-center justify-between gap-3 px-4 py-3 bg-white border border-[#071422]/15 hover:border-[#C8961A]/60 rounded-xl text-sm font-medium text-[#071422] transition-all min-w-[140px]">
        <span>{value || label}</span>
        <I.ChevronDown className={`w-4 h-4 text-[#C8961A] transition-transform ${isOpen?'rotate-180':''}`}/>
      </button>
      {isOpen && <div className="pf-dropdown-panel">{children}</div>}
    </div>
  );
}

// ─── PROPERTY FINDER STYLE FILTER BAR ─────────────────────────────────
function PFFilterBar({filters, setFilters, onSearch}) {
  const [openDropdown, setOpenDropdown] = useState(null);
  
  const toggle = (key) => setOpenDropdown(openDropdown===key?null:key);
  const close = () => setOpenDropdown(null);

  return (
    <div className="flex flex-wrap items-center gap-3 bg-white p-3 rounded-2xl shadow-xl border border-[#071422]/8 max-w-5xl mx-auto">
      {/* Search input */}
      <div className="flex-1 min-w-[200px] flex items-center gap-3 px-4 py-3 bg-[#F4F0E8]/30 border border-[#071422]/8 rounded-xl">
        <I.Search className="w-4 h-4 text-[#071422]/40"/>
        <input type="text" placeholder="City, compound, or building" value={filters.search} onChange={(e)=>setFilters({...filters, search: e.target.value})} className="flex-1 bg-transparent outline-none text-sm text-[#071422] placeholder-[#071422]/40"/>
      </div>

      {/* Purpose: Rent | Resale */}
      <PFDropdown label="Purpose" value={filters.purpose==='all'?'Any':filters.purpose==='rent'?'Rent':'Resale'} onClose={close} isOpen={openDropdown==='purpose'} onClick={()=>toggle('purpose')}>
        <div className="space-y-1 min-w-[200px]">
          {[{k:'all',l:'Any'},{k:'rent',l:'Rent'},{k:'resale',l:'Resale'}].map(o=>(
            <button key={o.k} onClick={()=>{setFilters({...filters, purpose:o.k}); close();}} className={`w-full text-left px-3 py-2 rounded-lg text-sm transition-all ${filters.purpose===o.k?'bg-[#C8961A] text-white font-semibold':'text-[#071422] hover:bg-[#F4F0E8]/50'}`}>{o.l}</button>
          ))}
        </div>
      </PFDropdown>

      {/* Type */}
      <PFDropdown label="Type" value={filters.type==='all'?'Any':filters.type} onClose={close} isOpen={openDropdown==='type'} onClick={()=>toggle('type')}>
        <div className="space-y-1 min-w-[200px]">
          {['all','apartment','villa','penthouse','twin','townhouse','duplex'].map(t=>(
            <button key={t} onClick={()=>{setFilters({...filters, type:t}); close();}} className={`w-full text-left px-3 py-2 rounded-lg text-sm transition-all capitalize ${filters.type===t?'bg-[#C8961A] text-white font-semibold':'text-[#071422] hover:bg-[#F4F0E8]/50'}`}>{t==='all'?'Any Type':t}</button>
          ))}
        </div>
      </PFDropdown>

      {/* Beds */}
      <PFDropdown label="Beds & Baths" value={filters.beds===0?'Any':`${filters.beds}+ Beds`} onClose={close} isOpen={openDropdown==='beds'} onClick={()=>toggle('beds')}>
        <div className="min-w-[240px]">
          <p className="text-xs font-bold uppercase tracking-[0.15em] text-[#071422]/60 mb-3">Bedrooms</p>
          <div className="flex flex-wrap gap-2">
            {[0,1,2,3,4,5,6].map(b=>(
              <button key={b} onClick={()=>setFilters({...filters, beds:b})} className={`w-12 h-10 rounded-lg text-xs font-bold transition-all ${filters.beds===b?'bg-[#C8961A] text-white':'bg-[#F4F0E8]/50 text-[#071422] hover:bg-[#C8961A]/15'}`}>
                {b===0?'Any':b+(b===6?'+':'')}
              </button>
            ))}
          </div>
          <p className="text-xs font-bold uppercase tracking-[0.15em] text-[#071422]/60 mt-4 mb-2">Bathrooms</p>
          <div className="flex flex-wrap gap-2">
            {[0,1,2,3,4,5].map(b=>(
              <button key={b} onClick={()=>setFilters({...filters, baths:b})} className={`w-12 h-10 rounded-lg text-xs font-bold transition-all ${filters.baths===b?'bg-[#C8961A] text-white':'bg-[#F4F0E8]/50 text-[#071422] hover:bg-[#C8961A]/15'}`}>
                {b===0?'Any':b+(b===5?'+':'')}
              </button>
            ))}
          </div>
        </div>
      </PFDropdown>

      {/* Price */}
      <PFDropdown label="Price" value={filters.maxPrice<10000000?`EGP ${(filters.maxPrice/1000000).toFixed(1)}M`:'Any'} onClose={close} isOpen={openDropdown==='price'} onClick={()=>toggle('price')}>
        <div className="min-w-[260px]">
          <p className="text-xs font-bold uppercase tracking-[0.15em] text-[#071422]/60 mb-3">Maximum Price</p>
          <input type="range" min="1000000" max="20000000" step="500000" value={filters.maxPrice} onChange={(e)=>setFilters({...filters, maxPrice:Number(e.target.value)})} className="pf-range w-full" style={{'--val': `${((filters.maxPrice-1000000)/(20000000-1000000))*100}%`}}/>
          <div className="flex justify-between mt-2 text-[10px] font-mono text-[#071422]/50">
            <span>1M</span><span className="font-bold text-[#C8961A]">EGP {(filters.maxPrice/1000000).toFixed(1)}M</span><span>20M+</span>
          </div>
        </div>
      </PFDropdown>

      {/* More Filters */}
      <PFDropdown label="More" value="More Filters" onClose={close} isOpen={openDropdown==='more'} onClick={()=>toggle('more')}>
        <div className="min-w-[280px]">
          <p className="text-xs font-bold uppercase tracking-[0.15em] text-[#071422]/60 mb-3">Furnishing</p>
          <div className="flex flex-wrap gap-2 mb-4">
            {['Furnished','Semi','Empty'].map(f=>(
              <button key={f} onClick={()=>{
                const arr = filters.furnish;
                setFilters({...filters, furnish: arr.includes(f)?arr.filter(x=>x!==f):[...arr,f]});
              }} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${filters.furnish.includes(f)?'bg-[#C8961A] text-white':'bg-[#F4F0E8]/50 text-[#071422] hover:bg-[#C8961A]/15'}`}>{f}</button>
            ))}
          </div>
          <p className="text-xs font-bold uppercase tracking-[0.15em] text-[#071422]/60 mb-3">Amenities</p>
          <div className="flex flex-wrap gap-2">
            {['Garden','Pool','Parking','Security','Gym'].map(a=>(
              <button key={a} onClick={()=>{
                const arr = filters.amenities;
                setFilters({...filters, amenities: arr.includes(a)?arr.filter(x=>x!==a):[...arr,a]});
              }} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${filters.amenities.includes(a)?'bg-[#C8961A] text-white':'bg-[#F4F0E8]/50 text-[#071422] hover:bg-[#C8961A]/15'}`}>{a}</button>
            ))}
          </div>
        </div>
      </PFDropdown>

      {/* Find button */}
      <button onClick={onSearch} className="px-8 py-3 bg-gradient-to-r from-[#E63946] to-[#B71C2C] hover:from-[#FF4D5A] hover:to-[#E63946] text-white rounded-xl text-sm font-bold uppercase tracking-[0.18em] shadow-lg shadow-[#E63946]/30 transition-all">
        Find
      </button>
    </div>
  );
}

// ─── PROPERTY CARD ─────────────────────────────────────────────────────
function PropertyCard({p, i, onClick}) {
  return (
    <div className="stagger-child" style={{animationDelay:`${i*80}ms`}}>
      <div onClick={onClick} className="listing-card bg-white border border-[#071422]/8 rounded-2xl overflow-hidden cursor-pointer group">
        <div className="relative h-56 overflow-hidden bg-[#f0ede5]">
          <img src={p.img} alt={p.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ease-silk"/>
          {/* Badge */}

// ─── APP ──────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [selectedProperty, setSelectedProperty] = useState(null);
  const [filters, setFilters] = useState({
    search:'', purpose:'all', type:'all', beds:0, baths:0, maxPrice:20000000, furnish:[], amenities:[]
  });

  const filtered = useMemo(()=>{
    return PROPERTIES.filter(p=>{
      if(filters.search && !p.compound.toLowerCase().includes(filters.search.toLowerCase()) && !p.title.toLowerCase().includes(filters.search.toLowerCase())) return false;
      if(filters.purpose!=='all' && p.purpose!==filters.purpose) return false;
      if(filters.type!=='all' && p.type!==filters.type) return false;
      if(filters.beds && p.beds<filters.beds) return false;
      if(filters.baths && p.baths<filters.baths) return false;
      if(p.price>filters.maxPrice) return false;
      return true;
    });
  },[filters]);

  const goHome = () => { setPage('home'); setSelectedProperty(null); window.scrollTo({top:0, behavior:'smooth'}); };

  if (page==='detail' && selectedProperty) {
    return <ListingDetail property={selectedProperty} onBack={goHome}/>;
  }

  return (
    <div className="min-h-screen bg-[#FAF8F3]">
      <Nav onHome={goHome}/>

      {/* HERO */}
      <section className="relative min-h-[95vh] flex flex-col items-center justify-center px-6 hero-bg pt-32 pb-20 overflow-hidden">
        <div className="relative z-10 max-w-5xl w-full text-center">
          {/* Logo with aura */}
          <div className="logo-aura inline-block mb-6">
            <img src="assets/logo-red.png" alt="" style={{width:'120px'}} className="drop-shadow-[0_4px_24px_rgba(230,57,70,0.35)] mx-auto"/>
          </div>

          {/* Badge */}
          <div className="inline-flex items-center gap-2 bg-white/80 backdrop-blur-md border border-[#C8961A]/30 px-5 py-2 rounded-full mb-6 shadow-sm">
            <span className="w-2 h-2 rounded-full bg-green-500 pulse-live"></span>
            <span className="text-[#071422] tracking-[0.2em] uppercase text-[10px] font-mono font-semibold">Egypt's Premier Property Intelligence</span>
          </div>

          {/* Headline */}
          <h1 className="font-serif text-5xl sm:text-6xl md:text-7xl text-[#071422] leading-[1.05] font-light tracking-tight mb-4">
            Find Your Place in <br/>
            <span className="italic text-transparent bg-clip-text bg-gradient-to-r from-[#C8961A] via-[#E9C176] to-[#C8961A]">New Cairo.</span>
          </h1>

          {/* Subheading */}
          <p className="text-base md:text-lg text-[#071422]/65 max-w-2xl mx-auto leading-relaxed mb-10 font-light">
            From premium villas to luxury apartments. <span className="font-semibold text-[#C8961A]">1,500+ elite brokers</span>, AI-driven matching, and replies within <span className="font-semibold text-[#E63946]">4 seconds</span>.
          </p>

          {/* PF-style filter bar */}
          <PFFilterBar filters={filters} setFilters={setFilters} onSearch={()=>document.getElementById('results')?.scrollIntoView({behavior:'smooth'})}/>

          {/* Quick stats */}
          <div className="mt-10 flex justify-center gap-8 md:gap-12 text-center">
            <div><p className="text-3xl font-bold text-[#C8961A]">1,500+</p><p className="text-[10px] uppercase tracking-[0.15em] text-[#071422]/50">Brokers</p></div>
            <div><p className="text-3xl font-bold text-[#C8961A]">{PROPERTIES.length}</p><p className="text-[10px] uppercase tracking-[0.15em] text-[#071422]/50">Properties</p></div>
            <div><p className="text-3xl font-bold text-[#C8961A]">4s</p><p className="text-[10px] uppercase tracking-[0.15em] text-[#071422]/50">Response</p></div>
            <div><p className="text-3xl font-bold text-[#C8961A]">98%</p><p className="text-[10px] uppercase tracking-[0.15em] text-[#071422]/50">Match Rate</p></div>
          </div>
        </div>
      </section>

      {/* Results section (Property Finder style) */}
      <section id="results" className="py-12 px-6 md:px-12 max-w-[1500px] mx-auto">
        <div className="mb-8">
          <h2 className="font-serif text-3xl md:text-4xl font-light text-[#071422] mb-1">
            Properties {filters.purpose==='rent'?'for Rent':filters.purpose==='resale'?'for Resale':'Available'} in Egypt
          </h2>
          <p className="text-sm text-[#071422]/60"><span className="font-bold text-[#C8961A]">{filtered.length}</span> properties match your criteria</p>
        </div>

        {/* Quick location chips */}
        <div className="bg-white border border-[#071422]/8 rounded-2xl p-5 mb-8 grid grid-cols-2 md:grid-cols-4 gap-3">
          {[
            {l:'New Cairo', c:28688}, {l:'Madinaty', c:7731}, {l:'Mountain View', c:2186}, {l:'Mostakbal', c:1024},
            {l:'Uptown Cairo', c:856}, {l:'Mivida', c:548}, {l:'El Shorouk', c:312}, {l:'Eastown', c:267},
          ].slice(0,4).map(c=>(
            <button key={c.l} className="text-left text-sm text-[#071422] hover:text-[#C8961A] transition-colors">
              <span className="font-medium">{c.l}</span> <span className="text-[#071422]/40">({c.c.toLocaleString()})</span>
            </button>
          ))}
        </div>

        {filtered.length===0 ? (
          <div className="text-center py-16">
            <p className="text-[#071422]/40 text-sm">No matches found. Adjust your filters.</p>
          </div>
        ) : (
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {filtered.map((p,i)=>(
              <PropertyCard key={p.id} p={p} i={i} onClick={()=>{
                setSelectedProperty(p);
                setPage('detail');
                window.scrollTo({top:0, behavior:'instant'});
              }}/>
            ))}
          </div>
        )}
      </section>

      {/* Footer */}
      <footer className="bg-[#071422] text-white/50 py-16 text-center border-t border-[#C8961A]/20 mt-16">
        <img src="assets/logo-gold.png" alt="" className="w-20 h-20 mx-auto mb-4 object-contain"/>
        <h2 className="font-serif text-3xl text-[#F4F0E8] font-light tracking-[0.18em] mb-1">sierra estates</h2>
        <p className="text-[10px] uppercase tracking-[0.42em] text-[#C8961A] mb-6 font-mono font-semibold">PropTech Intelligence · 2026</p>
        <div className="max-w-md mx-auto h-px bg-gradient-to-r from-transparent via-[#C8961A] to-transparent opacity-40 mb-4"></div>
        <p className="text-[10px] font-mono tracking-[0.18em] uppercase">© 2026 sierra estates Realty. All rights reserved.</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
