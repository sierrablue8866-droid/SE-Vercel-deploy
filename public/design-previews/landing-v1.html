// ─── STARDUST CANVAS ───────────────────────────────────────────────────
function StardustCanvas() {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext('2d');
    let w = c.width = c.offsetWidth, h = c.height = c.offsetHeight;
    const stars = Array.from({length:60},()=>({
      x: Math.random()*w, y: h + Math.random()*h,
      r: Math.random()*1.4+0.3,
      vx: (Math.random()-0.5)*0.2, vy: -Math.random()*0.4-0.1,
      a: Math.random()*0.45+0.1,
    }));
    let id;
    const tick = () => {
      ctx.clearRect(0,0,w,h);
      stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(233,193,118,${s.a})`;
        ctx.fill();
        s.x+=s.vx; s.y+=s.vy;
        if (s.y<-10){ s.y=h+10; s.x=Math.random()*w; }
      });
      id = requestAnimationFrame(tick);
    };
    tick();
    const onR = () => { w=c.width=c.offsetWidth; h=c.height=c.offsetHeight; };
    window.addEventListener('resize', onR);
    return () => { cancelAnimationFrame(id); window.removeEventListener('resize', onR); };
  }, []);
  return <canvas ref={ref} className="absolute inset-0 w-full h-full pointer-events-none" />;
}

// ─── REFINED CINEMATIC HERO ────────────────────────────────────────────
function Hero({t, isAr}) {
  const ref = useRef(null);
  const [mouse, setMouse] = useState({x:0,y:0});
  const [query, setQuery] = useState('');

  const onMove = (e) => {
    if (!ref.current) return;
    const r = ref.current.getBoundingClientRect();
    setMouse({
      x: ((e.clientX - r.left) / r.width - 0.5) * 2,
      y: ((e.clientY - r.top) / r.height - 0.5) * 2,
    });
  };

  return (
    <section
      ref={ref}
      onMouseMove={onMove}
      onMouseLeave={()=>setMouse({x:0,y:0})}
      className="relative min-h-screen w-full flex flex-col justify-center items-center text-center px-6 overflow-hidden bg-gradient-to-b from-[#0A1628] via-[#0D1E36] to-[#0A1628]"
    >
      {/* Radial gold light */}
      <div className="absolute inset-0 z-0"
        style={{
          background: `radial-gradient(circle at ${50 + mouse.x*8}% ${50 + mouse.y*8}%, rgba(200,150,26,0.10) 0%, transparent 60%)`,
          transition: 'background 600ms cubic-bezier(0.16,1,0.3,1)'
        }}
      />
      {/* Hairline grid */}
      <div className="absolute inset-0 z-0 opacity-[0.04]"
        style={{
          backgroundImage:'linear-gradient(to right, #C8961A 1px, transparent 1px), linear-gradient(to bottom, #C8961A 1px, transparent 1px)',
          backgroundSize:'5rem 5rem'
        }}
      />
      {/* Stardust */}
      <div className="absolute inset-0 z-0"><StardustCanvas /></div>

      {/* Soft top/bottom vignette */}
      <div className="absolute inset-0 z-0 bg-[linear-gradient(180deg,rgba(7,20,34,0.6)_0%,transparent_30%,transparent_70%,rgba(7,20,34,0.8)_100%)]"></div>

      {/* ── Big S backdrop ── */}
      <div
        className="absolute inset-0 flex items-center justify-center pointer-events-none select-none z-[1]"
        style={{
          transform: `translate(${mouse.x*-12}px, ${mouse.y*-8}px)`,
          transition: 'transform 800ms cubic-bezier(0.16,1,0.3,1)',
        }}
      >
        <span className="hero-letter text-[34rem] md:text-[42rem]">S</span>
      </div>

      {/* Content */}
      <div className="relative z-10 max-w-5xl w-full flex flex-col items-center space-y-8 pt-24 pb-12"
        style={{
          transform: `translate(${mouse.x*4}px, ${mouse.y*4}px)`,
          transition: 'transform 1000ms cubic-bezier(0.16,1,0.3,1)',
        }}
      >
        {/* Badge */}
        <div className="inline-flex items-center gap-2 bg-[#C8961A]/5 border border-[#C8961A]/25 backdrop-blur-md px-5 py-2 rounded-full">
          <Icon.Sparkles className="w-3.5 h-3.5 text-[#C8961A]" />
          <span className="text-[#C8961A] tracking-[0.22em] uppercase text-[10px] font-mono font-semibold">{t.heroBadge}</span>
        </div>

        {/* Headline */}
        <h1 className="font-serif text-[#F4F0E8] leading-[1.04] tracking-tight font-light max-w-4xl">
          <span className="block text-3xl sm:text-5xl md:text-6xl lg:text-7xl">{t.heroTitle1}</span>
          <span className="block text-4xl sm:text-6xl md:text-7xl lg:text-[5.5rem] font-normal italic gold-text mt-2">
            {t.heroTitle2}
          </span>
          <span className="block text-2xl sm:text-3xl md:text-4xl text-[#F4F0E8]/55 font-light mt-2">{t.heroTitle3}</span>

            <span className="h-[1px] w-16 gold-rule"></span>
          </div>
        </div>

        {/* Description */}

          <form onSubmit={(e)=>{e.preventDefault(); setSubmitted(true);}} className="flex flex-col gap-3">
            <input type="text" required value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder={t.formName} className="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-[#C8961A] focus:bg-white/10 font-light text-sm transition-all text-white placeholder-white/30"/>
            <input type="tel" required value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder={t.formPhone} className="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-[#C8961A] focus:bg-white/10 font-light text-sm transition-all text-white placeholder-white/30"/>
            <button type="submit" className="w-full py-4 bg-gradient-to-r from-[#C8961A] to-[#E9C176] hover:from-[#E9C176] hover:to-[#C8961A] text-[#071422] rounded-xl font-bold text-[11px] uppercase tracking-[0.22em] transition-all duration-400 ease-silk shadow-lg shadow-[#C8961A]/20 active:scale-[0.98]">
              {t.formSubmit}
            </button>
          </form>
        )}
      </div>
    </section>
  );
}

// ─── FOOTER ────────────────────────────────────────────────────────────
function Footer({t}) {
  return (
    <footer className="bg-[#040E1C] text-white/50 py-16 px-6 text-center border-t border-white/5">
      <div className="max-w-[1500px] mx-auto flex flex-col items-center">
        <ShieldLogo size={44}/>
        <h2 className="font-serif text-2xl text-white font-semibold tracking-[0.15em] mt-4">{t.brand}</h2>
        <p className="text-[10px] tracking-[0.4em] uppercase text-[#C8961A] mt-1 mb-6 font-mono font-semibold">PropTech Intelligence OS · 2026</p>
        <div className="w-full max-w-md h-px gold-rule opacity-30 my-4"></div>
        <p className="text-[10px] font-mono text-white/30 tracking-[0.18em]">{t.copyright}</p>
      </div>
    </footer>
  );
}

// ─── APP ───────────────────────────────────────────────────────────────
function App() {
  const [lang, setLang] = useState('en');
  const isAr = lang === 'ar';
  const t = DICT[lang];

  useEffect(()=>{
    document.documentElement.dir = t.dir;
    document.documentElement.lang = lang;
  },[lang]);

  return (
    <div dir={t.dir} className="min-h-screen bg-[#F4F0E8] text-[#071422] antialiased">
      <Nav lang={lang} setLang={setLang} t={t}/>
      <Hero t={t} isAr={isAr}/>
      <MapSection t={t} isAr={isAr}/>
      <Listings t={t} isAr={isAr}/>
      <Why t={t}/>
      <CTA t={t} isAr={isAr}/>
      <Footer t={t}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
