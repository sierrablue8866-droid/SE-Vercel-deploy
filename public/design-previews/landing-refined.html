<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sierra Estates — Luxury Real Estate Reimagined</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Cairo:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/gsap@3.12.2/dist/gsap.min.js"></script>
  <style>
    /* ────────────────────────────────────────────────────────────────── 
       SIERRA ESTATES REFINED — Light Mode with Centered Header Filter
       ──────────────────────────────────────────────────────────────── */
    :root {
      --bg: #F7F4EC;
      --bg-alt: #EFE9DC;
      --surface: #FFFFFF;
      --navy: #0D2035;
      --navy-soft: #3A4A5C;
      --muted: #8A8475;
      --gold: #C8961A;
      --gold-lt: #E9C176;
      --blue: #1B6CA8;
      --border: rgba(13,32,53,0.10);
      --border-gold: rgba(200,150,26,0.35);
    }

    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--navy); }
    
    .serif { font-family: 'Cormorant Garamond', serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .arabic { font-family: 'Cairo', sans-serif; }
    [dir="rtl"] body, [dir="rtl"] .sans { font-family: 'Cairo', sans-serif; }

    .gold-text {
      background: linear-gradient(120deg, var(--gold-lt), var(--gold) 50%, #A87A12);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }

    .ease-silk { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both; }

    /* Hero image with wash */
    .hero-img {
      background-image:
        linear-gradient(to bottom, rgba(247,244,236,.55), rgba(247,244,236,.78) 55%, rgba(247,244,236,.96)),
        url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1920&q=80');
      background-size: cover;
      background-position: center;
    }

    /* Dropdown animations */
    .combo-pop {
      animation: fadeUp 0.22s cubic-bezier(0.16, 1, 0.3, 1) both;
      box-shadow: 0 24px 60px rgba(13,32,53,.18);
    }

    .combo-row.active { background: rgba(200,150,26,.14); }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(13,32,53,.18); border-radius: 4px; }

    /* ─── HEADER (Fixed, Centered) ─── */
    .header-fixed {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 40;
      background: rgba(247,244,236,.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
    }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1400px;
      margin: 0 auto;
    }

    .logo-block {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-block img { width: 32px; height: 32px; object-fit: contain; }

    .logo-text .brand { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; letter-spacing: 0.18em; color: #C8961A; line-height: 1; }
    .logo-text .sub { font-size: 8px; letter-spacing: 0.38em; margin-top: 4px; color: var(--muted); }

    .nav-links { display: flex; gap: 28px; }
    .nav-links a { font-size: 13px; font-weight: 500; color: var(--navy); text-decoration: none; position: relative; }
    .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; right: 0; height: 1px; background: var(--gold); transform: scaleX(0); transition: transform 300ms cubic-bezier(0.16, 1, 0.3, 1); }
    .nav-links a:hover::after { transform: scaleX(1); }

    .lang-btn { padding: 8px 16px; border-radius: 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; background: var(--surface); border: 1px solid var(--border); color: var(--gold); cursor: pointer; transition: all 300ms ease; }
    .lang-btn:hover { border-color: var(--gold); background: rgba(200,150,26,.05); }

    /* ─── HERO SECTION (Centered Filter) ─── */
    .hero { 
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: 100px;
      padding-bottom: 60px;
      text-align: center;
    }

    .hero-intro {
      margin-bottom: 40px;
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      font-size: 10px;
      letter-spacing: 0.26em;
      font-weight: 500;
      color: var(--gold);
    }

    .hero-tag span { width: 14px; height: 1px; background: var(--gold); }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(40px, 7vw, 80px);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.01em;
      margin-bottom: 12px;
      color: var(--navy);
    }

    .hero-subtitle {
      font-size: 12px;
      letter-spacing: 0.22em;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 16px;
      color: var(--gold);
    }

    .hero-desc {
      font-size: 15px;
      font-weight: 300;
      line-height: 1.6;
      color: var(--navy-soft);
      margin: 0 auto 40px;
      max-width: 500px;
    }

    /* ─── SMART FILTER (Centered, Header Style) ─── */
    .filter-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 12px 40px rgba(13,32,53,.10);
      max-width: 900px;
      margin: 0 auto 50px;
    }

    .filter-purpose {
      display: flex;
      gap: 6px;
      padding: 6px;
      background: var(--bg-alt);
      border-radius: 10px;
      margin-bottom: 16px;
    }

    .purpose-btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 300ms cubic-bezier(0.16, 1, 0.3, 1);
      background: transparent;
      color: var(--muted);
    }

    .purpose-btn.active {
      background: linear-gradient(135deg, var(--navy), #163050);
      color: #fff;
      box-shadow: 0 4px 14px rgba(13,32,53,.22);
    }

    .filter-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .filter-col {
      padding: 12px 16px;
      border-right: 1px solid var(--border);
    }

    .filter-col:last-child { border-right: none; }

    .filter-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: var(--muted);
    }

    .filter-input, .filter-select {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-size: 13px;
      font-weight: 500;
      color: var(--navy);
      font-family: 'Inter', sans-serif;
    }

    .filter-select { cursor: pointer; }

    .search-btn {
      width: 100%;
      padding: 14px 16px;
      background: linear-gradient(135deg, var(--gold), var(--gold-lt));
      color: #071422;
      border: none;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 300ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .search-btn:hover {
      box-shadow: 0 8px 24px rgba(200,150,26,.3);
      transform: translateY(-2px);
    }

    /* ─── PRICE RANGE INPUT ─── */
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: linear-gradient(to right, var(--gold) 0%, var(--gold) var(--val, 50%), #e5e5e5 var(--val, 50%), #e5e5e5 100%);
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: var(--gold);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(200,150,26,.4);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: var(--gold);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(200,150,26,.4);
    }

    /* ─── PROPERTIES SECTION ─── */
    .properties-section {
      max-width: 1280px;
      margin: 80px auto 0;
      padding: 0 24px 80px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 60px;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 16px;
      color: var(--navy);
    }

    .section-subtitle {
      font-size: 14px;
      color: var(--navy-soft);
      font-weight: 300;
      line-height: 1.6;
    }

    /* Property toggle (Rent vs Resale) */
    .prop-toggle {
      display: flex;
      gap: 16px;
      margin: 32px 0 40px;
      justify-content: center;
    }

    .toggle-btn {
      padding: 12px 28px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--navy-soft);
      cursor: pointer;
      transition: all 300ms ease;
    }

    .toggle-btn.active {
      background: linear-gradient(135deg, var(--gold), var(--gold-lt));
      color: var(--navy);
      border-color: var(--gold);
      box-shadow: 0 6px 20px rgba(200,150,26,.25);
    }

    /* Property grid */
    .properties-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
    }

    .property-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: all 400ms cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    .property-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(13,32,53,.12);
      border-color: rgba(200,150,26,.3);
    }

    .property-image {
      position: relative;
      width: 100%;
      height: 240px;
      overflow: hidden;
      background: linear-gradient(135deg, var(--bg-alt), var(--bg));
    }

    .property-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 600ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .property-card:hover .property-image img {
      transform: scale(1.08);
    }

    .property-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--gold);
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .property-purpose {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(13,32,53,.85);
      backdrop-filter: blur(8px);
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(200,150,26,.3);
    }

    .property-content {
      padding: 20px;
    }

    .property-location {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .property-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
      line-height: 1.2;
      color: var(--navy);
    }

    .property-price {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .property-specs {
      display: flex;
      gap: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--navy-soft);
    }

    /* ─── FOOTER (Premium) ─── */
    .footer {
      background: var(--navy);
      color: var(--surface);
      padding: 80px 24px 40px;
      margin-top: 100px;
    }

    .footer-content {
      max-width: 1280px;
      margin: 0 auto;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 48px;
      margin-bottom: 60px;
    }

    .footer-section h4 {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--gold);
    }

    .footer-section ul {
      list-style: none;
      padding: 0;
    }

    .footer-section li {
      margin-bottom: 12px;
    }

    .footer-section a {
      font-size: 14px;
      color: rgba(244,240,232,.7);
      text-decoration: none;
      transition: color 300ms ease;
    }

    .footer-section a:hover {
      color: var(--gold);
    }

    .footer-bottom {
      border-top: 1px solid rgba(244,240,232,.1);
      padding-top: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 24px;
    }

    .footer-copy {
      font-size: 12px;
      color: rgba(244,240,232,.5);
    }

    .footer-social {
      display: flex;
      gap: 16px;
    }

    .footer-social a {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(200,150,26,.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
      transition: all 300ms ease;
    }

    .footer-social a:hover {
      background: var(--gold);
      color: var(--navy);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-content { flex-direction: column; gap: 16px; }
      .nav-links { gap: 16px; font-size: 11px; }
      .filter-row { grid-template-columns: 1fr; }
      .properties-grid { grid-template-columns: 1fr; }
      .footer-bottom { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useMemo } = React;

// ── Compound list ──
const COMPOUNDS = [
  'Mivida','Eastown','Villette (Sodic)','Taj City','Hyde Park','Mountain View iCity',
  'Mountain View Hyde Park','Madinaty','Uptown Cairo','Mostakbal City','El Shorouk',
  'Palm Hills New Cairo','Katameya Heights','Katameya Dunes','Stone Residence',
  'Fifth Square','La Vista City','Sarai','Bloomfields','SODIC East','Zed East',
];

function rankCompounds(q) {
  const s = q.trim().toLowerCase();
  if (!s) return COMPOUNDS.slice(0, 8);
  const score = (name) => {
    const n = name.toLowerCase();
    if (n === s) return 1000;
    if (n.startsWith(s)) return 800 - n.length;
    const idx = n.indexOf(s);
    if (idx !== -1) return 600 - idx - n.length;
    let i = 0;
    for (const ch of n) { if (ch === s[i]) i++; if (i === s.length) break; }
    if (i === s.length) return 300 - n.length;
    return -1;
  };
  return COMPOUNDS.map(n => [n, score(n)]).filter(([,v]) => v > -1)
    .sort((a,b) => b[1]-a[1]).map(([n]) => n).slice(0, 8);
}

// ── Compound Combo ──
function CompoundCombo({ value, onChange }) {
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState(value || '');
  const [active, setActive] = useState(0);
  const ref = useRef(null);
  const results = useMemo(() => rankCompounds(q), [q]);

  useEffect(() => {
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, []);

  const pick = (name) => { setQ(name); onChange(name); setOpen(false); };

  return (
    <div ref={ref} style={{ position: 'relative' }}>
      <input
        value={q}
        onChange={(e) => { setQ(e.target.value); setOpen(true); setActive(0); }}
        onFocus={() => setOpen(true)}
        onKeyDown={(e) => {
          if (e.key === 'ArrowDown') { e.preventDefault(); setActive(a => Math.min(a+1, results.length-1)); }
          else if (e.key === 'ArrowUp') { e.preventDefault(); setActive(a => Math.max(a-1, 0)); }
          else if (e.key === 'Enter' && results[active]) { e.preventDefault(); pick(results[active]); }
          else if (e.key === 'Escape') setOpen(false);
        }}
        placeholder="Type a compound…"
        style={{ width: '100%', background: 'transparent', border: 'none', outline: 'none', fontSize: '13px', fontWeight: '500', color: 'var(--navy)' }}
        className="filter-input"
      />
      {open && results.length > 0 && (
        <div className="combo-pop" style={{ position: 'absolute', zIndex: 50, left: 0, right: 0, marginTop: '8px', borderRadius: '10px', overflow: 'hidden', maxHeight: '240px', overflowY: 'auto', background: 'var(--surface)', border: '1px solid var(--border)', minWidth: 200 }}>
          {q.trim() && (
            <div style={{ padding: '8px 16px', fontSize: '9px', letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--muted)', borderBottom: '1px solid var(--border)' }}>
              Closest matches
            </div>
          )}
          {results.map((name, i) => (
            <button key={name} onMouseEnter={() => setActive(i)} onClick={() => pick(name)}
              style={{ 
                width: '100%', textAlign: 'left', padding: '10px 16px', fontSize: '13px',
                background: i === active ? 'rgba(200,150,26,.14)' : 'transparent',
                border: 'none', cursor: 'pointer', color: 'var(--navy)',
                transition: 'all 200ms ease'
              }}>
              <span style={{ color: 'var(--gold)', fontSize: '10px', marginRight: '8px' }}>◆</span>
              {name}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Properties Data ──
const PROPERTIES = [
  {
    id: 1, title: 'The Glass Horizon Villa', compound: 'New Cairo · Madinaty',
    price: 8450000, priceLabel: 'EGP 8.45M', beds: 5, baths: 6, area: '7,800',
    type: 'villa', purpose: 'resale', img: 'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1200&q=85',
    badge: 'PREMIUM'
  },
  {
    id: 2, title: 'Minimalist Waterfront Penthouse', compound: 'Uptown Cairo · Mokattam',
    price: 3120000, priceLabel: 'EGP 3.12M', beds: 3, baths: 4, area: '3,400',
    type: 'penthouse', purpose: 'rent', img: 'https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=1200&q=85',
    badge: 'NEW'
  },
  {
    id: 3, title: 'Obsidian High-Rise Studio', compound: 'Mostakbal City',
    price: 1250000, priceLabel: 'EGP 1.25M', beds: 1, baths: 2, area: '1,150',
    type: 'apartment', purpose: 'rent', img: 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1200&q=85',
    badge: 'FEATURED'
  },
  {
    id: 4, title: 'Elysian Modern Estate', compound: 'Mountain View · 5th Settlement',
    price: 5600000, priceLabel: 'EGP 5.60M', beds: 4, baths: 5, area: '5,200',
    type: 'villa', purpose: 'resale', img: 'https://images.unsplash.com/photo-1613490493576-7fde63acd811?w=1200&q=85',
    badge: 'HOT'
  },
  {
    id: 5, title: 'Twin House at Mivida', compound: 'Mivida · 5th Settlement',
    price: 4200000, priceLabel: 'EGP 4.20M', beds: 4, baths: 3, area: '4,100',
    type: 'twin', purpose: 'resale', img: 'https://images.unsplash.com/photo-1585399572663-f2a1f35f4137?w=1200&q=85',
    badge: 'NEW'
  },
  {
    id: 6, title: 'Tower Suite Apartment', compound: 'Eastown · 5th Settlement',
    price: 2890000, priceLabel: 'EGP 2.89M', beds: 3, baths: 3, area: '2,400',
    type: 'apartment', purpose: 'rent', img: 'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=1200&q=85',
    badge: 'TRENDING'
  },
];
