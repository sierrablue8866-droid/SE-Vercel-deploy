<script type="text/babel">
const { useState, useMemo, useRef, useEffect } = React;

/* ── Compounds ── */
const COMPOUNDS = [
  'Mivida','Eastown','Villette (Sodic)','Taj City','Hyde Park','Mountain View iCity',
  'Mountain View Hyde Park','Madinaty','Uptown Cairo','Mostakbal City','El Shorouk',
  'Palm Hills New Cairo','Katameya Heights','Katameya Dunes','Stone Residence',
  'Fifth Square','La Vista City','Sarai','Bloomfields','SODIC East','Zed East',
  'The Waterway','Galleria Moon Valley','Lake View Residence','Al Rehab',
];
function rankCompounds(q) {
  const s = q.trim().toLowerCase();
  if (!s) return COMPOUNDS.slice(0, 8);
  const score = (name) => {
    const n = name.toLowerCase();
    if (n === s) return 1000;
    if (n.startsWith(s)) return 800 - n.length;
    const idx = n.indexOf(s);
    if (idx !== -1) return 600 - idx - n.length;
    let i = 0; for (const ch of n) { if (ch === s[i]) i++; if (i === s.length) break; }
    if (i === s.length) return 300 - n.length;
    return -1;
  };
  return COMPOUNDS.map(n => [n, score(n)]).filter(([,v]) => v > -1)
    .sort((a,b) => b[1]-a[1]).map(([n]) => n).slice(0, 8);
}

/* ── Compound Combobox ── */
function CompoundCombo({ value, onChange, isAr, T, placeholder }) {
  const [open, setOpen] = useState(false);
  const [q, setQ]       = useState(value || '');
  const [active, setActive] = useState(0);
  const ref = useRef(null);
  const results = useMemo(() => rankCompounds(q), [q]);
  useEffect(() => {
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, []);
  const pick = (name) => { setQ(name); onChange(name); setOpen(false); };
  return (
    <div ref={ref} className="relative">
      {T && <div className="field-label">{T.compound}</div>}
      <input
        value={q}
        onChange={(e) => { setQ(e.target.value); setOpen(true); setActive(0); }}
        onFocus={() => setOpen(true)}
        onKeyDown={(e) => {
          if (e.key==='ArrowDown') { e.preventDefault(); setActive(a=>Math.min(a+1,results.length-1)); }
          else if (e.key==='ArrowUp') { e.preventDefault(); setActive(a=>Math.max(a-1,0)); }
          else if (e.key==='Enter' && results[active]) { e.preventDefault(); pick(results[active]); }
          else if (e.key==='Escape') setOpen(false);
        }}
        placeholder={placeholder || (isAr ? 'ابحث عن كمباوند…' : 'Type a compound…')}
        className="field-input"
        style={{ fontFamily: isAr ? "'Cairo',sans-serif" : "'Jost',sans-serif" }}
      />
      {open && results.length > 0 && (
        <div className="combo-pop absolute z-50 left-0 right-0 mt-2 rounded-xl overflow-hidden max-h-56 overflow-y-auto"
             style={{ background:'var(--surface)', border:'1px solid var(--border)', minWidth:220 }}>
          {q.trim() && (
            <div className="px-3 py-1.5 text-[9px] tracking-[.14em] uppercase mono" style={{ color:'var(--muted)', borderBottom:'1px solid var(--border)' }}>
              {isAr ? 'الأقرب لبحثك' : 'Closest matches'}
            </div>
          )}
          {results.map((name,i)=>(
            <button key={name} onMouseEnter={()=>setActive(i)} onClick={()=>pick(name)}
              className={`combo-row ${i===active?'active':''} w-full text-left px-4 py-2.5 text-[13px] ease-silk flex items-center gap-2`}
              style={{ color:'var(--navy)' }}>
              <span style={{ color:'var(--gold)', fontSize:10 }}>◆</span>{name}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── Request Modal ── */
function RequestModal({ open, onClose, isAr, T }) {
  const [purpose, setPurpose] = useState('rent');
  const [form, setForm] = useState({ name:'', phone:'', type:'', compound:'', budget:'', notes:'' });
  const [submitted, setSubmitted] = useState(false);
  const [errors, setErrors] = useState({});

  const set = (k,v) => setForm(f => ({...f, [k]:v}));
  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = true;
    if (!form.phone.trim()) e.phone = true;
    return e;
  };
  const submit = () => {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    setSubmitted(true);
  };
  const reset = () => { setForm({name:'',phone:'',type:'',compound:'',budget:'',notes:''}); setErrors({}); setSubmitted(false); onClose(); };

  useEffect(() => {
    if (open) { document.body.style.overflow = 'hidden'; }
    else { document.body.style.overflow = ''; }
    return () => { document.body.style.overflow = ''; };

            <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
              {/* Purpose toggle */}
              <div>
                <div className="field-label" style={{ marginBottom:8 }}>{T.mPurpose}</div>
                <div style={{ display:'flex', gap:8 }}>
                  {[['rent', T.rent], ['resale', T.resale]].map(([k,label]) => (
                    <button key={k} onClick={() => setPurpose(k)}
                      style={{ flex:1, padding:'10px 0', borderRadius:9, fontSize:12, fontWeight:700,
                        letterSpacing:'.08em', textTransform:'uppercase', cursor:'pointer', fontFamily:'inherit',
                        border: purpose===k ? 'none' : '1px solid var(--border)',
                        background: purpose===k ? 'linear-gradient(135deg,var(--navy),#163050)' : 'transparent',
                        color: purpose===k ? '#fff' : 'var(--muted)',
                        boxShadow: purpose===k ? '0 4px 14px rgba(13,32,53,.2)' : 'none' }}>
                      {label}
                    </button>
                  ))}
                </div>
              </div>

              {/* Name + Phone row */}
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
                <div className={`field-wrap ${errors.name ? 'border-red-400' : ''}`}
                  style={{ borderColor: errors.name ? '#E74C3C' : '' }}>
                  <div className="field-label">{T.mName} *</div>
                  <input className="field-input" placeholder={T.mNameP}
                    value={form.name} onChange={e=>{ set('name',e.target.value); setErrors(er=>({...er,name:false})); }} />
                </div>
                <div className={`field-wrap ${errors.phone ? 'border-red-400' : ''}`}
                  style={{ borderColor: errors.phone ? '#E74C3C' : '' }}>
                  <div className="field-label">{T.mPhone} *</div>
                  <input className="field-input" placeholder={T.mPhoneP}
                    value={form.phone} onChange={e=>{ set('phone',e.target.value); setErrors(er=>({...er,phone:false})); }} />
                </div>
              </div>
              {(errors.name || errors.phone) && (
                <p style={{ fontSize:11, color:'#C0392B', margin:'-6px 0 0' }}>
                  {isAr ? 'يرجى ملء الحقول المطلوبة' : 'Please fill in the required fields.'}
                </p>
              )}

              {/* Type */}
              <div className="field-wrap">
                <div className="field-label">{T.mType}</div>
                <select className="field-input" value={form.type} onChange={e=>set('type',e.target.value)}>
                  <option value="">{isAr ? '— اختر النوع —' : '— Select type —'}</option>
                  {T.mTypes.map(o => <option key={o} value={o}>{o}</option>)}
                </select>
              </div>

              {/* Compound */}
              <div className="field-wrap">
                <CompoundCombo value={form.compound} onChange={v=>set('compound',v)} isAr={isAr} T={null}
                  placeholder={isAr ? 'ابحث عن كمباوند…' : 'Search a compound…'} />
                <div className="field-label" style={{ marginBottom:4 }}>{T.mCompound}</div>
              </div>

              {/* Budget */}
              <div className="field-wrap">
                <div className="field-label">{T.mBudget}</div>
                <select className="field-input" value={form.budget} onChange={e=>set('budget',e.target.value)}>
                  <option value="">{isAr ? '— اختر الميزانية —' : '— Select budget —'}</option>
                  {T.mBudgets.map(o => <option key={o} value={o}>{o}</option>)}
                </select>
              </div>

              {/* Notes */}
              <div className="field-wrap">
                <div className="field-label">{T.mNotes}</div>
                <textarea className="field-input" rows={3} placeholder={T.mNotesP}
                  value={form.notes} onChange={e=>set('notes',e.target.value)} />
              </div>

              {/* Submit */}
              <button onClick={submit} className="ease-silk"
                style={{ width:'100%', padding:'14px', borderRadius:10, border:'none', cursor:'pointer',
                  background:'linear-gradient(135deg,var(--gold),var(--gold-lt))', color:'#071422',
                  fontSize:12, fontWeight:800, letterSpacing:'.13em', textTransform:'uppercase',
                  boxShadow:'0 6px 22px rgba(200,150,26,.32)', fontFamily:'inherit',
                  display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
                {T.mSubmit} — {T.discount}
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── Main App ── */
function App() {
  const [lang, setLang]       = useState('en');
  const T = COPY[lang]; const isAr = lang === 'ar';
  const [barVisible, setBarVisible] = useState(true);
  const [modalOpen, setModalOpen]   = useState(false);

  const [budget, setBudget]         = useState('');

  useEffect(() => { document.documentElement.dir = T.dir; document.documentElement.lang = lang; }, [lang]);

  const heroPT = barH + 64 + 32;

  return (

            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:16, color:'var(--gold)', fontFamily:"'Cormorant Garamond',serif", fontWeight:700 }}>
            S
          </div>
          <div>
            <div className="serif" style={{ fontSize:17, fontWeight:600, letterSpacing:'.16em', lineHeight:1,
              background:'linear-gradient(120deg,var(--gold-lt),var(--gold) 50%,#A87A12)',
              WebkitBackgroundClip:'text', backgroundClip:'text', WebkitTextFillColor:'transparent' }}>
              SIERRA

            <div style={{ fontSize:7, letterSpacing:'.38em', color:'var(--muted)', marginTop:2 }}>ESTATES</div>

        </div>

        {/* Nav actions */}
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          {/* Make Request CTA */}
          <button className="req-btn ease-silk" onClick={() => setModalOpen(true)}>
            <span className="req-badge">25% OFF</span>
            {T.makeRequest}
          </button>
          {/* Language toggle */}
          <button onClick={() => setLang(isAr ? 'en' : 'ar')}
            style={{ padding:'6px 14px', borderRadius:6, fontSize:11, fontWeight:700,
              letterSpacing:'.1em', background:'var(--surface)', border:'1px solid var(--border)',
              color:'var(--gold)', cursor:'pointer', fontFamily:'inherit' }}>
            {isAr ? 'EN' : 'ع'}

        </div>
      </nav>

      {/* HERO */}

        padding:`${heroPT}px 2rem 4rem`, transition:'padding-top .4s cubic-bezier(.16,1,.3,1)' }}>
        <div style={{ maxWidth:1280, margin:'0 auto', width:'100%',
          display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(min(100%,480px),1fr))', gap:48, alignItems:'center' }}>

          {/* LEFT CONTENT */}
          <div style={{ order: isAr ? 2 : 1, textAlign: isAr ? 'right' : 'left' }}>
            {/* Tag line */}
            <div className="fade-up" style={{ display:'flex', alignItems:'center', gap:10, marginBottom:20,
              flexDirection: isAr ? 'row-reverse' : 'row' }}>
              <span style={{ width:28, height:1, background:'var(--gold)', display:'block' }}></span>
              <span style={{ fontSize:10, letterSpacing:'.26em', fontWeight:600, color:'var(--gold)', textTransform:'uppercase' }}>
                {T.tag}
              </span>
            </div>

            <h1 className="serif fade-up" style={{ fontSize:'clamp(36px,4.8vw,70px)', fontWeight:300,
              lineHeight:1.06, letterSpacing:'-.01em', color:'var(--navy)', marginBottom:12, animationDelay:'.1s' }}>
              {T.h1a}<br />
              <span style={{ background:'linear-gradient(120deg,var(--gold-lt),var(--gold) 50%,#A87A12)',
                WebkitBackgroundClip:'text', backgroundClip:'text', WebkitTextFillColor:'transparent',
                fontStyle:'italic', fontWeight:400 }}>{T.h1b}</span>
            </h1>

            <div className="fade-up" style={{ fontSize:11, letterSpacing:'.22em', textTransform:'uppercase',
              fontWeight:600, color:'var(--gold)', marginBottom:12, animationDelay:'.18s' }}>{T.sub}</div>

                background:'linear-gradient(135deg,var(--gold),var(--gold-lt))', color:'#071422',
                display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                  <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>

            </div>

            {/* Stats */}
            <div className="fade-up" style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)',
              borderRadius:12, overflow:'hidden', background:'rgba(13,32,53,.05)',
              border:'1px solid var(--border)', animationDelay:'.5s' }}>

                  <span className="mono" style={{ fontSize:11, color:'var(--muted)' }}>

                {/* Request button on card */}
                <button onClick={() => setModalOpen(true)} className="ease-silk"
                  style={{ width:'100%', marginTop:14, padding:'10px', borderRadius:9, border:'none', cursor:'pointer',

                    fontSize:10, fontWeight:800, letterSpacing:'.12em', textTransform:'uppercase', fontFamily:'inherit',
                    display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                    <path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/>
                  </svg>
                  {T.makeRequest} · <span style={{ color:'var(--gold-lt)' }}>{T.discount}</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* REQUEST MODAL */}
      <RequestModal open={modalOpen} onClose={() => setModalOpen(false)} isAr={isAr} T={T} />
    </div>
  );
}
