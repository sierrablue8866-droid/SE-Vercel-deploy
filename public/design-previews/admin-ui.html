<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sierra Estates — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    /* ────────────────────────────────────────────────────────────────── 
       SIERRA ESTATES ADMIN — Dark Dashboard
       ──────────────────────────────────────────────────────────────── */
    :root {
      --bg-dark: #0A1628;
      --bg-darker: #050B14;
      --surface: #0F1E32;
      --surface-alt: #142A47;
      --ivory: #F4F0E8;
      --gold: #C8961A;
      --gold-lt: #E9C176;
      --blue: #1B6CA8;
      --blue-light: #2B5A9E;
      --green: #1E8B7A;
      --red: #E63946;
      --border: rgba(255, 255, 255, 0.08);
      --border-gold: rgba(200, 150, 26, 0.25);
    }

    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg-dark); font-family: 'Inter', sans-serif; color: var(--ivory); }

    .serif { font-family: 'Cormorant Garamond', serif; }
    .mono { font-family: 'Courier New', monospace; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

    /* ─── LAYOUT ─── */
    .dashboard { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 0;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      z-index: 50;
    }

    .sidebar-logo {
      padding: 0 20px 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .sidebar-logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.16em;
      color: var(--gold);
    }

    .sidebar-logo-sub {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(244, 240, 232, 0.5);
      margin-top: 4px;
    }

    .sidebar-menu {
      list-style: none;
      padding: 0;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      color: rgba(244, 240, 232, 0.7);
      cursor: pointer;
      transition: all 300ms ease;
      border-left: 3px solid transparent;
      font-size: 13px;
      font-weight: 500;
    }

    .sidebar-item:hover {
      background: rgba(200, 150, 26, 0.1);
      color: var(--gold);
    }

    .sidebar-item.active {
      background: rgba(200, 150, 26, 0.15);
      border-left-color: var(--gold);
      color: var(--gold);
    }

    .sidebar-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* Main content */
    .main {
      flex: 1;
      margin-left: 280px;
      background: linear-gradient(135deg, var(--bg-dark), var(--bg-darker));
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      font-size: 24px;
      font-weight: 600;
      font-family: 'Cormorant Garamond', serif;
      margin: 0;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 300ms ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-lt));
      color: var(--bg-dark);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(200, 150, 26, 0.3);
    }

    .btn-secondary {
      background: var(--surface-alt);
      color: var(--ivory);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: rgba(200, 150, 26, 0.1);
      border-color: var(--gold);
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-lt));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--bg-dark);
      font-weight: 600;
      font-size: 12px;
    }

    /* Content area */
    .content {
      padding: 32px;
    }

    /* Cards & Metrics */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: all 300ms ease;
    }

    .metric-card:hover {
      border-color: var(--border-gold);
      box-shadow: 0 8px 24px rgba(200, 150, 26, 0.1);
      transform: translateY(-4px);
    }

    .metric-label {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(244, 240, 232, 0.6);
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--gold);
    }

    .metric-change {
      font-size: 12px;
      color: var(--green);
    }

    /* Tables */
    .table-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 32px;
    }

    .table-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .table-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--ivory);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: rgba(255, 255, 255, 0.02);
    }

    th {
      padding: 12px 24px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(244, 240, 232, 0.6);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    tbody tr:hover {
      background: rgba(200, 150, 26, 0.05);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status-active {
      background: rgba(30, 139, 122, 0.2);
      color: var(--green);
    }

    .status-pending {
      background: rgba(200, 150, 26, 0.2);
      color: var(--gold);
    }

    .status-inactive {
      background: rgba(230, 57, 70, 0.2);
      color: var(--red);
    }

    /* Charts placeholder */
    .chart-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(244, 240, 232, 0.5);
    }

    /* Grid layout */
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .sidebar { width: 240px; }
      .main { margin-left: 240px; }
      .grid-2 { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      .sidebar { position: fixed; left: -100%; transition: left 300ms ease; }
      .sidebar.open { left: 0; }
      .main { margin-left: 0; }
      .header { padding: 16px 20px; }
      .content { padding: 16px; }
      .metrics { grid-template-columns: 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
      .table-container { overflow-x: auto; }
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const ICON_SVG = {
  Dashboard: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
  Properties: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
  Users: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  Analytics: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a1.5 1.5 0 0 0-1.5 1.5v12a1.5 1.5 0 0 0 1.5 1.5H17"/></svg>,
  Messages: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
  Settings: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m3.08 3.08l4.24 4.24M1 12h6m6 0h6m-16.78 7.78l4.24-4.24m3.08-3.08l4.24-4.24"/></svg>,
  Logout: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
};

function Dashboard() {
  const [activeTab, setActiveTab] = useState('dashboard');
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const menuItems = [
    { id: 'dashboard', label: 'Dashboard', icon: 'Dashboard' },
    { id: 'properties', label: 'Properties', icon: 'Properties' },
    { id: 'users', label: 'Users & Agents', icon: 'Users' },
    { id: 'analytics', label: 'Analytics', icon: 'Analytics' },
    { id: 'messages', label: 'Messages', icon: 'Messages' },
    { id: 'settings', label: 'Settings', icon: 'Settings' },
    { id: 'logout', label: 'Logout', icon: 'Logout' },
  ];

  return (
    <div className="dashboard">
      {/* Sidebar */}
      <aside className={`sidebar ${sidebarOpen ? 'open' : ''}`} style={{ display: window.innerWidth <= 768 && !sidebarOpen ? 'none' : 'block' }}>
        <div className="sidebar-logo">
          <div className="sidebar-logo-text">SIERRA ESTATES</div>
          <div className="sidebar-logo-sub">ADMIN PANEL</div>

        <ul className="sidebar-menu">
          {menuItems.map(item => (
            <li key={item.id} className={`sidebar-item ${activeTab === item.id ? 'active' : ''}`}

              <span className="sidebar-icon">{ICON_SVG[item.icon]}</span>
              <span>{item.label}</span>
            </li>

        </ul>
      </aside>

      {/* Main Content */}
      <main className="main">
        {/* Header */}
        <header className="header">
          <h1 className="header-title">
            {activeTab === 'dashboard' && 'Dashboard Overview'}
            {activeTab === 'properties' && 'Properties Management'}
            {activeTab === 'users' && 'Users & Agents'}
            {activeTab === 'analytics' && 'Analytics & Reports'}
            {activeTab === 'messages' && 'Messages'}
            {activeTab === 'settings' && 'Settings'}
            {activeTab === 'logout' && 'Logout'}
          </h1>
          <div className="header-actions">
            <button className="btn btn-secondary">📅 Today</button>
            <button className="btn btn-primary">+ New Listing</button>
            <div className="avatar">AH</div>
          </div>
        </header>

        {/* Content */}
        <div className="content">
          {activeTab === 'dashboard' && (
            <>
              {/* Key Metrics */}
              <div className="metrics">
                <div className="metric-card">
                  <div className="metric-label">Total Properties</div>
                  <div className="metric-value">1,248</div>
                  <div className="metric-change">↑ 12% from last month</div>
                </div>
                <div className="metric-card">
                  <div className="metric-label">Active Listings</div>
                  <div className="metric-value">856</div>
                  <div className="metric-change">↑ 8% from last month</div>
                </div>
                <div className="metric-card">
                  <div className="metric-label">Total Revenue</div>
                  <div className="metric-value">EGP 45.2M</div>
                  <div className="metric-change">↑ 24% from last month</div>
                </div>
                <div className="metric-card">
                  <div className="metric-label">Active Agents</div>
                  <div className="metric-value">47</div>
                  <div className="metric-change">↑ 3 new agents</div>
                </div>
              </div>

              {/* Charts */}
              <div className="grid-2">
                <div className="chart-container">
                  <div style={{ textAlign: 'center' }}>
                    <div style={{ fontSize: '14px', marginBottom: '8px' }}>📊 Monthly Sales Trend</div>
                    <div style={{ fontSize: '12px', color: 'rgba(244, 240, 232, 0.4)' }}>(Chart visualization)</div>
                  </div>
                </div>
                <div className="chart-container">
                  <div style={{ textAlign: 'center' }}>
                    <div style={{ fontSize: '14px', marginBottom: '8px' }}>🏠 Properties by Type</div>
                    <div style={{ fontSize: '12px', color: 'rgba(244, 240, 232, 0.4)' }}>(Distribution chart)</div>
                  </div>
                </div>
              </div>

              {/* Recent Properties */}
              <div className="table-container">
                <div className="table-header">
                  <div className="table-title">Recent Listings</div>
                  <button className="btn btn-secondary" style={{ fontSize: '11px' }}>View All</button>
                </div>
                <table>
                  <thead>
                    <tr>
                      <th>Property Name</th>
                      <th>Type</th>
                      <th>Compound</th>
                      <th>Status</th>
                      <th>Price</th>
                      <th>Agent</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>The Glass Horizon Villa</td>
                      <td>Villa</td>
                      <td>Madinaty</td>
                      <td><span className="status-badge status-active">Active</span></td>
                      <td>EGP 8.45M</td>
                      <td>Tarek Hassan</td>
                    </tr>
                    <tr>
                      <td>Minimalist Waterfront Penthouse</td>
                      <td>Penthouse</td>
                      <td>Mokattam</td>
                      <td><span className="status-badge status-active">Active</span></td>
                      <td>EGP 3.12M</td>
                      <td>Layla Mahmoud</td>
                    </tr>
                    <tr>
                      <td>Obsidian High-Rise Studio</td>
                      <td>Apartment</td>
                      <td>Mostakbal City</td>
                      <td><span className="status-badge status-pending">Pending</span></td>
                      <td>EGP 1.25M</td>
                      <td>Karim Mostafa</td>
                    </tr>
                    <tr>
                      <td>Elysian Modern Estate</td>
                      <td>Villa</td>
                      <td>5th Settlement</td>
                      <td><span className="status-badge status-active">Active</span></td>
                      <td>EGP 5.60M</td>
                      <td>Salma Ahmed</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </>
          )}

          {activeTab === 'properties' && (
            <>
              <div className="metrics">
                <div className="metric-card">
                  <div className="metric-label">For Rent</div>
                  <div className="metric-value">324</div>
                  <div className="metric-change">↑ 12 new this week</div>
                </div>
                <div className="metric-card">
                  <div className="metric-label">For Resale</div>
                  <div className="metric-value">532</div>
                  <div className="metric-change">↑ 28 new this week</div>
                </div>
                <div className="metric-card">
                  <div className="metric-label">Avg. Days on Market</div>
                  <div className="metric-value">18</div>
                  <div className="metric-change">↓ 2 days improvement</div>
                </div>
              </div>
              <div className="table-container">
                <div className="table-header">
                  <div className="table-title">All Properties</div>
                  <button className="btn btn-primary">+ Add New</button>
                </div>
                <table>
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Name</th>
                      <th>Type</th>
                      <th>Status</th>
                      <th>Listed Date</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    {['PF-001', 'PF-002', 'PF-003', 'PF-004'].map((id, i) => (
                      <tr key={i}>
                        <td className="mono">{id}</td>
                        <td>Property #{i + 1}</td>
                        <td>{['Villa', 'Apartment', 'Penthouse', 'Twin House'][i]}</td>
                        <td><span className="status-badge status-active">Active</span></td>
                        <td>2024-{String(i + 1).padStart(2, '0')}-15</td>

                </table>
              </div>
            </>
          )}

          {activeTab === 'users' && (
            <>
              <div className="metrics">
                <div className="metric-card">
                  <div className="metric-label">Total Agents</div>
                  <div className="metric-value">47</div>
                  <div className="metric-change">↑ 3 new this month</div>
                </div>
                <div className="metric-card">
                  <div className="metric-label">Active Now</div>
                  <div className="metric-value">28</div>

                <div className="metric-card">

                  <div className="metric-value">18.2</div>
                  <div className="metric-change">Total activity</div>
                </div>
              </div>
              <div className="table-container">
                <div className="table-header">
                  <div className="table-title">Agency Team</div>

                    <tr>
                      <th>Agent</th>
                      <th>Email</th>
                      <th>Phone</th>
                      <th>Listings</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    {[
                      { name: 'Tarek Hassan', email: 'tarek@sierra.com', phone: '+20 100 999 1234', listings: 24, status: 'active' },
                      { name: 'Layla Mahmoud', email: 'layla@sierra.com', phone: '+20 100 888 5678', listings: 19, status: 'active' },
                      { name: 'Karim Mostafa', email: 'karim@sierra.com', phone: '+20 100 777 9012', listings: 15, status: 'active' },
                      { name: 'Salma Ahmed', email: 'salma@sierra.com', phone: '+20 100 666 3456', listings: 21, status: 'inactive' },
                    ].map((agent, i) => (
                      <tr key={i}>
                        <td>{agent.name}</td>
                        <td>{agent.email}</td>
                        <td className="mono">{agent.phone}</td>
                        <td>{agent.listings}</td>
                        <td>
                          <span className={`status-badge ${agent.status === 'active' ? 'status-active' : 'status-inactive'}`}>
                            {agent.status === 'active' ? 'Online' : 'Offline'}
                          </span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </>
          )}

          {activeTab === 'analytics' && (
            <>
              <div className="metrics">
                <div className="metric-card">
                  <div className="metric-label">Page Views (30d)</div>
                  <div className="metric-value">124.5K</div>
                  <div className="metric-change">↑ 18% growth</div>
                </div>
                <div className="metric-card">
                  <div className="metric-label">Conversion Rate</div>
                  <div className="metric-value">3.2%</div>
                  <div className="metric-change">↑ 0.8% improvement</div>
                </div>
                <div className="metric-card">
                  <div className="metric-label">Avg. Session Time</div>
                  <div className="metric-value">4m 32s</div>
                  <div className="metric-change">↑ 1m 12s increase</div>
                </div>
              </div>
              <div className="chart-container">
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: '16px', marginBottom: '12px' }}>📈 Traffic & Engagement Analytics</div>
                  <div style={{ fontSize: '13px', color: 'rgba(244, 240, 232, 0.4)' }}>Time series visualization and detailed metrics coming soon</div>
                </div>
              </div>
            </>
          )}

          {activeTab === 'messages' && (
            <div className="chart-container">
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontSize: '18px', marginBottom: '12px' }}>💬 Messaging Center</div>
                <div style={{ fontSize: '13px', color: 'rgba(244, 240, 232, 0.4)' }}>No new messages. All agent communications are up to date.</div>
              </div>
            </div>
          )}

          {activeTab === 'settings' && (
            <>
              <div style={{ maxWidth: '600px' }}>
                <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: '12px', padding: '24px' }}>
                  <h3 style={{ margin: '0 0 24px', fontSize: '16px', fontWeight: '600' }}>Admin Settings</h3>
                  <div style={{ marginBottom: '20px' }}>
                    <label style={{ display: 'block', fontSize: '13px', fontWeight: '500', marginBottom: '8px' }}>Company Name</label>
                    <input type="text" defaultValue="Sierra Estates Realty" style={{ width: '100%', padding: '10px 12px', background: 'rgba(255, 255, 255, 0.05)', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--ivory)', fontFamily: 'inherit' }} />
                  </div>
                  <div style={{ marginBottom: '20px' }}>
                    <label style={{ display: 'block', fontSize: '13px', fontWeight: '500', marginBottom: '8px' }}>Admin Email</label>
                    <input type="email" defaultValue="admin@sierra.com" style={{ width: '100%', padding: '10px 12px', background: 'rgba(255, 255, 255, 0.05)', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--ivory)', fontFamily: 'inherit' }} />
                  </div>
                  <div style={{ marginBottom: '20px' }}>
                    <label style={{ display: 'block', fontSize: '13px', fontWeight: '500', marginBottom: '8px' }}>Admin Password</label>
                    <input type="password" style={{ width: '100%', padding: '10px 12px', background: 'rgba(255, 255, 255, 0.05)', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--ivory)', fontFamily: 'inherit' }} />
                  </div>
                  <button className="btn btn-primary">Save Changes</button>
                </div>
              </div>
            </>
          )}

          {activeTab === 'logout' && (
            <div className="chart-container">
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontSize: '18px', marginBottom: '12px' }}>👋 Goodbye!</div>
                <div style={{ fontSize: '13px', color: 'rgba(244, 240, 232, 0.4)' }}>You have been logged out. Redirecting to login...</div>
              </div>
            </div>
          )}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>

</body>
