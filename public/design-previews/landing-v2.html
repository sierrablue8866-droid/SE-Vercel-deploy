    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: goldShimmer 6s linear infinite;

  }

  .gold-rule {
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .nav-link { position: relative; }
  .nav-link::after {
    content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
    height: 1px; background: var(--gold);
    transform: scaleX(0); transform-origin: left;
    transition: transform 300ms cubic-bezier(0.16,1,0.3,1);
  }
  .nav-link:hover::after { transform: scaleX(1); }
  [dir="rtl"] .nav-link::after { transform-origin: right; }

  .img-bloom { transition: transform 800ms cubic-bezier(0.16,1,0.3,1); }
  .group:hover .img-bloom { transform: scale(1.06); }

  /* Hero cityscape - Uptown Cairo aerial, heavily blurred so the logo reads */
  .hero-bg {
    position: relative;
    isolation: isolate;
  }
  .hero-bg::before {
    content: '';
    position: absolute;
    inset: -40px;
    z-index: -2;
    background-image: url('https://images.unsplash.com/photo-1571841418516-37a8e9c2c0db?w=2400&q=85&auto=format&fit=crop');
    background-size: cover;
    background-position: center 35%;
    filter: blur(18px) saturate(1.15) brightness(0.55);
    transform: scale(1.08);
  }
  .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(ellipse at center 35%, rgba(5,11,20,0.35) 0%, rgba(5,11,20,0.78) 55%, rgba(5,11,20,0.98) 100%),
      linear-gradient(180deg, rgba(5,11,20,0.5) 0%, transparent 30%, transparent 70%, rgba(5,11,20,1) 100%);
  }

  .logo-aura {
    position: relative;
  }
  .logo-aura::before {
    content: '';
    position: absolute;
    inset: -60px;
    background: radial-gradient(circle at center, rgba(230,57,70,0.25) 0%, rgba(200,150,26,0.08) 40%, transparent 70%);
    z-index: -1;
    animation: aura-pulse 4s ease-in-out infinite;
  }
  @keyframes aura-pulse {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  /* Filter chip */
  .chip {
    transition: all 300ms cubic-bezier(0.16, 1, 0.3, 1);
    cursor: pointer;
    user-select: none;
  }
  .chip.active {
    background: linear-gradient(135deg, #C8961A 0%, #E9C176 100%);
    color: #050B14;
    border-color: #C8961A;
    box-shadow: 0 4px 20px rgba(200,150,26,0.3);
  }

  /* Range slider */
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(244,240,232,0.15);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    background: linear-gradient(135deg, #E9C176, #C8961A);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(200,150,26,0.4);
    transition: transform 200ms ease;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }

  /* Particle drift */
  @keyframes drift {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(20px, -30px); }

    position: relative;

    content: '';
    position: absolute;

// ─── HERO ─────────────────────────────────────────────────────────────
function Hero({t, isAr, onApply}) {
  const ref = useRef(null);
  const [mouse, setMouse] = useState({x:0,y:0});

  const onMove = (e) => {
    if (!ref.current) return;
    const r = ref.current.getBoundingClientRect();
    setMouse({
      x: ((e.clientX - r.left) / r.width - 0.5) * 2,
      y: ((e.clientY - r.top) / r.height - 0.5) * 2,
    });
  };

  return (
    <section
      ref={ref}
      onMouseMove={onMove}
      onMouseLeave={()=>setMouse({x:0,y:0})}
      className="relative min-h-screen w-full flex flex-col justify-center items-center text-center px-6 overflow-hidden hero-bg"
    >
      {/* Radial red light */}
      <div className="absolute inset-0 z-0"
        style={{
          background: `radial-gradient(circle at ${50 + mouse.x*8}% ${30 + mouse.y*8}%, rgba(230,57,70,0.18) 0%, transparent 50%)`,
          transition: 'background 600ms cubic-bezier(0.16,1,0.3,1)'
        }}
      />
      {/* Hairline grid */}
      <div className="absolute inset-0 z-0 opacity-[0.05]"
        style={{
          backgroundImage:'linear-gradient(to right, #C8961A 1px, transparent 1px), linear-gradient(to bottom, #C8961A 1px, transparent 1px)',
          backgroundSize:'5rem 5rem'
        }}
      />

      {/* Content */}
      <div className="relative z-10 max-w-5xl w-full flex flex-col items-center space-y-8 pt-32 pb-16"
        style={{
          transform: `translate(${mouse.x*3}px, ${mouse.y*3}px)`,
          transition: 'transform 800ms cubic-bezier(0.16,1,0.3,1)',
        }}
      >
        {/* Big logo with aura */}
        <div className="logo-aura mb-4"

    if (arr.includes(val)) setFilters({...filters, [key]: arr.filter(x=>x!==val)});
    else setFilters({...filters, [key]: [...arr, val]});
  };
  const setOne = (key, val) => setFilters({...filters, [key]: val});
  const reset = () => setFilters({purpose:'ALL', types:[], compounds:[], beds:0, furnish:[], budget:25000000, amenities:[], notice:[]});

  return (
    <section id="smartfilter" className="relative py-20 px-6 md:px-12 max-w-[1500px] mx-auto z-20">
      <div className="text-center mb-10">
        <span className="text-[#C8961A] uppercase tracking-[0.28em] text-[10px] font-bold font-mono px-3 py-1 bg-white/5 backdrop-blur-md rounded-full border border-white/10">Smart Filter Engine</span>

// ─── APP ──────────────────────────────────────────────────────────────
function App() {
  const [lang, setLang] = useState('en');
  const isAr = lang === 'ar';
  const t = DICT[lang];

  const [filters, setFilters] = useState({
    purpose:'ALL', types:[], compounds:[], beds:0, furnish:[],
    budget:25000000, amenities:[], notice:[],
  });

  const filtered = useMemo(()=>{
    return INVENTORY.filter(p=>{
      if (filters.purpose!=='ALL' && p.purpose!==filters.purpose) return false;
      if (filters.types.length && !filters.types.includes(p.type)) return false;
      if (filters.compounds.length && !filters.compounds.includes(p.compoundKey)) return false;
      if (filters.beds && p.beds < filters.beds) return false;
      if (filters.furnish.length && !filters.furnish.includes(p.furnish)) return false;
      if (p.price > filters.budget) return false;
      if (filters.amenities.length && !filters.amenities.every(a=>p.amenities.includes(a))) return false;
      if (filters.notice.length && !filters.notice.includes(p.notice)) return false;
      return true;
    });
  },[filters]);

  useEffect(()=>{
    document.documentElement.dir = t.dir;
    document.documentElement.lang = lang;
  },[lang]);

  return (
    <div dir={t.dir} className="min-h-screen bg-[#050B14] text-[#F4F0E8] antialiased">
      <Nav lang={lang} setLang={setLang} t={t}/>
      <Hero t={t} isAr={isAr}/>
      <SmartFilter t={t} isAr={isAr} filters={filters} setFilters={setFilters} matchCount={filtered.length}/>
      <SmartMap t={t} isAr={isAr} list={filtered}/>
      <AIFeatures t={t}/>
      <Listings t={t} isAr={isAr} list={filtered}/>
      <Why t={t}/>
      <QuickRequest t={t} isAr={isAr}/>
      <Footer t={t}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
