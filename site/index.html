<style>
*{box-sizing:border-box;-webkit-font-smoothing:antialiased;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:#04080f;font-family:'Inter',sans-serif;}
.stage{width:100%;}
.phone{width:100vw;height:100vh;height:100dvh;background:#0a0a0a;position:relative;overflow:hidden;}
.phone-screen{position:absolute;inset:0;overflow:hidden;}
.dyn-island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:126px;height:36px;background:#000;border-radius:20px;z-index:200;pointer-events:none;}
.home-bar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(255,255,255,.22);border-radius:3px;z-index:200;pointer-events:none;}
.btn-vup{position:absolute;left:-3px;top:158px;width:3px;height:44px;background:#1e1e1e;border-radius:3px 0 0 3px;}
.btn-vdn{position:absolute;left:-3px;top:214px;width:3px;height:44px;background:#1e1e1e;border-radius:3px 0 0 3px;}
.btn-pwr{position:absolute;right:-3px;top:190px;width:3px;height:70px;background:#1e1e1e;border-radius:0 3px 3px 0;}
.scr{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;}
.scr::-webkit-scrollbar{display:none;}
.dev-lbl{display:none;}
.dyn-island,.home-bar,.btn-vup,.btn-vdn,.btn-pwr{display:none!important;}
/* Leaflet always light */
.leaflet-container{background:#e8eef5!important;color-scheme:light!important;}
.leaflet-control-attribution{display:none!important;}
.leaflet-tile-pane{filter:sepia(.22) saturate(.68) brightness(1.05) contrast(.96);}
.leaflet-control-zoom{border:none!important;margin:0 8px 8px 0!important;}
.leaflet-control-zoom a{width:28px!important;height:28px!important;line-height:28px!important;background:rgba(255,255,255,.97)!important;color:#0D2035!important;border:1px solid rgba(13,32,53,.18)!important;font-size:16px!important;box-shadow:0 2px 8px rgba(13,32,53,.12)!important;}
.leaflet-control-zoom-in{border-radius:8px 8px 0 0!important;}
.leaflet-control-zoom-out{border-radius:0 0 8px 8px!important;}
.s-marker{display:flex;align-items:center;gap:0;cursor:pointer;}
.s-dot{width:11px;height:11px;border-radius:50%;background:#141414;box-shadow:0 0 0 3px rgba(255,255,255,.85);flex-shrink:0;}
.s-line{width:26px;height:1.5px;background:#141414;flex-shrink:0;}
.s-lbl{font-family:'Plus Jakarta Sans','Inter',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#141414;white-space:nowrap;background:rgba(244,239,230,.72);padding:2px 5px;border-radius:2px;}
.s-marker:hover .s-dot{transform:scale(1.35);transition:transform .18s;}
.s-tear{width:40px;height:40px;background:#141414;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.35);}
.s-tear-hole{width:12px;height:12px;border-radius:50%;background:#F4EFE6;transform:rotate(45deg);}
.s-landmark{width:9px;height:9px;background:#141414;border:none;border-radius:50%;box-shadow:0 0 0 3px rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;font-size:0;}
.s-landmark-tip{font-family:'Plus Jakarta Sans',Inter,sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:#141414!important;color:#fff!important;border:none!important;padding:3px 8px!important;border-radius:2px!important;}
@keyframes tickerMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}
body[data-theme="light"] h1,body[data-theme="light"] h2:not(.braces){font-family:'Plus Jakarta Sans',sans-serif!important;font-weight:700!important;}
.ut{width:100%;border-collapse:collapse;}
.ut th{padding:6px 4px;text-align:left;font-size:7.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(13,32,53,.6);position:sticky;top:0;z-index:2;cursor:pointer;white-space:nowrap;border-bottom:1.5px solid rgba(13,32,53,.1);background:#EDE8DF;}
.ut td{padding:7px 4px;border-bottom:1px solid rgba(13,32,53,.06);font-size:10px;vertical-align:middle;white-space:nowrap;color:#1C2430;}
.ut tr:hover td{background:rgba(200,150,26,.04);}
.pill-av{display:inline-block;padding:2px 7px;border-radius:20px;font-size:7px;font-weight:800;text-transform:uppercase;background:rgba(52,211,153,.12);color:#059669;border:1px solid rgba(52,211,153,.28);}
.pill-uo{display:inline-block;padding:2px 7px;border-radius:20px;font-size:7px;font-weight:800;text-transform:uppercase;background:rgba(245,158,11,.12);color:#b45309;border:1px solid rgba(245,158,11,.28);}
.pill-so{display:inline-block;padding:2px 7px;border-radius:20px;font-size:7px;font-weight:800;text-transform:uppercase;background:rgba(230,57,70,.1);color:#b91c1c;border:1px solid rgba(230,57,70,.22);}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:rgba(13,32,53,.15);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:linear-gradient(135deg,#E9C176,#C8961A);border-radius:50%;cursor:pointer;box-shadow:0 3px 10px rgba(200,150,26,.4);}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}
@keyframes dotPulse{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes popIn{from{opacity:0;transform:scale(.86)}to{opacity:1;transform:scale(1)}}
@keyframes markerDrop{from{opacity:0;transform:translateY(-12px) scale(.8)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes glowRing{0%,100%{box-shadow:0 0 0 0 rgba(200,150,26,.45)}60%{box-shadow:0 0 0 8px rgba(200,150,26,0)}}
@keyframes scanLine{0%{top:-4%}100%{top:104%}}
@keyframes lineGrow{from{stroke-dashoffset:1000}to{stroke-dashoffset:0}}
@keyframes dotAppear{from{opacity:0}to{opacity:1}}
@keyframes radarPing{0%{transform:scale(.4);opacity:.8}100%{transform:scale(2.4);opacity:0}}
@keyframes mapGlow{0%,100%{text-shadow:0 0 18px rgba(200,150,26,.5),0 0 40px rgba(200,150,26,.2)}50%{text-shadow:0 0 32px rgba(200,150,26,.85),0 0 70px rgba(200,150,26,.4)}}
@keyframes scanH{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes kenBurns{from{transform:scale(1.02)}to{transform:scale(1.14)}}
@keyframes sheen{0%{transform:translateX(-120%) skewX(-20deg)}60%,100%{transform:translateX(320%) skewX(-20deg)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.icon-spring{transition:transform .4s cubic-bezier(.34,1.56,.64,1);will-change:transform;}
.icon-spring:hover{transform:scale(1.22) rotate(-5deg);}
.icon-spring:active{transform:scale(.82);}
.icon-spring.icon-on{transform:scale(1.16);}
.icon-spring.icon-on:hover{transform:scale(1.26) rotate(-5deg);}
.ai-card:hover .icon-spring{transform:scale(1.2) rotate(-6deg);}
.ai-card:active .icon-spring{transform:scale(.85);}
.icon-pop{animation:iconPop .45s cubic-bezier(.34,1.56,.64,1);}
@keyframes iconPop{0%{transform:scale(1)}40%{transform:scale(1.32) rotate(-6deg)}100%{transform:scale(1)}}

/* ── Desktop reflow (mobile-first; ≥860px widens the same layout) ── */
@media (min-width: 860px){
  .status-bar{display:none!important;}
  .sec-inner{max-width:1100px;margin-left:auto;margin-right:auto;}
  .glass-card{max-width:1140px;margin:0 auto;}
  .hero-inner{max-width:1040px;margin:0 auto;width:100%;}
  #s-hero{min-height:600px!important;padding-top:64px!important;justify-content:center!important;}
  .hero-h1{font-size:52px!important;line-height:1.06!important;max-width:860px;}
  .hero-eye{font-size:10px!important;letter-spacing:.24em!important;}
  .hero-filter{max-width:660px;}
  .cards-grid{grid-template-columns:repeat(4,1fr)!important;}
  .bottom-nav{width:100%;max-width:620px;margin:0 auto;border:1px solid rgba(200,150,26,.22)!important;border-bottom:none!important;border-radius:18px 18px 0 0;padding-bottom:12px!important;}
  .sheet-page{max-width:820px!important;margin-left:auto!important;margin-right:auto!important;box-shadow:0 40px 120px rgba(0,0,0,.55);}
}
</style>
</head>
