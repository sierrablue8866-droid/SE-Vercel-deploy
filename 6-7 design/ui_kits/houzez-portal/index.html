<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sierra Estates · New Cairo Properties</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>
<script src="data.js"></script>
<script src="shared.js"></script>
<style>
/* ── hero slider ── */
.hero{position:relative;min-height:640px;display:flex;flex-direction:column;justify-content:center;padding:70px 0 140px;overflow:hidden;background:#0a1622;}
.hero .slide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s var(--silk);z-index:0;}
.hero .slide.on{opacity:1;}
.hero .slide img{width:100%;height:100%;object-fit:cover;}
@media(prefers-reduced-motion:no-preference){.hero .slide.on img{animation:kenburns 9s linear forwards;}}
.hero .scrim{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(0,25,45,.46) 0%,rgba(0,25,45,.30) 40%,rgba(0,20,38,.72) 100%);}
[data-theme="dark"] .hero .scrim{background:linear-gradient(180deg,rgba(8,8,10,.55) 0%,rgba(8,8,10,.38) 40%,rgba(8,8,10,.82) 100%);}
.hero .wrap{position:relative;z-index:2;}
.hero .h-eyebrow{font-family:var(--mono);text-transform:uppercase;letter-spacing:.28em;font-size:12px;font-weight:600;color:#8fe1ff;margin-bottom:16px;display:flex;align-items:center;gap:10px;min-height:18px;}
[dir="rtl"] .hero .h-eyebrow{letter-spacing:.06em;font-family:var(--font);}
[data-theme="dark"] .hero .h-eyebrow{color:#e9c176;}
.hero .h-eyebrow::before{content:"";width:26px;height:2px;background:var(--pri);display:inline-block;}
.hero h1{color:#fff;font-size:52px;font-weight:800;letter-spacing:-.025em;max-width:820px;line-height:1.1;min-height:2.2em;}
[dir="rtl"] .hero h1{letter-spacing:0;}
.hero h1 .hl{color:var(--pri);}
[data-theme="dark"] .hero h1 .hl{color:#e9c176;}
.hero p.sub{color:rgba(255,255,255,.88);font-size:18px;margin-top:18px;max-width:560px;}
.hero .quick{display:flex;gap:26px;margin-top:26px;color:rgba(255,255,255,.9);font-size:14px;font-weight:600;flex-wrap:wrap;}
.hero .quick span{display:inline-flex;align-items:center;gap:8px;}
.hero .quick .i{color:var(--pri);}
[data-theme="dark"] .hero .quick .i{color:#e9c176;}
.hero .dots{position:absolute;bottom:104px;inset-inline-start:24px;z-index:3;display:flex;gap:8px;}
.hero .dots button{width:26px;height:4px;border-radius:2px;border:none;background:rgba(255,255,255,.35);cursor:pointer;transition:.3s;padding:0;}
.hero .dots button.on{background:var(--pri);width:44px;}
[data-theme="dark"] .hero .dots button.on{background:#e9c176;}
.hero .map-cta{position:absolute;left:50%;bottom:118px;transform:translateX(-50%);z-index:4;display:inline-flex;align-items:center;gap:11px;background:rgba(255,255,255,.14);backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,.35);color:#fff;font-family:var(--font);font-weight:700;font-size:14.5px;border-radius:999px;padding:13px 24px;cursor:pointer;transition:.25s var(--silk);white-space:nowrap;text-decoration:none;}
.hero .map-cta:hover{background:rgba(255,255,255,.24);transform:translateX(-50%) translateY(-2px);border-color:rgba(255,255,255,.6);}
.hero .map-cta .mc-ic{width:34px;height:34px;border-radius:50%;background:var(--pri);display:grid;place-items:center;flex:none;animation:pulseDot 2.4s infinite;}
[data-theme="dark"] .hero .map-cta .mc-ic{background:#c8961a;color:#0d0d0f;}
.hero .map-cta .i{width:17px;height:17px;}
@media(max-width:680px){.hero .map-cta{bottom:96px;font-size:13px;padding:11px 18px;}}

/* ── search card ── */
.searchbar{position:relative;z-index:5;margin-top:-76px;}
.search-card{background:var(--surface);border-radius:14px;box-shadow:var(--shadow-m);border:1px solid var(--line);overflow:hidden;}
.search-tabs{display:flex;padding:0 8px;border-bottom:1px solid var(--line);}
.search-tabs button{background:none;border:none;font-family:var(--font);font-weight:700;font-size:14px;color:var(--text);padding:16px 22px;cursor:pointer;position:relative;}
.search-tabs button.active{color:var(--pri);}
.search-tabs button.active::after{content:"";position:absolute;left:14px;right:14px;bottom:-1px;height:3px;background:var(--pri);border-radius:3px 3px 0 0;}
.search-fields{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr auto;}
.field{padding:16px 20px;border-inline-end:1px solid var(--line);}
.field:last-child{border-inline-end:none;}
.field label{display:block;font-family:var(--mono);text-transform:uppercase;letter-spacing:.14em;font-size:10.5px;font-weight:600;color:var(--muted);margin-bottom:6px;}
[dir="rtl"] .field label{letter-spacing:.02em;font-family:var(--font);}
.field .val{display:flex;align-items:center;gap:8px;color:var(--ink);font-weight:600;font-size:15px;cursor:pointer;}
.field .val .i{color:var(--pri);width:17px;height:17px;}
.field .val .chev{margin-inline-start:auto;color:var(--muted);width:16px;height:16px;}
.field.searchbtn{display:flex;align-items:center;padding:12px 14px;}
.field.searchbtn .btn{width:100%;height:100%;padding:14px 26px;font-size:15px;}

/* ── compounds preview ── */
.grid-comp{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;}
.comp{position:relative;height:250px;border-radius:var(--r-card);overflow:hidden;cursor:pointer;display:block;}
.comp img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--silk);}
.comp:hover img{transform:scale(1.06);}
.comp .co-scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,25,45,0) 30%,rgba(0,25,45,.82) 100%);z-index:2;pointer-events:none;}
.comp .co-body{position:absolute;inset-inline-start:18px;inset-inline-end:18px;bottom:16px;z-index:3;color:#fff;pointer-events:none;}
.comp .co-body h4{color:#fff;font-size:18px;}
.comp .co-body span{font-family:var(--mono);font-size:12px;color:#bfeaff;letter-spacing:.05em;}
[data-theme="dark"] .comp .co-body span{color:#e9c176;}
.comp .co-count{position:absolute;top:14px;inset-inline-end:14px;z-index:3;background:rgba(255,255,255,.92);color:var(--navy);font-family:var(--mono);font-weight:700;font-size:12px;padding:5px 10px;border-radius:6px;white-space:nowrap;}

/* ── 360 rooms strip ── */
.rooms{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(340px,1fr);gap:20px;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:12px;scrollbar-width:thin;}
.room{position:relative;height:300px;border-radius:var(--r-card);overflow:hidden;scroll-snap-align:start;}
.room img{width:100%;height:100%;object-fit:cover;transition:transform .7s var(--silk);}
.room:hover img{transform:scale(1.07);}
.room .r-scrim{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,20,38,.85) 100%);z-index:2;}
.room .r-body{position:absolute;inset-inline-start:20px;inset-inline-end:20px;bottom:18px;z-index:3;}
.room .r-body h4{color:#fff;font-size:19px;}
.room .r-body span{font-family:var(--mono);font-size:11.5px;color:rgba(255,255,255,.75);letter-spacing:.05em;}
.room .r-360{position:absolute;top:16px;inset-inline-start:16px;z-index:3;background:rgba(0,174,255,.92);color:#fff;font-family:var(--mono);font-weight:700;font-size:11px;letter-spacing:.1em;padding:6px 11px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;animation:floaty 4s ease-in-out infinite;}
[data-theme="dark"] .room .r-360{background:rgba(200,150,26,.94);color:#0d0d0f;}
@media(prefers-reduced-motion:reduce){.room .r-360{animation:none;}}

/* ── stats ── */
.stats{background:var(--navy);position:relative;overflow:hidden;}
.stats::before{content:"";position:absolute;inset:0;background:radial-gradient(600px 300px at 85% 10%,rgba(0,174,255,.22),transparent 60%);}
[data-theme="dark"] .stats::before{background:radial-gradient(600px 300px at 85% 10%,rgba(200,150,26,.16),transparent 60%);}
.stats .wrap{position:relative;z-index:2;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;padding:56px 24px;}
.stat{text-align:center;color:#fff;}
.stat b{font-family:var(--mono);font-size:42px;font-weight:700;color:var(--pri);display:block;letter-spacing:-.02em;}
[data-theme="dark"] .stat b{color:#e9c176;}
.stat span{font-size:14px;color:rgba(255,255,255,.7);font-weight:500;}

/* ── why ── */
.net-banner{display:grid;grid-template-columns:1.5fr 1fr;gap:36px;align-items:center;background:var(--navy);border-radius:16px;padding:44px 48px;margin-bottom:30px;position:relative;overflow:hidden;}
[data-theme="dark"] .net-banner{background:linear-gradient(135deg,#12100a,#221c0d);border:1px solid rgba(200,150,26,.25);}
.net-banner::before{content:"";position:absolute;inset:0;background:radial-gradient(560px 300px at 100% 0%,rgba(0,174,255,.18),transparent 62%);pointer-events:none;}
[data-theme="dark"] .net-banner::before{background:radial-gradient(560px 300px at 100% 0%,rgba(200,150,26,.16),transparent 62%);}
.net-banner>*{position:relative;z-index:2;}
.net-banner .eyebrow{color:#8fe1ff;margin-bottom:14px;}
[data-theme="dark"] .net-banner .eyebrow{color:#e9c176;}
.net-banner .eyebrow::before{background:currentColor;}
.net-banner h3{color:#fff;font-size:26px;line-height:1.25;letter-spacing:-.01em;}
.net-banner p{color:rgba(255,255,255,.72);margin-top:14px;font-size:14.5px;line-height:1.75;}
.nb-stats{display:flex;flex-direction:column;gap:20px;border-inline-start:1px solid rgba(255,255,255,.14);padding-inline-start:36px;}
.nb-stat b{display:block;font-family:var(--mono);font-size:38px;font-weight:700;color:var(--pri);letter-spacing:-.02em;line-height:1;}
[data-theme="dark"] .nb-stat b{color:#e9c176;}
.nb-stat span{display:block;color:rgba(255,255,255,.66);font-size:13px;margin-top:6px;}
.grid-feat{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;}
.feat{padding:28px;border:1px solid var(--line);border-radius:var(--r-card);transition:.25s var(--silk);background:var(--surface);}
.feat:hover{border-color:var(--pri);box-shadow:var(--shadow-s);transform:translateY(-3px);}
.feat .ic{width:52px;height:52px;border-radius:12px;background:var(--pri-soft);color:var(--pri);display:grid;place-items:center;margin-bottom:18px;}
.feat .ic .i{width:24px;height:24px;}
.feat h4{font-size:17px;margin-bottom:8px;}
.feat p{font-size:13.5px;}

/* ── cta ── */
.cta{position:relative;border-radius:16px;overflow:hidden;padding:56px 60px;background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap;}
[data-theme="dark"] .cta{background:linear-gradient(135deg,#c8961a,#8f6a0f);}
.cta::before{content:"";position:absolute;inset:0;background:radial-gradient(500px 260px at 90% -20%,rgba(255,255,255,.25),transparent 60%);}
.cta .ct-txt{position:relative;z-index:2;}
.cta h2{color:#fff;font-size:30px;}
.cta p{color:rgba(255,255,255,.9);margin-top:8px;font-size:16px;}
.cta .ct-act{position:relative;z-index:2;display:flex;gap:12px;flex-wrap:wrap;}
.cta .btn-white{background:#fff;color:var(--pri);}
[data-theme="dark"] .cta .btn-white{color:#8f6a0f;}
.cta .btn-white:hover{background:#f0fbff;}
.cta .btn-out{background:transparent;border:1.5px solid rgba(255,255,255,.6);color:#fff;}
.cta .btn-out:hover{border-color:#fff;background:rgba(255,255,255,.1);}

/* ── testimonials ── */
.testi-band{background:var(--pri-soft);}
[data-theme="dark"] .testi-band{background:#15130c;}
.grid-testi{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
.tcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);padding:28px;display:flex;flex-direction:column;gap:16px;transition:.25s var(--silk);}
.tcard:hover{transform:translateY(-4px);box-shadow:var(--shadow-m);}
.tcard .stars{display:flex;gap:3px;color:#f5a623;}
.tcard .stars .i{width:15px;height:15px;fill:currentColor;}
.tcard p{font-size:14.5px;line-height:1.75;flex:1;}
.tcard .who{display:flex;align-items:center;gap:11px;border-top:1px solid var(--line);padding-top:16px;}
.tcard .who .av{width:38px;height:38px;border-radius:50%;background:var(--navy);color:var(--pri);display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:13px;flex:none;}
[data-theme="dark"] .tcard .who .av{background:#221c0d;color:#e9c176;}
.tcard .who b{display:block;color:var(--ink);font-size:13.5px;}
.tcard .who small{font-size:12px;color:var(--muted);}

/* ── perfect choice + inquiry ── */
.perfect{display:grid;grid-template-columns:1.15fr 1fr;border-radius:16px;overflow:hidden;box-shadow:var(--shadow-m);}
.perfect .pf-left{position:relative;background:var(--navy);padding:52px 48px;color:#fff;overflow:hidden;}
.perfect .pf-left::before{content:"";position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1600047509807-ba8f99d2cdde?w=1200&q=70') center/cover;opacity:.14;}
.perfect .pf-left::after{content:"";position:absolute;inset:0;background:radial-gradient(600px 300px at 10% 0%,rgba(0,174,255,.25),transparent 60%);}
[data-theme="dark"] .perfect .pf-left::after{background:radial-gradient(600px 300px at 10% 0%,rgba(200,150,26,.2),transparent 60%);}
.perfect .pf-left>*{position:relative;z-index:2;}
.perfect .pf-left h2{color:#fff;font-size:30px;margin-bottom:10px;}
.perfect .pf-left>p{color:rgba(255,255,255,.75);margin-bottom:30px;}
.pf-item{display:flex;gap:18px;padding:18px 0;border-top:1px solid rgba(255,255,255,.12);}
.pf-item .num{font-family:var(--mono);font-weight:700;font-size:26px;color:var(--pri);flex:none;line-height:1.2;}
[data-theme="dark"] .pf-item .num{color:#e9c176;}
.pf-item h4{color:#fff;font-size:16.5px;margin-bottom:5px;}
.pf-item p{color:rgba(255,255,255,.68);font-size:13.5px;line-height:1.65;}
.inq{background:var(--surface);padding:44px 42px;}
.inq h3{font-size:22px;margin-bottom:4px;}
.inq>p{font-size:13.5px;margin-bottom:22px;}
.inq .seg{display:flex;gap:8px;margin-bottom:18px;}
.inq .seg button{flex:1;font-family:var(--font);font-weight:700;font-size:13.5px;padding:10px;border-radius:8px;border:1.5px solid var(--line-2);background:var(--surface);color:var(--text);cursor:pointer;transition:.2s;}
.inq .seg button.on{background:var(--pri);border-color:var(--pri);color:#fff;}
[data-theme="dark"] .inq .seg button.on{color:#0d0d0f;}
.inq .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.inq label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
[dir="rtl"] .inq label{letter-spacing:.02em;font-family:var(--font);}
.inq input,.inq select{width:100%;font-family:var(--font);font-size:14px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:11px 13px;outline:none;transition:border-color .2s;}
.inq input:focus,.inq select:focus{border-color:var(--pri);}
.inq .btn{width:100%;margin-top:8px;padding:13px;}

/* ── partners ── */
.partners{border-top:1px solid var(--line);padding:44px 0;background:var(--surface-2);}
.partners .p-eye{text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);margin-bottom:26px;}
[dir="rtl"] .partners .p-eye{letter-spacing:.05em;font-family:var(--font);}
.partners .row{display:flex;justify-content:center;gap:52px;flex-wrap:wrap;align-items:center;}
.partners .row span{font-family:var(--mono);font-weight:700;font-size:15px;letter-spacing:.18em;color:var(--muted);opacity:.75;transition:.2s;white-space:nowrap;}
.partners .row span:hover{color:var(--pri);opacity:1;}

/* ── market ticker ── */
.ticker{background:var(--navy);border-top:1px solid rgba(200,150,26,.2);border-bottom:1px solid rgba(200,150,26,.2);overflow:hidden;padding:11px 0;}
[data-theme="dark"] .ticker{background:#0a0a0c;}
.ticker .row{display:flex;width:max-content;animation:tickerMove 30s linear infinite;}
[dir="rtl"] .ticker .row{animation-direction:reverse;}
@media(prefers-reduced-motion:reduce){.ticker .row{animation:none;}}
@keyframes tickerMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker .row span{display:inline-flex;align-items:center;gap:10px;padding:0 20px;font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#e9c176;white-space:nowrap;}
[dir="rtl"] .ticker .row span{letter-spacing:.02em;font-family:var(--font);}
.ticker .row span::after{content:"";width:5px;height:5px;border-radius:50%;background:#c8961a;opacity:.7;}

/* ── AI hub (always dark band) ── */
.ai-hub{background:#07121e;position:relative;overflow:hidden;padding:74px 0;}
.ai-hub::before{content:"";position:absolute;top:-160px;left:50%;width:520px;height:520px;margin-left:-260px;border-radius:50%;background:radial-gradient(circle,rgba(200,150,26,.13),transparent 62%);pointer-events:none;}
.ai-hub .wrap{position:relative;z-index:2;}
.ai-hub .ai-eye{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#c8961a;opacity:.75;margin-bottom:12px;display:flex;align-items:center;gap:9px;}
[dir="rtl"] .ai-hub .ai-eye{letter-spacing:.04em;font-family:var(--font);}
.ai-hub .ai-eye .live{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.ai-hub h2{color:#fff;font-size:34px;max-width:640px;letter-spacing:-.02em;}
.ai-hub .ai-lead{color:rgba(255,255,255,.42);font-size:15px;margin-top:10px;max-width:520px;}
.ai-hub .ai-scan{margin:26px 0;height:1px;background:linear-gradient(90deg,transparent,#c8961a,transparent);position:relative;}
.ai-hub .ai-scan::after{content:"";position:absolute;top:-3px;left:0;right:0;height:7px;background:linear-gradient(90deg,transparent,rgba(200,150,26,.25),transparent);animation:scanLine 3s linear infinite;}
@keyframes scanLine{0%{transform:translateX(-30%)}100%{transform:translateX(30%)}}
.ai-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.ai-card{padding:22px 18px;border-radius:16px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);cursor:pointer;transition:.3s var(--silk);text-align:start;position:relative;overflow:hidden;display:block;}
.ai-card:hover{transform:translateY(-5px);border-color:rgba(200,150,26,.4);background:rgba(255,255,255,.06);}
.ai-card .ai-ic{width:46px;height:46px;margin-bottom:13px;display:inline-flex;}
.ai-card .ai-ic svg{width:46px;height:46px;}
.ai-card h4{color:#fff;font-size:15px;margin-bottom:5px;}
.ai-card p{color:rgba(255,255,255,.44);font-size:12.5px;line-height:1.55;}
.ai-card .live-tag{margin-top:11px;font-size:9.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#4ade80;display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);}
.ai-card .live-tag::before{content:"";width:5px;height:5px;border-radius:50%;background:#4ade80;animation:blink 2s infinite;}

/* ── tour launch ── */
.tour-launch{display:flex;align-items:center;gap:16px;width:100%;padding:20px 24px;border-radius:16px;background:linear-gradient(135deg,var(--navy),#0a3a63);border:1px solid rgba(200,150,26,.35);cursor:pointer;text-align:start;transition:.25s var(--silk);}
[data-theme="dark"] .tour-launch{background:linear-gradient(135deg,#12100a,#26200f);}
.tour-launch:hover{transform:translateY(-3px);box-shadow:var(--shadow-m);}
.tour-launch .t-ic{flex:none;color:#e9c176;}
.tour-launch .t-txt{flex:1;}
.tour-launch .t-txt b{display:block;color:#fff;font-size:16px;margin-bottom:3px;}
.tour-launch .t-txt span{color:#e9c176;font-size:12px;font-family:var(--mono);}
[dir="rtl"] .tour-launch .t-txt span{font-family:var(--font);}
.tour-launch .t-play{flex:none;width:44px;height:44px;border-radius:50%;background:rgba(200,150,26,.16);display:grid;place-items:center;color:#e9c176;}
.tour-modal{position:fixed;inset:0;z-index:950;background:#07111e;display:none;}
.tour-modal.on{display:block;}
.tour-modal iframe{width:100%;height:100%;border:none;display:block;}
.tour-modal .t-close{position:absolute;top:16px;inset-inline-end:16px;width:42px;height:42px;border-radius:50%;background:rgba(7,17,30,.92);border:1px solid rgba(200,150,26,.45);color:#e9c176;font-size:22px;cursor:pointer;display:grid;place-items:center;z-index:10;}
.tour-hero{display:block;position:relative;width:100%;height:440px;border-radius:16px;overflow:hidden;border:1px solid var(--line);cursor:pointer;padding:0;background:var(--bg);}
.tour-hero img{width:100%;height:100%;object-fit:cover;transition:transform .8s var(--silk);}
.tour-hero:hover img{transform:scale(1.05);}
.tour-hero .th-scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,20,38,.15) 0%,rgba(0,20,38,.15) 45%,rgba(0,20,38,.82) 100%);}
.tour-hero .th-badge{position:absolute;top:18px;inset-inline-start:18px;background:rgba(0,174,255,.92);color:#fff;font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:.08em;padding:7px 13px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;}
[data-theme="dark"] .tour-hero .th-badge{background:rgba(200,150,26,.94);color:#0d0d0f;}
.tour-hero .th-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:78px;height:78px;border-radius:50%;background:rgba(255,255,255,.92);color:var(--navy);display:grid;place-items:center;box-shadow:0 10px 40px rgba(0,0,0,.35);transition:.25s var(--silk);}
.tour-hero .th-play .i{width:30px;height:30px;margin-inline-start:4px;}
.tour-hero:hover .th-play{transform:translate(-50%,-50%) scale(1.1);background:#fff;}
.tour-hero .th-body{position:absolute;inset-inline-start:24px;inset-inline-end:24px;bottom:22px;text-align:start;}
.tour-hero .th-body b{display:block;color:#fff;font-size:24px;font-weight:700;margin-bottom:5px;letter-spacing:-.01em;}
.tour-hero .th-body span{color:#e9c176;font-family:var(--mono);font-size:13px;letter-spacing:.04em;}
[dir="rtl"] .tour-hero .th-body span{font-family:var(--font);}
@media(max-width:680px){.tour-hero{height:320px;}.tour-hero .th-body b{font-size:19px;}}

@media(max-width:1080px){
  .ai-grid{grid-template-columns:repeat(2,1fr);}
  .hero h1{font-size:40px;}
  .search-fields{grid-template-columns:1fr 1fr;}
  .field.searchbtn{grid-column:1/-1;}
  .grid-comp,.grid-feat{grid-template-columns:repeat(2,1fr);}
  .grid-testi{grid-template-columns:1fr;}
  .perfect{grid-template-columns:1fr;}
}
@media(max-width:680px){
  .search-fields{grid-template-columns:1fr;}
  .field{border-inline-end:none;border-bottom:1px solid var(--line);}
  .grid-comp,.grid-feat,.stats .wrap{grid-template-columns:1fr;}
  .ai-grid{grid-template-columns:1fr;}
  .net-banner{grid-template-columns:1fr;padding:32px 26px;}
  .nb-stats{flex-direction:row;flex-wrap:wrap;gap:24px;border-inline-start:none;padding-inline-start:0;border-top:1px solid rgba(255,255,255,.14);padding-top:24px;}
  .net-banner h3{font-size:21px;}
  .inq .frow{grid-template-columns:1fr;}
  .perfect .pf-left,.inq{padding:32px 26px;}
  .cta{padding:36px 28px;}
}
</style>

<script>

  var D = window.HZDATA;
  var isAr = (localStorage.getItem('hzp-lang') || 'en') === 'ar';

  /* hero slides */
  document.getElementById('hero-slides').innerHTML = D.slides.map(function (s, i) {
    return '<div class="slide' + (i === 0 ? ' on' : '') + '"><img src="' + s.img + '" alt=""/></div>';
  }).join('');
  document.getElementById('hero-dots').innerHTML = D.slides.map(function (_, i) {
    return '<button type="button"' + (i === 0 ? ' class="on"' : '') + ' aria-label="Slide ' + (i + 1) + '"></button>';
  }).join('');

  var cur = 0, slides, dots, timer;
  function setSlide(n) {
    slides[cur].classList.remove('on'); dots[cur].classList.remove('on');
    cur = n % D.slides.length;
    slides[cur].classList.add('on'); dots[cur].classList.add('on');
    var s = D.slides[cur];
    document.getElementById('hero-pre').textContent = isAr ? s.preAr : s.pre;
    var main = isAr ? s.mainAr : s.main;
    var words = main.split(' ');
    var hl = words.splice(-3).join(' ');
    document.getElementById('hero-main').innerHTML = words.join(' ') + ' <span class="hl">' + hl + '</span>';
  }
  function arm() { clearInterval(timer); timer = setInterval(function () { setSlide(cur + 1); }, 6500); }

  /* featured (6) + compound tiles + rooms */
  document.getElementById('prop-grid').innerHTML = D.listings.slice(0, 6).map(HZ.pcard).join('');
  var picks = ['Hyde Park New Cairo', 'Mivida', 'Mountain View iCity', 'Eastown (SODIC)'];

  /* testimonials */

  document.getElementById('testi-grid').innerHTML = [1, 2, 3].map(function (n, i) {
    var nm = HZ.t('t' + n + 'n');
    var initials = nm.split(' ').slice(0, 2).map(function (w) { return w[0]; }).join('');

  /* AI hub cards */

  var aiTools = [
    { k: 'engine', t: 'ai1t', s: 'ai1s', live: true, href: 'compounds.html' },
    { k: 'match', t: 'ai2t', s: 'ai2s', href: 'properties.html' },
    { k: 'roi', t: 'ai3t', s: 'ai3s', href: 'compounds.html' },
    { k: 'price', t: 'ai4t', s: 'ai4s', href: 'compounds.html' },
    { k: 'dream', t: 'ai5t', s: 'ai5s', href: 'properties.html' },
    { k: 'imap', t: 'ai6t', s: 'ai6s', href: 'compounds.html' },
    { k: 'tour', t: 'ai7t', s: 'ai7s', tour: true }
  ];
  document.getElementById('ai-grid').innerHTML = aiTools.map(function (tool, i) {
    return '<' + (tool.tour ? 'button' : 'a') + ' class="ai-card rv d' + ((i % 4) + 1) + '"' +
      (tool.tour ? ' type="button" id="ai-tour-card"' : ' href="' + tool.href + '"') + '>' +
      '<span class="ai-ic">' + AI_IC[tool.k] + '</span>' +
      '<h4>' + HZ.t(tool.t) + '</h4>' +
      '<p>' + HZ.t(tool.s) + '</p>' +
      (tool.live ? '<span class="live-tag">' + HZ.t('aiLive') + '</span>' : '') +
      '</' + (tool.tour ? 'button' : 'a') + '>';
  }).join('');

  /* virtual tour modal */
  function openTour() {
    var f = document.getElementById('tour-frame');
    if (!f.src) f.src = 'virtual-tour.html';
    document.getElementById('tour-modal').classList.add('on');
    document.body.style.overflow = 'hidden';
  }
  function closeTour() {
    document.getElementById('tour-modal').classList.remove('on');
    document.body.style.overflow = '';
  }
  document.getElementById('tour-open').addEventListener('click', openTour);
  var tourHero = document.getElementById('tour-hero');
  if (tourHero) tourHero.addEventListener('click', openTour);
  var tourCard = document.getElementById('ai-tour-card');
  if (tourCard) tourCard.addEventListener('click', openTour);
  document.getElementById('tour-close').addEventListener('click', closeTour);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeTour(); });

  HZ.reveal();

  slides = document.querySelectorAll('.hero .slide');
  dots = document.querySelectorAll('.hero .dots button');
  dots.forEach(function (d, i) { d.addEventListener('click', function () { setSlide(i); arm(); }); });
  setSlide(0);
  if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) arm();
})();
</script>
