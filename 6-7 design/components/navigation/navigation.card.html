<!-- @dsCard group="Components" viewport="700x300" name="Navigation & Surfaces" subtitle="Tabs (animated gold ink) + Card surfaces" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 26px 28px; }
  .glabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--tx-f); margin: 0 0 12px; }
  .cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-top: 22px; }
  .cardlbl { font-family: var(--font-ui); font-weight: 600; font-size: 13px; color: var(--tx-s); }
  .cardsub { font-family: var(--font-ui); font-size: 11px; color: var(--tx-m); margin-top: 4px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Tabs, Card } = window.SierraEstatesDesignSystem_210542;
    function Demo() {
      const [tab, setTab] = React.useState('units');
      return (
        <div>
          <div className="glabel">Tabs</div>
          <Tabs value={tab} onChange={setTab} tabs={[
            {value:'units',label:'All Units',count:47},
            {value:'match',label:'Best Match',count:4},
            {value:'sold',label:'Sold',count:12},
          ]} />
          <div className="cards">
            <Card><div className="cardlbl">Solid</div><div className="cardsub">Default elevated surface for content.</div></Card>
            <Card variant="glass"><div className="cardlbl">Glass</div><div className="cardsub">Translucent blur over imagery.</div></Card>
            <Card variant="well"><div className="cardlbl">Well</div><div className="cardsub">Recessed panel for grouping.</div></Card>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
