<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 26px 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px 26px; align-items: start; }
  .glabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--tx-f); margin-bottom: 12px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Input, Select, SegmentedControl, RangeSlider, Switch } = window.SierraEstatesDesignSystem_210542;
    function Demo() {
      const [purpose, setPurpose] = React.useState('rent');
      const [price, setPrice] = React.useState(8);
      const [furnished, setFurnished] = React.useState(true);
      return (
        <div className="grid">
          <div>
            <div className="glabel">Search input</div>
            <Input label="Compound" placeholder="Mivida, Hyde Park…"
              icon={<i data-lucide="search"></i>} />
          </div>
          <div>
            <div className="glabel">Select</div>
            <Select label="Property type" options={['Villa','Apartment','Penthouse','Twin House','Townhouse','Duplex']} />
          </div>
          <div>
            <div className="glabel">Segmented control</div>
            <SegmentedControl value={purpose} onChange={setPurpose}
              options={[{value:'all',label:'All'},{value:'rent',label:'Rent'},{value:'resale',label:'Resale'}]} />
          </div>
          <div>
            <div className="glabel">Switch</div>
            <div style={{display:'flex',flexDirection:'column',gap:12,paddingTop:4}}>
              <Switch checked={furnished} onChange={setFurnished} label="Furnished only" />
              <Switch checked={false} label="Include off-market" />
            </div>
          </div>
          <div style={{gridColumn:'1 / -1'}}>
            <div className="glabel">Range slider — max price</div>
            <RangeSlider value={price} min={1} max={50} onChange={setPrice} format={v=>`EGP ${v}M`} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
    setTimeout(()=>window.lucide && lucide.createIcons(), 60);
  </script>
</body>
</html>
