<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px 28px; display: flex; flex-direction: column; gap: 14px; }
  .pair { display: flex; gap: 14px; }
  .box { flex: 1; padding: 12px 14px; border-radius: var(--radius-sm); font-family: var(--font-ui); font-size: 13px; line-height: 1.45; }
  .no { background: rgba(230,57,70,.09); border: 1px solid rgba(230,57,70,.3); color: var(--tx-m); }
  .yes { background: rgba(52,211,153,.09); border: 1px solid rgba(52,211,153,.3); color: var(--tx); }
  .mark { font-family: var(--font-mono); font-size: 11px; font-weight: 700; margin-right: 8px; }
  .no .mark { color: var(--red); }
  .yes .mark { color: var(--emerald); }
</style>
</head>
<body>
  <div class="pair">
    <div class="box no"><span class="mark">✕</span>Click here to browse our extensive inventory of luxury residences</div>
    <div class="box yes"><span class="mark">✓</span>Explore curated listings in New Cairo</div>
  </div>
  <div class="pair">
    <div class="box no"><span class="mark">✕</span>Innovative AI-powered property matching engine</div>
    <div class="box yes"><span class="mark">✓</span>Intelligence-led advisory</div>
  </div>
  <div class="pair">
    <div class="box no"><span class="mark">✕</span>Our platform leverages cutting-edge algorithms</div>
    <div class="box yes"><span class="mark">✓</span>Every listing, scored and verified</div>
  </div>
</body>
</html>
