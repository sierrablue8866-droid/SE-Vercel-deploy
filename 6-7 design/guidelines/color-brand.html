<!-- @dsCard group="Colors" viewport="700x150" name="Brand Accents" subtitle="Gold is the constant; red, blue & emerald are secondary" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px 24px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { flex: 1; min-width: 120px; border-radius: var(--radius-md); overflow: hidden; border: var(--border-hair); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--bg-e); }
  .name { font-family: var(--font-ui); font-weight: 600; font-size: 12px; color: var(--tx-s); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--tx-m); letter-spacing: .04em; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--gold)"></div><div class="meta"><div class="name">Gold</div><div class="hex">#C8961A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-lt)"></div><div class="meta"><div class="name">Gold Light</div><div class="hex">#E9C176</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--red)"></div><div class="meta"><div class="name">Red</div><div class="hex">#E63946</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue)"></div><div class="meta"><div class="name">Blue</div><div class="hex">#1E88D9</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--emerald)"></div><div class="meta"><div class="name">Emerald</div><div class="hex">#34D399</div></div></div>
  </div>
</body>
</html>
