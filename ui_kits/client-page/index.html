<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sierra Estates · New Cairo Properties</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500&family=Cairo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="data.js"></script>
<script src="shared.js"></script>
<style>
/* ── hero slider ── */
.hero{position:relative;min-height:640px;display:flex;flex-direction:column;justify-content:center;padding:70px 0 140px;overflow:hidden;background:#0a1622;}
.hero .slide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s var(--silk);z-index:0;}
.hero .slide.on{opacity:1;}
.hero .slide img{width:100%;height:100%;object-fit:cover;}
@media(prefers-reduced-motion:no-preference){.hero .slide.on img{animation:kenburns 9s linear forwards;}}
.hero .scrim{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(0,25,45,.46) 0%,rgba(0,25,45,.30) 40%,rgba(0,20,38,.72) 100%);}
/* ── hero laser scan line ── */
.hero .laser{position:absolute;left:0;right:0;top:0;height:2px;z-index:2;pointer-events:none;background:linear-gradient(90deg,transparent,#e9c176 18%,#fff 50%,#c8961a 82%,transparent);box-shadow:0 0 14px 2px rgba(233,193,118,.65),0 0 42px 6px rgba(200,150,26,.35);opacity:.9;}
.hero .laser::before{content:"";position:absolute;left:0;right:0;top:-40px;height:80px;background:linear-gradient(180deg,transparent,rgba(233,193,118,.16),transparent);}
@media(prefers-reduced-motion:no-preference){.hero .laser{animation:heroLaser 5s cubic-bezier(.6,0,.4,1) infinite;}}
@media(prefers-reduced-motion:reduce){.hero .laser{display:none;}}
@keyframes heroLaser{0%{transform:translateY(0);opacity:0;}8%{opacity:.95;}92%{opacity:.95;}100%{transform:translateY(640px);opacity:0;}}
[data-theme="dark"] .hero .scrim{background:linear-gradient(180deg,rgba(8,8,10,.55) 0%,rgba(8,8,10,.38) 40%,rgba(8,8,10,.82) 100%);}
.hero .wrap{position:relative;z-index:2;}
.hero .h-eyebrow{font-family:var(--mono);text-transform:uppercase;letter-spacing:.28em;font-size:12px;font-weight:600;color:#8fe1ff;margin-bottom:16px;display:flex;align-items:center;gap:10px;min-height:18px;}
[dir="rtl"] .hero .h-eyebrow{letter-spacing:.06em;font-family:var(--font);}
[data-theme="dark"] .hero .h-eyebrow{color:#e9c176;}
.hero .h-eyebrow::before{content:"";width:26px;height:2px;background:var(--pri);display:inline-block;}
.hero h1{color:#fff;font-family:var(--display);font-size:60px;font-weight:700;letter-spacing:-.02em;max-width:860px;line-height:1.06;min-height:2.1em;}
[dir="rtl"] .hero h1{letter-spacing:0;font-family:'Cairo',var(--font);font-weight:800;}
.hero h1 .hl{color:var(--pri);font-style:italic;}
[data-theme="dark"] .hero h1 .hl{color:#e9c176;}
.hero p.sub{color:rgba(255,255,255,.9);font-size:18.5px;line-height:1.6;margin-top:20px;max-width:580px;}
.hero .quick{display:flex;gap:26px;margin-top:26px;color:rgba(255,255,255,.9);font-size:14px;font-weight:600;flex-wrap:wrap;}
.hero .quick span{display:inline-flex;align-items:center;gap:8px;}
.hero .quick .i{color:var(--pri);}
[data-theme="dark"] .hero .quick .i{color:#e9c176;}
.hero .dots{position:absolute;bottom:104px;inset-inline-start:24px;z-index:3;display:flex;gap:8px;}
.hero .dots button{width:26px;height:4px;border-radius:2px;border:none;background:rgba(255,255,255,.35);cursor:pointer;transition:.3s;padding:0;}
.hero .dots button.on{background:var(--pri);width:44px;}
[data-theme="dark"] .hero .dots button.on{background:#e9c176;}
.hero .map-cta{position:absolute;left:50%;bottom:118px;transform:translateX(-50%);z-index:4;display:inline-flex;align-items:center;gap:11px;background:rgba(255,255,255,.14);backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,.35);color:#fff;font-family:var(--font);font-weight:700;font-size:14.5px;border-radius:999px;padding:13px 24px;cursor:pointer;transition:.25s var(--silk);white-space:nowrap;text-decoration:none;}
.hero .map-cta:hover{background:rgba(255,255,255,.24);transform:translateX(-50%) translateY(-2px);border-color:rgba(255,255,255,.6);}
.hero .map-cta .mc-ic{width:34px;height:34px;border-radius:50%;background:var(--pri);display:grid;place-items:center;flex:none;animation:pulseDot 2.4s infinite;}
[data-theme="dark"] .hero .map-cta .mc-ic{background:#c8961a;color:#0d0d0f;}
.hero .map-cta .i{width:17px;height:17px;}
@media(max-width:680px){.hero .map-cta{bottom:96px;font-size:13px;padding:11px 18px;}}

/* ── search card ── */
.searchbar{position:relative;z-index:5;margin-top:-76px;}
.search-card{background:var(--surface);border-radius:14px;box-shadow:var(--shadow-m);border:1px solid var(--line);overflow:hidden;}
.search-tabs{display:flex;padding:0 8px;border-bottom:1px solid var(--line);}
.search-tabs button{background:none;border:none;font-family:var(--font);font-weight:700;font-size:14px;color:var(--text);padding:16px 22px;cursor:pointer;position:relative;}
.search-tabs button.active{color:var(--pri);}
.search-tabs button.active::after{content:"";position:absolute;left:14px;right:14px;bottom:-1px;height:3px;background:var(--pri);border-radius:3px 3px 0 0;}
.search-fields{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr auto;}
.field{padding:16px 20px;border-inline-end:1px solid var(--line);}
.field:last-child{border-inline-end:none;}
.field label{display:block;font-family:var(--mono);text-transform:uppercase;letter-spacing:.14em;font-size:10.5px;font-weight:600;color:var(--muted);margin-bottom:6px;}
[dir="rtl"] .field label{letter-spacing:.02em;font-family:var(--font);}
.field .val{display:flex;align-items:center;gap:8px;color:var(--ink);font-weight:600;font-size:15px;cursor:pointer;}
.field .val .i{color:var(--pri);width:17px;height:17px;}
.field .val .chev{margin-inline-start:auto;color:var(--muted);width:16px;height:16px;}
.field.searchbtn{display:flex;align-items:center;padding:12px 14px;}
.field.searchbtn .btn{width:100%;height:100%;padding:14px 26px;font-size:15px;}

/* ── search dropdowns ── */
.field.sf{position:relative;}
.field.sf .val{user-select:none;}
.field.sf.open .chev{transform:rotate(180deg);}
.field.sf .chev{transition:transform .2s;}
.sf-menu{position:absolute;top:calc(100% - 4px);inset-inline-start:12px;z-index:60;min-width:210px;max-height:288px;overflow:auto;background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-m);padding:6px;display:none;}
.field.sf.open .sf-menu{display:block;}
.sf-menu button{display:flex;align-items:center;justify-content:space-between;gap:14px;width:100%;text-align:start;background:none;border:none;font-family:var(--font);font-size:14px;font-weight:600;color:var(--ink);padding:9px 12px;border-radius:8px;cursor:pointer;}
.sf-menu button:hover{background:var(--pri-soft);}
.sf-menu button.sel{color:var(--pri);}
.sf-menu button.sel::after{content:"\2713";color:var(--pri);font-weight:700;}
.no-props{grid-column:1/-1;text-align:center;color:var(--muted);font-size:15px;padding:40px 0;}

/* ── compounds preview ── */
.grid-comp{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;}
.comp{position:relative;height:250px;border-radius:var(--r-card);overflow:hidden;cursor:pointer;display:block;}
.comp img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--silk);}
.comp:hover img{transform:scale(1.06);}
.comp .co-scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,25,45,0) 30%,rgba(0,25,45,.82) 100%);z-index:2;pointer-events:none;}
.comp .co-body{position:absolute;inset-inline-start:18px;inset-inline-end:18px;bottom:16px;z-index:3;color:#fff;pointer-events:none;}
.comp .co-body h4{color:#fff;font-size:18px;}
.comp .co-body span{font-family:var(--mono);font-size:12px;color:#bfeaff;letter-spacing:.05em;}
[data-theme="dark"] .comp .co-body span{color:#e9c176;}
.comp .co-count{position:absolute;top:14px;inset-inline-end:14px;z-index:3;background:rgba(255,255,255,.92);color:var(--navy);font-family:var(--mono);font-weight:700;font-size:12px;padding:5px 10px;border-radius:6px;white-space:nowrap;}

/* ── 360 rooms strip ── */
.rooms{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(340px,1fr);gap:20px;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:12px;scrollbar-width:thin;}
.room{position:relative;height:300px;border-radius:var(--r-card);overflow:hidden;scroll-snap-align:start;}
.room img{width:100%;height:100%;object-fit:cover;transition:transform .7s var(--silk);}
.room:hover img{transform:scale(1.07);}
.room .r-scrim{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,20,38,.85) 100%);z-index:2;}
.room .r-body{position:absolute;inset-inline-start:20px;inset-inline-end:20px;bottom:18px;z-index:3;}
.room .r-body h4{color:#fff;font-size:19px;}
.room .r-body span{font-family:var(--mono);font-size:11.5px;color:rgba(255,255,255,.75);letter-spacing:.05em;}
.room .r-360{position:absolute;top:16px;inset-inline-start:16px;z-index:3;background:rgba(0,174,255,.92);color:#fff;font-family:var(--mono);font-weight:700;font-size:11px;letter-spacing:.1em;padding:6px 11px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;animation:floaty 4s ease-in-out infinite;}
[data-theme="dark"] .room .r-360{background:rgba(200,150,26,.94);color:#0d0d0f;}
@media(prefers-reduced-motion:reduce){.room .r-360{animation:none;}}

/* ── stats ── */
.stats{background:var(--navy);position:relative;overflow:hidden;}
.stats::before{content:"";position:absolute;inset:0;background:radial-gradient(600px 300px at 85% 10%,rgba(0,174,255,.22),transparent 60%);}
[data-theme="dark"] .stats::before{background:radial-gradient(600px 300px at 85% 10%,rgba(200,150,26,.16),transparent 60%);}
.stats .wrap{position:relative;z-index:2;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;padding:56px 24px;}
.stat{text-align:center;color:#fff;}
.stat b{font-family:var(--mono);font-size:42px;font-weight:700;color:var(--pri);display:block;letter-spacing:-.02em;}
[data-theme="dark"] .stat b{color:#e9c176;}
.stat span{font-size:14px;color:rgba(255,255,255,.7);font-weight:500;}

/* ── why ── */
.net-banner{display:grid;grid-template-columns:1.5fr 1fr;gap:36px;align-items:center;background:var(--navy);border-radius:16px;padding:44px 48px;margin-bottom:30px;position:relative;overflow:hidden;}
[data-theme="dark"] .net-banner{background:linear-gradient(135deg,#12100a,#221c0d);border:1px solid rgba(200,150,26,.25);}
.net-banner::before{content:"";position:absolute;inset:0;background:radial-gradient(560px 300px at 100% 0%,rgba(0,174,255,.18),transparent 62%);pointer-events:none;}
[data-theme="dark"] .net-banner::before{background:radial-gradient(560px 300px at 100% 0%,rgba(200,150,26,.16),transparent 62%);}
.net-banner>*{position:relative;z-index:2;}
.net-banner .eyebrow{color:#8fe1ff;margin-bottom:14px;}
[data-theme="dark"] .net-banner .eyebrow{color:#e9c176;}
.net-banner .eyebrow::before{background:currentColor;}
.net-banner h3{color:#fff;font-size:26px;line-height:1.25;letter-spacing:-.01em;}
.net-banner p{color:rgba(255,255,255,.72);margin-top:14px;font-size:14.5px;line-height:1.75;}
.nb-stats{display:flex;flex-direction:column;gap:20px;border-inline-start:1px solid rgba(255,255,255,.14);padding-inline-start:36px;}
.nb-stat b{display:block;font-family:var(--mono);font-size:38px;font-weight:700;color:var(--pri);letter-spacing:-.02em;line-height:1;}
[data-theme="dark"] .nb-stat b{color:#e9c176;}
.nb-stat span{display:block;color:rgba(255,255,255,.66);font-size:13px;margin-top:6px;}
.grid-feat{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;}
.feat{padding:28px;border:1px solid var(--line);border-radius:var(--r-card);transition:.25s var(--silk);background:var(--surface);}
.feat:hover{border-color:var(--pri);box-shadow:var(--shadow-s);transform:translateY(-3px);}
.feat .ic{width:52px;height:52px;border-radius:12px;background:var(--pri-soft);color:var(--pri);display:grid;place-items:center;margin-bottom:18px;}
.feat .ic .i{width:24px;height:24px;}
.feat h4{font-size:17px;margin-bottom:8px;}
.feat p{font-size:13.5px;}

/* ── why: enlarged & dynamic ── */
#agents .sec-head h2{font-size:54px;line-height:1.04;}
#agents .sec-head p{font-size:17px;max-width:600px;}
#agents .feat{position:relative;overflow:hidden;}
#agents .feat::before{content:"";position:absolute;top:0;inset-inline-start:0;width:100%;height:3px;background:linear-gradient(90deg,var(--pri),transparent);transform:scaleX(0);transform-origin:inline-start;transition:transform .45s var(--silk);}
#agents .feat:hover::before{transform:scaleX(1);}
#agents .feat .ic{transition:.35s var(--silk);}
#agents .feat:hover .ic{transform:scale(1.08) rotate(-5deg);background:var(--pri);color:#fff;}
[data-theme="dark"] #agents .feat:hover .ic{color:#0d0d0f;}
#agents .feat h4{font-size:18.5px;}
#agents .feat p{font-size:14px;line-height:1.62;}
@media(max-width:680px){#agents .sec-head h2{font-size:36px;}}

/* ── cta ── */
.cta{position:relative;border-radius:16px;overflow:hidden;padding:56px 60px;background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap;}
[data-theme="dark"] .cta{background:linear-gradient(135deg,#c8961a,#8f6a0f);}
.cta::before{content:"";position:absolute;inset:0;background:radial-gradient(500px 260px at 90% -20%,rgba(255,255,255,.25),transparent 60%);}
.cta .ct-txt{position:relative;z-index:2;}
.cta h2{color:#fff;font-size:30px;}
.cta p{color:rgba(255,255,255,.9);margin-top:8px;font-size:16px;}
.cta .ct-act{position:relative;z-index:2;display:flex;gap:12px;flex-wrap:wrap;}
.cta .btn-white{background:#fff;color:var(--pri);}
[data-theme="dark"] .cta .btn-white{color:#8f6a0f;}
.cta .btn-white:hover{background:#f0fbff;}
.cta .btn-out{background:transparent;border:1.5px solid rgba(255,255,255,.6);color:#fff;}
.cta .btn-out:hover{border-color:#fff;background:rgba(255,255,255,.1);}

/* ── testimonials ── */
.testi-band{background:var(--pri-soft);}
[data-theme="dark"] .testi-band{background:#15130c;}
.grid-testi{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
.tcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);padding:28px;display:flex;flex-direction:column;gap:16px;transition:.25s var(--silk);}
.tcard:hover{transform:translateY(-4px);box-shadow:var(--shadow-m);}
.tcard .stars{display:flex;gap:3px;color:#f5a623;}
.tcard .stars .i{width:15px;height:15px;fill:currentColor;}
.tcard p{font-size:14.5px;line-height:1.75;flex:1;}
.tcard .who{display:flex;align-items:center;gap:11px;border-top:1px solid var(--line);padding-top:16px;}
.tcard .who .av{width:38px;height:38px;border-radius:50%;background:var(--navy);color:var(--pri);display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:13px;flex:none;}
[data-theme="dark"] .tcard .who .av{background:#221c0d;color:#e9c176;}
.tcard .who b{display:block;color:var(--ink);font-size:13.5px;}
.tcard .who small{font-size:12px;color:var(--muted);}

/* ── perfect choice + inquiry ── */
.perfect{display:grid;grid-template-columns:1.15fr 1fr;border-radius:16px;overflow:hidden;box-shadow:var(--shadow-m);}
.perfect .pf-left{position:relative;background:var(--navy);padding:52px 48px;color:#fff;overflow:hidden;}
.perfect .pf-left::before{content:"";position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1600047509807-ba8f99d2cdde?w=1200&q=70') center/cover;opacity:.14;}
.perfect .pf-left::after{content:"";position:absolute;inset:0;background:radial-gradient(600px 300px at 10% 0%,rgba(0,174,255,.25),transparent 60%);}
[data-theme="dark"] .perfect .pf-left::after{background:radial-gradient(600px 300px at 10% 0%,rgba(200,150,26,.2),transparent 60%);}
.perfect .pf-left>*{position:relative;z-index:2;}
.perfect .pf-left h2{color:#fff;font-size:30px;margin-bottom:10px;}
.perfect .pf-left>p{color:rgba(255,255,255,.75);margin-bottom:30px;}
.pf-item{display:flex;gap:18px;padding:18px 0;border-top:1px solid rgba(255,255,255,.12);}
.pf-item .num{font-family:var(--mono);font-weight:700;font-size:26px;color:var(--pri);flex:none;line-height:1.2;}
[data-theme="dark"] .pf-item .num{color:#e9c176;}
.pf-item h4{color:#fff;font-size:16.5px;margin-bottom:5px;}
.pf-item p{color:rgba(255,255,255,.68);font-size:13.5px;line-height:1.65;}
.inq{background:var(--surface);padding:44px 42px;}
.inq h3{font-size:22px;margin-bottom:4px;}
.inq>p{font-size:13.5px;margin-bottom:22px;}
.inq .seg{display:flex;gap:8px;margin-bottom:18px;}
.inq .seg button{flex:1;font-family:var(--font);font-weight:700;font-size:13.5px;padding:10px;border-radius:8px;border:1.5px solid var(--line-2);background:var(--surface);color:var(--text);cursor:pointer;transition:.2s;}
.inq .seg button.on{background:var(--pri);border-color:var(--pri);color:#fff;}
[data-theme="dark"] .inq .seg button.on{color:#0d0d0f;}
.inq .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.inq label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
[dir="rtl"] .inq label{letter-spacing:.02em;font-family:var(--font);}
.inq input,.inq select{width:100%;font-family:var(--font);font-size:14px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:11px 13px;outline:none;transition:border-color .2s;}
.inq input:focus,.inq select:focus{border-color:var(--pri);}
.inq .btn{width:100%;margin-top:8px;padding:13px;}

/* ── partners ── */
.partners{border-top:1px solid var(--line);padding:44px 0;background:var(--surface-2);}
.partners .p-eye{text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);margin-bottom:26px;}
[dir="rtl"] .partners .p-eye{letter-spacing:.05em;font-family:var(--font);}
.partners .row{display:flex;justify-content:center;gap:52px;flex-wrap:wrap;align-items:center;}
.partners .row span{font-family:var(--mono);font-weight:700;font-size:15px;letter-spacing:.18em;color:var(--muted);opacity:.75;transition:.2s;white-space:nowrap;}
.partners .row span:hover{color:var(--pri);opacity:1;}

/* ── market ticker ── */
.ticker{background:var(--navy);border-top:1px solid rgba(200,150,26,.2);border-bottom:1px solid rgba(200,150,26,.2);overflow:hidden;padding:11px 0;}
[data-theme="dark"] .ticker{background:#0a0a0c;}
.ticker .row{display:flex;width:max-content;animation:tickerMove 30s linear infinite;}
[dir="rtl"] .ticker .row{animation-direction:reverse;}
@media(prefers-reduced-motion:reduce){.ticker .row{animation:none;}}
@keyframes tickerMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker .row span{display:inline-flex;align-items:center;gap:10px;padding:0 20px;font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#e9c176;white-space:nowrap;}
[dir="rtl"] .ticker .row span{letter-spacing:.02em;font-family:var(--font);}
.ticker .row span::after{content:"";width:5px;height:5px;border-radius:50%;background:#c8961a;opacity:.7;}

/* ── AI hub (always dark band) ── */
.ai-hub{background:#07121e;position:relative;overflow:hidden;padding:74px 0;}
.ai-hub::before{content:"";position:absolute;top:-160px;left:50%;width:520px;height:520px;margin-left:-260px;border-radius:50%;background:radial-gradient(circle,rgba(200,150,26,.13),transparent 62%);pointer-events:none;}
.ai-hub .wrap{position:relative;z-index:2;}
.ai-hub .ai-eye{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#c8961a;opacity:.75;margin-bottom:12px;display:flex;align-items:center;gap:9px;}
[dir="rtl"] .ai-hub .ai-eye{letter-spacing:.04em;font-family:var(--font);}
.ai-hub .ai-eye .live{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.ai-hub h2{color:#fff;font-size:34px;max-width:640px;letter-spacing:-.02em;}
.ai-hub .ai-lead{color:rgba(255,255,255,.42);font-size:15px;margin-top:10px;max-width:520px;}
.ai-hub .ai-scan{margin:26px 0;height:1px;background:linear-gradient(90deg,transparent,#c8961a,transparent);position:relative;}
.ai-hub .ai-scan::after{content:"";position:absolute;top:-3px;left:0;right:0;height:7px;background:linear-gradient(90deg,transparent,rgba(200,150,26,.25),transparent);animation:scanLine 3s linear infinite;}
@keyframes scanLine{0%{transform:translateX(-30%)}100%{transform:translateX(30%)}}
.ai-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.ai-card{padding:22px 18px;border-radius:16px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);cursor:pointer;transition:.3s var(--silk);text-align:start;position:relative;overflow:hidden;display:block;}
.ai-card:hover{transform:translateY(-5px);border-color:rgba(200,150,26,.4);background:rgba(255,255,255,.06);}
.ai-card .ai-ic{width:46px;height:46px;margin-bottom:13px;display:inline-flex;}
.ai-card .ai-ic svg{width:46px;height:46px;}
.ai-card h4{color:#fff;font-size:15px;margin-bottom:5px;}
.ai-card p{color:rgba(255,255,255,.44);font-size:12.5px;line-height:1.55;}
.ai-card .live-tag{margin-top:11px;font-size:9.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#4ade80;display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);}
.ai-card .live-tag::before{content:"";width:5px;height:5px;border-radius:50%;background:#4ade80;animation:blink 2s infinite;}

/* ── tour launch ── */
.tr-homes{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.tr-home{display:flex;flex-direction:column;gap:6px;padding:8px;border-radius:12px;background:var(--surface-2);border:1px solid var(--line);cursor:pointer;text-align:start;transition:.2s var(--silk);}
.tr-home:hover{border-color:var(--pri);transform:translateY(-2px);}
.tr-home.on{border-color:var(--pri);box-shadow:0 0 0 1px var(--pri) inset;}
.tr-home img{width:100%;height:62px;object-fit:cover;border-radius:8px;display:block;}
.tr-home b{font-size:12.5px;color:var(--ink);font-weight:700;line-height:1.2;}
.tr-home span{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.04em;}
.tour-launch{display:flex;align-items:center;gap:16px;width:100%;padding:20px 24px;border-radius:16px;background:linear-gradient(135deg,var(--navy),#0a3a63);border:1px solid rgba(200,150,26,.35);cursor:pointer;text-align:start;transition:.25s var(--silk);}
[data-theme="dark"] .tour-launch{background:linear-gradient(135deg,#12100a,#26200f);}
.tour-launch:hover{transform:translateY(-3px);box-shadow:var(--shadow-m);}
.tour-launch .t-ic{flex:none;color:#e9c176;}
.tour-launch .t-txt{flex:1;}
.tour-launch .t-txt b{display:block;color:#fff;font-size:16px;margin-bottom:3px;}
.tour-launch .t-txt span{color:#e9c176;font-size:12px;font-family:var(--mono);}
[dir="rtl"] .tour-launch .t-txt span{font-family:var(--font);}
.tour-launch .t-play{flex:none;width:44px;height:44px;border-radius:50%;background:rgba(200,150,26,.16);display:grid;place-items:center;color:#e9c176;}
.tour-modal{position:fixed;inset:0;z-index:950;background:#07111e;display:none;}
.tour-modal.on{display:block;}
.tour-modal iframe{width:100%;height:100%;border:none;display:block;}
.tour-modal .t-close{position:absolute;top:16px;inset-inline-end:16px;width:42px;height:42px;border-radius:50%;background:rgba(7,17,30,.92);border:1px solid rgba(200,150,26,.45);color:#e9c176;font-size:22px;cursor:pointer;display:grid;place-items:center;z-index:10;}
.tour-hero{display:block;position:relative;width:100%;height:440px;border-radius:16px;overflow:hidden;border:1px solid var(--line);cursor:pointer;padding:0;background:var(--bg);}
.tour-hero img{width:100%;height:100%;object-fit:cover;transition:transform .8s var(--silk);}
.tour-hero:hover img{transform:scale(1.05);}
.tour-hero .th-scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,20,38,.15) 0%,rgba(0,20,38,.15) 45%,rgba(0,20,38,.82) 100%);}
.tour-hero .th-badge{position:absolute;top:18px;inset-inline-start:18px;background:rgba(0,174,255,.92);color:#fff;font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:.08em;padding:7px 13px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;}
[data-theme="dark"] .tour-hero .th-badge{background:rgba(200,150,26,.94);color:#0d0d0f;}
.tour-hero .th-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:78px;height:78px;border-radius:50%;background:rgba(255,255,255,.92);color:var(--navy);display:grid;place-items:center;box-shadow:0 10px 40px rgba(0,0,0,.35);transition:.25s var(--silk);}
.tour-hero .th-play .i{width:30px;height:30px;margin-inline-start:4px;}
.tour-hero:hover .th-play{transform:translate(-50%,-50%) scale(1.1);background:#fff;}
.tour-hero .th-body{position:absolute;inset-inline-start:24px;inset-inline-end:24px;bottom:22px;text-align:start;}
.tour-hero .th-body b{display:block;color:#fff;font-size:24px;font-weight:700;margin-bottom:5px;letter-spacing:-.01em;}
.tour-hero .th-body span{color:#e9c176;font-family:var(--mono);font-size:13px;letter-spacing:.04em;}
[dir="rtl"] .tour-hero .th-body span{font-family:var(--font);}
@media(max-width:680px){.tour-hero{height:320px;}.tour-hero .th-body b{font-size:19px;}}

@media(max-width:1080px){
  .ai-grid{grid-template-columns:repeat(2,1fr);}
  .hero h1{font-size:40px;}
  .search-fields{grid-template-columns:1fr 1fr;}
  .field.searchbtn{grid-column:1/-1;}
  .grid-comp,.grid-feat{grid-template-columns:repeat(2,1fr);}
  .grid-testi{grid-template-columns:1fr;}
  .perfect{grid-template-columns:1fr;}
}
@media(max-width:680px){
  .search-fields{grid-template-columns:1fr;}
  .field{border-inline-end:none;border-bottom:1px solid var(--line);}
  .grid-comp,.grid-feat,.stats .wrap{grid-template-columns:1fr;}
  .ai-grid{grid-template-columns:1fr;}
  .net-banner{grid-template-columns:1fr;padding:32px 26px;}
  .nb-stats{flex-direction:row;flex-wrap:wrap;gap:24px;border-inline-start:none;padding-inline-start:0;border-top:1px solid rgba(255,255,255,.14);padding-top:24px;}
  .net-banner h3{font-size:21px;}
  .inq .frow{grid-template-columns:1fr;}
  .perfect .pf-left,.inq{padding:32px 26px;}
  .cta{padding:36px 28px;}
}

/* ── inline 360 panorama ── */
.tour-stage{position:relative;width:100%;height:480px;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#07111e;cursor:grab;touch-action:none;}
.tour-stage.dragging{cursor:grabbing;}
.tour-stage canvas{display:block;width:100%;height:100%;}
.pano-load{position:absolute;inset:0;z-index:5;display:grid;place-items:center;background:#07111e;transition:opacity .5s;}
.pano-load.hide{opacity:0;pointer-events:none;}
.pano-spin{width:34px;height:34px;border-radius:50%;border:3px solid rgba(200,150,26,.2);border-top-color:#e9c176;animation:panoSpin .8s linear infinite;}
@keyframes panoSpin{to{transform:rotate(360deg);}}
.pano-badge{position:absolute;top:16px;inset-inline-start:16px;z-index:3;background:rgba(200,150,26,.94);color:#0d0d0f;font-family:var(--mono);font-weight:700;font-size:11.5px;letter-spacing:.08em;padding:7px 13px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;}
.pano-expand{position:absolute;top:16px;inset-inline-end:16px;z-index:3;display:inline-flex;align-items:center;gap:7px;background:rgba(7,17,30,.6);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.22);color:#fff;font-family:var(--font);font-weight:600;font-size:12.5px;padding:8px 14px;border-radius:999px;cursor:pointer;transition:.2s;}
.pano-expand:hover{background:rgba(200,150,26,.9);color:#0d0d0f;border-color:transparent;}
.pano-label{position:absolute;bottom:76px;inset-inline-start:22px;z-index:3;color:#fff;font-size:24px;font-weight:800;letter-spacing:-.01em;text-shadow:0 2px 22px rgba(0,0,0,.55);}
[dir="rtl"] .pano-label{letter-spacing:0;}
.pano-hint{position:absolute;bottom:82px;inset-inline-end:22px;z-index:3;color:rgba(255,255,255,.82);font-size:12px;background:rgba(7,17,30,.5);backdrop-filter:blur(8px);padding:7px 13px;border-radius:999px;display:flex;align-items:center;gap:7px;transition:opacity .6s;}
.pano-rooms{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:3;display:flex;gap:5px;background:rgba(7,17,30,.82);backdrop-filter:blur(16px);border:1px solid rgba(200,150,26,.2);border-radius:999px;padding:7px 8px;max-width:94%;overflow-x:auto;scrollbar-width:none;}
.pano-rooms::-webkit-scrollbar{display:none;}
.pano-rooms button{white-space:nowrap;border:none;background:transparent;color:rgba(255,255,255,.6);font-family:var(--font);font-weight:600;font-size:12px;padding:7px 14px;border-radius:999px;cursor:pointer;transition:.2s;}
.pano-rooms button:hover{color:#e9c176;}
.pano-rooms button.on{background:linear-gradient(135deg,#c8961a,#e9c176);color:#0d0d0f;}
/* ── 3dapartment-style tour shell ── */
.tour-shell{display:grid;grid-template-columns:304px 1fr;gap:18px;}
.tour-rail{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:15px;height:520px;}
.tr-unit{border-bottom:1px solid var(--line);padding-bottom:15px;}
.tr-tag{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--pri);font-weight:700;}
.tr-unit h3{font-size:22px;margin:7px 0 3px;}
.tr-loc{font-size:12.5px;color:var(--muted);}
.tr-specs{display:flex;gap:7px;margin-top:13px;flex-wrap:wrap;}
.tr-specs span{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text);background:var(--surface-2);padding:5px 9px;border-radius:6px;}
.tr-price{font-family:var(--mono);font-size:19px;font-weight:700;color:var(--pri);margin-top:12px;}
.tr-rooms-label{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
.tr-rooms{display:flex;flex-direction:column;gap:5px;overflow-y:auto;flex:1;scrollbar-width:thin;}
.tr-room{display:flex;align-items:center;gap:11px;padding:7px;border:1px solid transparent;border-radius:10px;background:transparent;cursor:pointer;transition:.18s;text-align:start;width:100%;}
.tr-room:hover{background:var(--surface-2);}
.tr-room.on{background:var(--pri-soft);border-color:var(--pri);}
.tr-room img{width:54px;height:40px;object-fit:cover;border-radius:7px;flex:none;}
.tr-room b{font-size:13px;color:var(--ink);font-weight:600;}
.tr-room.on b{color:var(--pri);}
.tour-shell .tour-stage{height:520px;}
@media(max-width:900px){.tour-shell{grid-template-columns:1fr;}.tour-rail{height:auto;}.tour-shell .tour-stage{height:400px;}.tr-rooms{flex-direction:row;overflow-x:auto;}.tr-room{flex-direction:column;min-width:92px;gap:6px;text-align:center;}.tr-room img{width:100%;height:58px;}}
@media(max-width:680px){.tour-stage{height:360px;}.pano-label{font-size:19px;bottom:70px;}.pano-hint{display:none;}}

/* ── map preview ── */
.map-preview{position:relative;height:440px;border-radius:16px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow-s);}
.map-preview #home-map{width:100%;height:100%;}
.map-preview .leaflet-container{background:var(--surface-2);}
.map-preview .leaflet-control-attribution{display:none!important;}
.map-preview .leaflet-control-zoom{display:none!important;}
.map-preview .mp-cta{position:absolute;top:16px;inset-inline-end:16px;z-index:20;display:inline-flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);color:var(--ink);font-family:var(--font);font-weight:700;font-size:14px;border-radius:999px;padding:11px 20px;text-decoration:none;box-shadow:var(--shadow-s);transition:.22s var(--silk);}
.map-preview .mp-cta:hover{transform:translateY(-2px);border-color:var(--pri);color:var(--pri);}
.map-preview .mp-legend{position:absolute;bottom:16px;inset-inline-start:16px;z-index:20;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 14px;box-shadow:var(--shadow-s);display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--muted);}
.map-preview .mp-legend .dot{width:8px;height:8px;border-radius:50%;background:var(--pri);flex:none;animation:pulseDot 2.4s infinite;}
/* ── Apple-style map pins ── */
.ap-pin{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.97);border:1px solid rgba(0,0,0,.06);border-radius:22px;padding:5px 12px 5px 7px;box-shadow:0 5px 16px rgba(13,32,53,.22);font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:-.01em;color:#0d1b2a;white-space:nowrap;cursor:pointer;transition:transform .22s var(--silk),box-shadow .22s;}
.ap-pin:hover{transform:translateY(-3px) scale(1.06);box-shadow:0 12px 26px rgba(13,32,53,.32);z-index:500;}
.ap-pin .ap-dot{width:14px;height:14px;border-radius:50%;flex:none;box-shadow:0 0 0 3px rgba(255,255,255,.92);}
[data-theme="dark"] .ap-pin{background:rgba(24,26,31,.95);border-color:rgba(255,255,255,.1);color:#f2f4f7;box-shadow:0 5px 18px rgba(0,0,0,.5);}
[data-theme="dark"] .ap-pin .ap-dot{box-shadow:0 0 0 3px rgba(24,26,31,.9);}
.ap-pin.dim{opacity:.28;filter:grayscale(.5);transform:scale(.9);}
/* ── map filter bar ── */
.mp-filter{position:absolute;top:16px;inset-inline-start:16px;z-index:30;display:flex;gap:4px;background:rgba(255,255,255,.9);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:14px;padding:5px;box-shadow:var(--shadow-s);}
[data-theme="dark"] .mp-filter{background:rgba(19,21,25,.9);}
.mp-filter button{border:none;background:none;font-family:var(--font);font-size:12.5px;font-weight:700;color:var(--muted);padding:7px 12px;border-radius:10px;cursor:pointer;transition:.18s;white-space:nowrap;}
.mp-filter button:hover{color:var(--ink);}
.mp-filter button.on{background:var(--pri);color:#fff;box-shadow:0 3px 10px rgba(0,0,0,.12);}
[data-theme="dark"] .mp-filter button.on{color:#0d0d0f;}
@media(max-width:680px){.map-preview{height:340px;}.map-preview .mp-cta{font-size:12.5px;padding:9px 15px;}.mp-filter{gap:2px;padding:4px;}.mp-filter button{font-size:11px;padding:6px 8px;}}

/* ── TWEAKS: accent ── */
html[data-accent="ocean"]{--pri:#00aeff;--pri-2:#0090d6;--pri-soft:rgba(0,174,255,.10);}
html[data-accent="gold"]{--pri:#c8961a;--pri-2:#e9c176;--pri-soft:rgba(200,150,26,.14);}
html[data-accent="emerald"]{--pri:#1f8a5b;--pri-2:#3cb37e;--pri-soft:rgba(31,138,91,.12);}
html[data-accent="coral"]{--pri:#e8663d;--pri-2:#f4906d;--pri-soft:rgba(232,102,61,.12);}
/* ── TWEAKS: corners ── */
html[data-corners="sharp"]{--r-card:3px;}
html[data-corners="soft"]{--r-card:22px;}
html[data-corners="sharp"] .btn,html[data-corners="sharp"] .search-card,html[data-corners="sharp"] .feat,html[data-corners="sharp"] .cta,html[data-corners="sharp"] .net-banner,html[data-corners="sharp"] .perfect,html[data-corners="sharp"] .tcard,html[data-corners="sharp"] .tour-stage,html[data-corners="sharp"] .comp,html[data-corners="sharp"] .ai-card{border-radius:3px;}
html[data-corners="soft"] .btn{border-radius:16px;}
html[data-corners="soft"] .search-card,html[data-corners="soft"] .feat,html[data-corners="soft"] .cta,html[data-corners="soft"] .net-banner,html[data-corners="soft"] .perfect,html[data-corners="soft"] .tcard,html[data-corners="soft"] .tour-stage,html[data-corners="soft"] .comp,html[data-corners="soft"] .ai-card{border-radius:24px;}
/* ── TWEAKS: calm motion ── */
html[data-motion="calm"] .hero .slide.on img,
html[data-motion="calm"] .ticker .row,
html[data-motion="calm"] .ai-hub .ai-scan::after,
html[data-motion="calm"] .room .r-360,
html[data-motion="calm"] .hero .map-cta .mc-ic,
html[data-motion="calm"] .ai-hub .ai-eye .live,
html[data-motion="calm"] .ai-card .live-tag::before{animation:none!important;}
html[data-motion="calm"] .hero .laser{display:none;}

/* ── TWEAKS panel ── */
#tweaks{position:fixed;z-index:1200;bottom:22px;inset-inline-end:22px;width:286px;background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-m);font-family:var(--font);overflow:hidden;display:none;}
#tweaks.on{display:block;animation:twkIn .3s var(--silk);}
@keyframes twkIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.twk-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line);}
.twk-head b{font-size:14px;color:var(--ink);font-weight:800;letter-spacing:-.01em;}
.twk-head .x{width:26px;height:26px;border:none;background:var(--surface-2);border-radius:7px;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;}
.twk-head .x:hover{color:var(--ink);}
.twk-body{padding:15px 16px 18px;display:flex;flex-direction:column;gap:16px;}
.twk-group>label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;}
.twk-seg{display:flex;gap:5px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:4px;}
.twk-seg button{flex:1;border:none;background:transparent;color:var(--text);font-family:var(--font);font-weight:600;font-size:12px;padding:8px 6px;border-radius:7px;cursor:pointer;transition:.18s;white-space:nowrap;}
.twk-seg button:hover{color:var(--ink);}
.twk-seg button.on{background:var(--pri);color:#fff;box-shadow:var(--shadow-s);}
[data-theme="dark"] .twk-seg button.on{color:#0d0d0f;}
.twk-swatches{display:flex;gap:8px;}
.twk-sw{flex:1;height:38px;border-radius:9px;border:2px solid transparent;cursor:pointer;transition:.18s;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);}
.twk-sw:hover{transform:translateY(-2px);}
.twk-sw.on{border-color:var(--ink);}
</style>
</head>
<body>

<div id="site-chrome"></div>

<!-- HERO SLIDER -->
<header class="hero" data-screen-label="Home hero">
  <div id="hero-slides"></div>
  <div class="scrim"></div>
  <div class="laser"></div>
  <div class="wrap">
    <div class="h-eyebrow" id="hero-pre"></div>
    <h1 id="hero-main"></h1>
    <p class="sub" data-i18n="heroSub"></p>
    <div class="quick">
      <span><i data-lucide="badge-check" class="i"></i> <span data-i18n="q1"></span></span>
      <span><i data-lucide="map" class="i"></i> <span data-i18n="q2"></span></span>
      <span><i data-lucide="shield-check" class="i"></i> <span data-i18n="q3"></span></span>
    </div>
  </div>
  <a class="map-cta" href="map.html">
    <span class="mc-ic"><i data-lucide="map" class="i"></i></span>
    <span data-i18n="exploreMapBtn"></span>
  </a>
  <div class="dots wrap" id="hero-dots" style="left:auto;"></div>
</header>

<!-- SEARCH CARD -->
<div class="wrap searchbar">
  <div class="search-card rv">
    <div class="search-tabs" id="hero-tabs">
      <button class="active" data-mode="buy" data-i18n="tabBuy" type="button"></button>
      <button data-mode="rent" data-i18n="tabRent" type="button"></button>
      <button data-mode="new" data-i18n="tabNew" type="button"></button>
    </div>
    <div class="search-fields">
      <div class="field sf" data-role="loc">
        <label data-i18n="fLoc"></label>
        <div class="val"><i data-lucide="map-pin" class="i"></i> <span class="sf-val" data-i18n="vLoc"></span> <i data-lucide="chevron-down" class="i chev"></i></div>
      </div>
      <div class="field sf" data-role="type">
        <label data-i18n="fType"></label>
        <div class="val"><span class="sf-val" data-i18n="vType"></span> <i data-lucide="chevron-down" class="i chev"></i></div>
      </div>

<script>

    return '<div class="slide' + (i === 0 ? ' on' : '') + '"><img src="' + s.img + '" alt=""/></div>';
  }).join('');
  document.getElementById('hero-dots').innerHTML = D.slides.map(function (_, i) {
    return '<button type="button"' + (i === 0 ? ' class="on"' : '') + ' aria-label="Slide ' + (i + 1) + '"></button>';
  }).join('');

  var cur = 0, slides, dots, timer;
  function setSlide(n) {
    slides[cur].classList.remove('on'); dots[cur].classList.remove('on');
    cur = n % D.slides.length;
    slides[cur].classList.add('on'); dots[cur].classList.add('on');
    var s = D.slides[cur];
    document.getElementById('hero-pre').textContent = isAr ? s.preAr : s.pre;
    var main = isAr ? s.mainAr : s.main;
    var words = main.split(' ');
    var hl = words.splice(-3).join(' ');
    document.getElementById('hero-main').innerHTML = words.join(' ') + ' <span class="hl">' + hl + '</span>';
  }
  function arm() { clearInterval(timer); timer = setInterval(function () { setSlide(cur + 1); }, 6500); }

  /* featured (6) + compound tiles + rooms */
  document.getElementById('prop-grid').innerHTML = D.listings.slice(0, 6).map(HZ.pcard).join('');
  var picks = ['Hyde Park New Cairo', 'Mivida', 'Mountain View iCity', 'Eastown (SODIC)'];
  document.getElementById('comp-grid').innerHTML = picks.map(function (n, i) {
    var c = D.compounds.find(function (x) { return x.n === n; });
    return '<a class="comp rv d' + (i + 1) + '" href="compounds.html">' +
      '<img src="' + D.compoundImgs[n] + '" alt="' + c.n + '" loading="lazy"/>' +
      '<div class="co-scrim"></div>' +
      '<div class="co-count">AI ' + c.ai.toFixed(1) + ' · ' + c.g + '</div>' +
      '<div class="co-body"><h4>' + c.n + '</h4><span>' + c.z + ' · EGP ' + c.priceM + 'M avg</span></div></a>';
  }).join('');
  /* testimonials */
  var star = '<i data-lucide="star" class="i"></i>';
  document.getElementById('testi-grid').innerHTML = [1, 2, 3].map(function (n, i) {
    var nm = HZ.t('t' + n + 'n');
    var initials = nm.split(' ').slice(0, 2).map(function (w) { return w[0]; }).join('');
    return '<div class="tcard rv d' + (i + 1) + '">' +
      '<div class="stars">' + star + star + star + star + star + '</div>' +
      '<p>“' + HZ.t('t' + n + 'q') + '”</p>' +
      '<div class="who"><span class="av">' + initials + '</span><span><b>' + nm + '</b><small>' + HZ.t('t' + n + 'r') + '</small></span></div></div>';

  /* inquiry selects + segmented */
  document.getElementById('inq-zone').innerHTML = ['z1', 'z2', 'z3', 'z4'].map(function (k) { return '<option>' + HZ.t(k) + '</option>'; }).join('');
  document.getElementById('inq-type').innerHTML = ['lVilla', 'lApt', 'lTwin', 'lPent'].map(function (k) { return '<option>' + HZ.t(k) + '</option>'; }).join('');
  document.querySelectorAll('#inq-seg button').forEach(function (b) {
    b.addEventListener('click', function () {
      document.querySelectorAll('#inq-seg button').forEach(function (x) { x.classList.remove('on'); });
      b.classList.add('on');
    });

      '<h4>' + HZ.t(tool.t) + '</h4>' +

      (tool.live ? '<span class="live-tag">' + HZ.t('aiLive') + '</span>' : '') +
      '</' + (tool.tour ? 'button' : 'a') + '>';
  }).join('');

  /* virtual tour modal */
  function openTour() {
    var f = document.getElementById('tour-frame');
    var url = window.__tourUrl || 'https://listing3d.com/embed/r39d0bd4dde0a4fe693c7fe5fd230a896';
    if (f.src !== url) f.src = url;
    document.getElementById('tour-modal').classList.add('on');
    document.body.style.overflow = 'hidden';
  }
  function closeTour() {
    document.getElementById('tour-modal').classList.remove('on');
    document.body.style.overflow = '';
  }
  document.getElementById('tour-open').addEventListener('click', openTour);
  var tourHero = document.getElementById('tour-hero');
  if (tourHero) tourHero.addEventListener('click', openTour);
  var tourCard = document.getElementById('ai-tour-card');
  if (tourCard) tourCard.addEventListener('click', openTour);
  document.getElementById('tour-close').addEventListener('click', closeTour);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeTour(); });

  HZ.reveal();

  slides = document.querySelectorAll('.hero .slide');
  dots = document.querySelectorAll('.hero .dots button');
  dots.forEach(function (d, i) { d.addEventListener('click', function () { setSlide(i); arm(); }); });
  setSlide(0);
  if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) arm();
})();
</script>

<!-- HERO SEARCH FILTER -->
<script>
(function () {
  var D = window.HZDATA, HZ = window.HZ;
  if (!D || !HZ) return;
  var ar = HZ.lang() === 'ar';
  function L(en, arb){ return ar ? arb : en; }

  var state = { mode:'buy', loc:'', type:'', beds:0, price:Infinity };

  var TYPES = [
    { v:'', en:'Any type', ar:'أي نوع' },
    { v:'Villa', en:'Villa', ar:'فيلا' },
    { v:'Apartment', en:'Apartment', ar:'شقة' },
    { v:'Penthouse', en:'Penthouse', ar:'بنتهاوس' },
    { v:'Twin House', en:'Twin House', ar:'تاون هاوس' },
    { v:'Duplex', en:'Duplex', ar:'دوبلكس' }
  ];
  var BEDS = [
    { v:0, en:'Any', ar:'أي عدد' },
    { v:1, en:'1+ beds', ar:'+1 غرفة' },
    { v:2, en:'2+ beds', ar:'+2 غرف' },
    { v:3, en:'3+ beds', ar:'+3 غرف' },
    { v:4, en:'4+ beds', ar:'+4 غرف' },
    { v:5, en:'5+ beds', ar:'+5 غرف' }
  ];
  var PRICE_SALE = [
    { v:Infinity, en:'No limit', ar:'بلا حد' },
    { v:8,  en:'Up to EGP 8M',  ar:'حتى 8 مليون' },
    { v:12, en:'Up to EGP 12M', ar:'حتى 12 مليون' },
    { v:18, en:'Up to EGP 18M', ar:'حتى 18 مليون' },
    { v:25, en:'Up to EGP 25M', ar:'حتى 25 مليون' }
  ];
  var PRICE_RENT = [
    { v:Infinity, en:'No limit', ar:'بلا حد' },
    { v:0.05, en:'Up to EGP 50K/mo',  ar:'حتى 50 ألف/شهر' },
    { v:0.1,  en:'Up to EGP 100K/mo', ar:'حتى 100 ألف/شهر' },
    { v:0.15, en:'Up to EGP 150K/mo', ar:'حتى 150 ألف/شهر' },
    { v:0.25, en:'Up to EGP 250K/mo', ar:'حتى 250 ألف/شهر' }
  ];

  function locOptions(){
    var opts = [{ v:'', en:'All New Cairo', ar:'كل القاهرة الجديدة' }];
    D.compounds.forEach(function (c){ opts.push({ v:c.n, en:c.n, ar:c.n }); });
    return opts;
  }
  function priceOptions(){ return state.mode === 'rent' ? PRICE_RENT : PRICE_SALE; }

  var fields = {};
  document.querySelectorAll('.field.sf').forEach(function (f){ fields[f.dataset.role] = f; });

  function optionsFor(role){
    if (role === 'loc') return locOptions();
    if (role === 'type') return TYPES;
    if (role === 'beds') return BEDS;
    if (role === 'price') return priceOptions();
    return [];
  }
  function valueFor(role){
    if (role === 'loc') return state.loc;
    if (role === 'type') return state.type;
    if (role === 'beds') return state.beds;
    if (role === 'price') return state.price;
  }
  function setValue(role, v){
    if (role === 'loc') state.loc = v;
    else if (role === 'type') state.type = v;
    else if (role === 'beds') state.beds = v;
    else if (role === 'price') state.price = v;
  }

  function closeAll(except){
    document.querySelectorAll('.field.sf.open').forEach(function (f){
      if (f !== except){ f.classList.remove('open'); var m = f.querySelector('.sf-menu'); if (m) m.remove(); }
    });
  }

  function buildMenu(field){
    var role = field.dataset.role;
    var menu = document.createElement('div');
    menu.className = 'sf-menu';
    var cur = valueFor(role);
    optionsFor(role).forEach(function (o){
      var b = document.createElement('button');
      b.type = 'button';
      b.textContent = L(o.en, o.ar);
      if (o.v === cur) b.classList.add('sel');
      b.addEventListener('click', function (ev){
        ev.stopPropagation();
        setValue(role, o.v);
        field.querySelector('.sf-val').textContent = L(o.en, o.ar);
        field.classList.remove('open');
        menu.remove();
      });
      menu.appendChild(b);
    });
    field.appendChild(menu);
  }

  Object.keys(fields).forEach(function (role){
    var field = fields[role];
    field.querySelector('.val').addEventListener('click', function (ev){
      ev.stopPropagation();
      var isOpen = field.classList.contains('open');
      closeAll();
      if (!isOpen){ field.classList.add('open'); buildMenu(field); }
    });
  });
  document.addEventListener('click', function (){ closeAll(); });

  /* tabs */
  document.querySelectorAll('#hero-tabs button').forEach(function (b){
    b.addEventListener('click', function (){
      document.querySelectorAll('#hero-tabs button').forEach(function (x){ x.classList.remove('active'); });
      b.classList.add('active');
      state.mode = b.dataset.mode;
      /* price scale changes with mode → reset */
      state.price = Infinity;
      if (fields.price){
        fields.price.querySelector('.sf-val').textContent = L('No limit','بلا حد');
        if (fields.price.classList.contains('open')){ closeAll(); }
      }
    });
  });

  /* search → filter featured grid in place */
  function matches(p){
    if (state.mode === 'buy'  && p.tag === 'Rent') return false;
    if (state.mode === 'rent' && p.tag !== 'Rent') return false;
    if (state.mode === 'new'  && p.tag !== 'New')  return false;
    if (state.loc  && p.compound !== state.loc) return false;
    if (state.type && p.type !== state.type) return false;
    if (state.beds && p.beds < state.beds) return false;
    if (p.priceM > state.price) return false;
    return true;
  }
  var featSub = document.querySelector('#properties .sec-head p');
  var defSub = featSub ? featSub.textContent : '';

  document.getElementById('hero-search').addEventListener('click', function (){
    var list = D.listings.filter(matches);
    var grid = document.getElementById('prop-grid');
    grid.innerHTML = list.length
      ? list.map(HZ.pcard).join('')
      : '<div class="no-props">' + L('No homes match these filters — try widening your search.','لا توجد عقارات مطابقة — جرّب توسيع البحث.') + '</div>';
    if (featSub){
      featSub.textContent = L(
        list.length + ' home' + (list.length === 1 ? '' : 's') + ' match your search',
        list.length + ' عقار مطابق لبحثك'
      );
    }
    if (window.lucide) lucide.createIcons();
    HZ.reveal();
    var sec = document.getElementById('properties');
    if (sec){ window.scrollTo({ top: sec.getBoundingClientRect().top + window.pageYOffset - 80, behavior:'smooth' }); }
  });
})();
</script>

<!-- INLINE 360 PANORAMA -->
<script>
(function () {
  if (!window.THREE) return;
  var stage = document.getElementById('tour-stage');
  var canvas = document.getElementById('pano-canvas');
  if (!stage || !canvas) return;

  var ROOMS = [
    { name:'Grand Living',      img:'tour/grand-living.jpg' },
    { name:'Fireplace Lounge',  img:'tour/fireplace-lounge.jpg' },
    { name:'White Reception',   img:'tour/white-reception.jpg' },
    { name:'Boho Living',       img:'tour/boho-living.jpg' },
    { name:'Attic Retreat',     img:'tour/attic-retreat.jpg' },
    { name:'Home Office',       img:'tour/home-office.jpg' },
    { name:'Botanical Bedroom', img:'tour/botanical-bedroom.jpg' },
    { name:'Turquoise Suite',   img:'tour/turquoise-suite.jpg' },
    { name:"Kids' Loft",        img:'tour/kids-loft.jpg' }
  ];

  var renderer = new THREE.WebGLRenderer({ canvas:canvas, antialias:true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(95, stage.clientWidth/stage.clientHeight, 1, 2000);
  camera.position.set(0, 0, 0.001);
  var geo = new THREE.SphereGeometry(500, 64, 44); geo.scale(-1, 1, 1);
  var mat = new THREE.MeshBasicMaterial({ map:null });
  scene.add(new THREE.Mesh(geo, mat));

  var lon=0, lat=0, tLon=0, tLat=0, down=false, sx=0, sy=0, pLon=0, pLat=0, auto=true, cur=-1;
  var loader = new THREE.TextureLoader(); loader.crossOrigin='anonymous'; var cache={};

  function size(){ var w=stage.clientWidth, h=stage.clientHeight; renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix(); }

  function load(i){
    var ov=document.getElementById('pano-load');
    if (cache[i]){ mat.map=cache[i]; mat.needsUpdate=true; if(ov)ov.classList.add('hide'); return; }
    if (ov) ov.classList.remove('hide');
    loader.load(ROOMS[i].img, function(t){
      t.minFilter=THREE.LinearFilter; t.generateMipmaps=false;
      try { t.anisotropy = renderer.capabilities.getMaxAnisotropy(); } catch(e){}
      if ('SRGBColorSpace' in THREE) t.colorSpace=THREE.SRGBColorSpace;
      cache[i]=t; mat.map=t; mat.needsUpdate=true; if(ov)ov.classList.add('hide');
    }, undefined, function(){ if(ov)ov.classList.add('hide'); });
  }

  function go(i){
    if (i===cur) return; cur=i;
    document.getElementById('pano-label').textContent = ROOMS[i].name;
    document.querySelectorAll('#pano-list .tr-room').forEach(function(b,j){ b.classList.toggle('on', j===i); });
    load(i);
  }

  document.getElementById('pano-list').innerHTML = ROOMS.map(function(r){ return '<button class="tr-room" type="button"><img src="'+r.img+'" alt=""/><b>'+r.name+'</b></button>'; }).join('');
  var trc = document.getElementById('tr-count'); if (trc) trc.textContent = ROOMS.length;
  document.querySelectorAll('#pano-list .tr-room').forEach(function(b,i){ b.addEventListener('click', function(){ go(i); }); });

  var hintHidden=false;
  function hideHint(){ if(hintHidden)return; hintHidden=true; var h=document.getElementById('pano-hint'); if(h)h.style.opacity='0'; }
  setTimeout(hideHint, 4500);

  canvas.addEventListener('pointerdown', function(e){ down=true; sx=e.clientX; sy=e.clientY; pLon=tLon; pLat=tLat; stage.classList.add('dragging'); canvas.setPointerCapture(e.pointerId); hideHint(); });
  canvas.addEventListener('pointermove', function(e){ if(!down)return; tLon=pLon-(e.clientX-sx)*0.22; tLat=Math.max(-70,Math.min(70,pLat+(e.clientY-sy)*0.22)); });
  canvas.addEventListener('pointerup', function(){ down=false; stage.classList.remove('dragging'); });
  canvas.addEventListener('pointercancel', function(){ down=false; stage.classList.remove('dragging'); });

  function loop(){
    requestAnimationFrame(loop);
    if (auto && !down && document.documentElement.dataset.motion !== 'calm') tLon += 0.06;
    lon += (tLon-lon)*0.09; lat += (tLat-lat)*0.09;
    var phi=THREE.MathUtils.degToRad(90-lat), th=THREE.MathUtils.degToRad(lon);
    camera.lookAt(500*Math.sin(phi)*Math.cos(th), 500*Math.cos(phi), 500*Math.sin(phi)*Math.sin(th));
    renderer.render(scene, camera);
  }

  size(); go(0); loop();
  if (window.ResizeObserver) new ResizeObserver(size).observe(stage);
  window.addEventListener('resize', size);
  if ('IntersectionObserver' in window) new IntersectionObserver(function(es){ es.forEach(function(en){ auto=en.isIntersecting; }); }, { threshold:.12 }).observe(stage);

  var exp=document.getElementById('pano-expand');
  if (exp) exp.addEventListener('click', function(){
    var f=document.getElementById('tour-frame');
    var url = window.__tourUrl || 'https://listing3d.com/embed/r39d0bd4dde0a4fe693c7fe5fd230a896';
    if (f && f.src !== url) f.src = url;
    document.getElementById('tour-modal').classList.add('on');
    document.body.style.overflow='hidden';
  });

  /* ── tourable homes selector ── */
  (function(){
    var TOUR = 'https://listing3d.com/embed/r39d0bd4dde0a4fe693c7fe5fd230a896';
    var HOUSES = [
      { name:'Villa Émeraude',  loc:'Hyde Park · Fifth Settlement · New Cairo', specs:['5 Beds','450 m²','AI 9.7'], price:'EGP 22.5M', img:'https://images.unsplash.com/photo-1613977257363-707ba9348227?auto=format&fit=crop&w=600&q=70', url:TOUR },
      { name:'Villa Saphir',    loc:'Mivida · Fifth Settlement · New Cairo',    specs:['4 Beds','320 m²','AI 9.5'], price:'EGP 18.9M', img:'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=600&q=70', url:TOUR },
      { name:'Penthouse Azur',  loc:'Eastown (SODIC) · Fifth Settlement',       specs:['3 Beds','260 m²','AI 9.4'], price:'EGP 15.2M', img:'https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?auto=format&fit=crop&w=600&q=70', url:TOUR },
      { name:'Villa Onyx',      loc:'Mountain View iCity · New Cairo',          specs:['6 Beds','520 m²','AI 9.6'], price:'EGP 27.0M', img:'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=600&q=70', url:TOUR }
    ];
    var wrap = document.getElementById('tr-homes');
    if (!wrap) return;
    wrap.innerHTML = HOUSES.map(function(h,i){
      return '<button class="tr-home'+(i===0?' on':'')+'" type="button" data-i="'+i+'">'+
        '<img src="'+h.img+'" alt="" loading="lazy"/>'+
        '<b>'+h.name+'</b><span>'+h.specs[0]+' · '+h.specs[1]+'</span></button>';
    }).join('');
    function select(i){
      var h = HOUSES[i];
      window.__tourUrl = h.url;
      document.getElementById('tru-name').textContent = h.name;
      document.getElementById('tru-loc').textContent = h.loc;
      document.getElementById('tru-specs').innerHTML = h.specs.map(function(s){ return '<span>'+s+'</span>'; }).join('');
      document.getElementById('tru-price').textContent = h.price;
      wrap.querySelectorAll('.tr-home').forEach(function(b,j){ b.classList.toggle('on', j===i); });
    }
    wrap.querySelectorAll('.tr-home').forEach(function(b){ b.addEventListener('click', function(){ select(+b.dataset.i); }); });
    var tbtn = document.getElementById('tru-tour');
    if (tbtn) tbtn.addEventListener('click', function(){
      var f=document.getElementById('tour-frame');
      var url = window.__tourUrl || TOUR;
      if (f && f.src !== url) f.src = url;
      document.getElementById('tour-modal').classList.add('on');
      document.body.style.overflow='hidden';
    });
    select(0);
    if (window.lucide) window.lucide.createIcons();
  })();

  /* ── home map preview (Apple / iPhone-style, English) ── */
  (function(){
    var el = document.getElementById('home-map');
    if (!el || !window.L) return;
    var COMPOUNDS = {
      'Hyde Park':{lat:30.0070,lng:31.4350,avgM:18.5,color:'#00aeff'},
      'Mivida':{lat:30.0150,lng:31.5050,avgM:5.8,color:'#1f8a5b'},
      'Madinaty':{lat:30.0970,lng:31.6310,avgM:4.5,color:'#7C3AED'},
      'Mountain View iCity':{lat:30.0320,lng:31.4720,avgM:11.2,color:'#c8961a'},
      'Eastown':{lat:30.0260,lng:31.4680,avgM:8.2,color:'#00aeff'},
      'Al Rehab':{lat:30.0660,lng:31.4980,avgM:3.5,color:'#6366f1'}
    };
    var dark = !!(window.HZ && HZ.theme && HZ.theme() === 'dark');
    var esri = 'https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/';
    var baseUrl = esri + (dark ? 'World_Dark_Gray_Base' : 'World_Light_Gray_Base') + '/MapServer/tile/{z}/{y}/{x}';
    var refUrl  = esri + (dark ? 'World_Dark_Gray_Reference' : 'World_Light_Gray_Reference') + '/MapServer/tile/{z}/{y}/{x}';
    var map = L.map('home-map', { center:[30.045,31.51], zoom:11, zoomControl:false, scrollWheelZoom:false, dragging:false, doubleClickZoom:false, touchZoom:false, boxZoom:false, keyboard:false, attributionControl:false });
    L.tileLayer(baseUrl, { maxZoom:16 }).addTo(map);
    L.tileLayer(refUrl,  { maxZoom:16 }).addTo(map);
    var markers = [];
    Object.entries(COMPOUNDS).forEach(function(entry){
      var name=entry[0], cd=entry[1];
      var icon = L.divIcon({ html:'<div class="ap-pin"><span class="ap-dot" style="background:'+cd.color+'"></span>EGP '+cd.avgM+'M</div>', className:'', iconSize:[96,30], iconAnchor:[48,15] });
      var mk = L.marker([cd.lat,cd.lng], { icon:icon }).addTo(map);
      mk.on('click', function(){ window.location.href = 'map.html'; });
      markers.push({ m:mk, avgM:cd.avgM });
    });
    function inBand(v, band){
      if (band === 'a') return v < 5;
      if (band === 'b') return v >= 5 && v < 12;
      if (band === 'c') return v >= 12;
      return true;
    }
    function applyBand(band){
      markers.forEach(function(o){
        if (inBand(o.avgM, band)){ if (!map.hasLayer(o.m)) o.m.addTo(map); }
        else if (map.hasLayer(o.m)) map.removeLayer(o.m);
      });
    }
    var fb = document.getElementById('mp-filter');
    if (fb){
      fb.querySelectorAll('button').forEach(function(b){
        b.addEventListener('click', function(){
          fb.querySelectorAll('button').forEach(function(x){ x.classList.remove('on'); });
          b.classList.add('on');
          applyBand(b.dataset.band);
        });
      });
    }
  })();
})();
</script>

<script>
(function () {
  var TWEAKS = /*EDITMODE-BEGIN*/{
    "accent": "coral",
    "corners": "balanced",
    "motion": "cinematic"
  }/*EDITMODE-END*/;
  var root = document.documentElement;
  var panel = document.getElementById('tweaks');

  function syncUI(){
    document.querySelectorAll('#twk-accent .twk-sw').forEach(function(b){ b.classList.toggle('on', b.dataset.v===TWEAKS.accent); });
    document.querySelectorAll('#twk-corners button').forEach(function(b){ b.classList.toggle('on', b.dataset.v===TWEAKS.corners); });
    document.querySelectorAll('#twk-motion button').forEach(function(b){ b.classList.toggle('on', b.dataset.v===TWEAKS.motion); });
  }
  function apply(){
    root.dataset.accent = TWEAKS.accent;
    root.dataset.corners = TWEAKS.corners;
    root.dataset.motion = TWEAKS.motion;
    syncUI();
  }
  function set(k, v){
    TWEAKS[k] = v; apply();
    try { var o={}; o[k]=v; window.parent.postMessage({ type:'__edit_mode_set_keys', edits:o }, '*'); } catch(e){}
  }

  document.querySelectorAll('#twk-accent .twk-sw').forEach(function(b){ b.addEventListener('click', function(){ set('accent', b.dataset.v); }); });
  document.querySelectorAll('#twk-corners button').forEach(function(b){ b.addEventListener('click', function(){ set('corners', b.dataset.v); }); });
  document.querySelectorAll('#twk-motion button').forEach(function(b){ b.addEventListener('click', function(){ set('motion', b.dataset.v); }); });
  document.getElementById('twk-x').addEventListener('click', function(){
    panel.classList.remove('on');
    try { window.parent.postMessage({ type:'__edit_mode_dismissed' }, '*'); } catch(e){}
  });

  window.addEventListener('message', function(e){
    var d = e.data || {};
    if (d.type === '__activate_edit_mode') panel.classList.add('on');
    else if (d.type === '__deactivate_edit_mode') panel.classList.remove('on');
  });

  apply();
  try { window.parent.postMessage({ type:'__edit_mode_available' }, '*'); } catch(e){}
})();
</script>
