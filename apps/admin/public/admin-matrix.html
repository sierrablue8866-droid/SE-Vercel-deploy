<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sierra Estates OS · Command Administration Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>

<!-- Production Firebase Core SDK Architecture Handshakes -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<style>
:root { --bg-matrix: #060B12; --bg-card: #0C1422; --bg-input: #121E30; --navy: #002D62; --gold: #D3A747; --gold-glow: #E8CC88; --tx: #F3F6F9; --tx-m: #7E8B9B; --bd: rgba(211,167,71,0.15); --green: #10B981; --red: #EF4444; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-matrix); color: var(--tx); font-family: 'Inter', sans-serif; font-size: 13px; }
.admin-grid { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
.sidebar { background: #040710; border-right: 1px solid var(--bd); padding: 24px 16px; display: flex; flex-direction: column; gap: 24px; }
.panel-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: #FFF; letter-spacing: 0.1em; }
.nav-btn { width: 100%; padding: 12px 16px; background: transparent; border: none; border-radius: 10px; color: var(--tx-m); font-size: 13px; font-weight: 600; text-align: left; cursor: pointer; min-height: 44px; }
.nav-btn:hover, .nav-btn.active { background: rgba(211,167,71,0.1); color: var(--gold-glow); }
.main-stage { padding: 32px; overflow-y: auto; }
.stage-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 600; margin-bottom: 24px; }
.telemetry-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 32px; }
.telemetry-card { background: var(--bg-card); border: 1px solid var(--bd); padding: 20px; border-radius: 14px; }
.telemetry-val { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; margin-top: 8px; }
.data-table-card { background: var(--bg-card); border: 1px solid var(--bd); border-radius: 16px; overflow: hidden; }
.data-table { width: 100%; border-collapse: collapse; text-align: left; }
.data-table th { padding: 14px 20px; background: rgba(0,0,0,0.2); font-size: 11px; text-transform: uppercase; color: var(--tx-m); border-bottom: 1px solid var(--bd); }
.data-table td { padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); }
.error-banner { background: rgba(239,68,68,0.1); border: 1px solid var(--red); color: var(--red); padding: 16px; border-radius: 12px; margin-bottom: 24px; font-family: 'JetBrains Mono', monospace; }
.badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; }
.badge.green { background: rgba(16,185,129,0.15); color: var(--green); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// Production Credentials Configuration Instance
const firebaseConfig = {
  projectId: "ai-studio-3626ba3d-f6e9-4139-95a2-d41ff74762e6"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const firestoreDb = firebase.firestore();

function AdminMatrixApp() {
  const [module, setModule] = useState("dashboard");
  const [listings, setListings] = useState([]);
  const [leads, setLeads] = useState([]);
  const [traceFault, setTraceFault] = useState(null);

  useEffect(() => {
    // Real-Time Listener syncing database mutations to Vercel storefront
    const killListingsWatcher = firestoreDb.collection("properties").orderBy("lastUpdated", "desc")
      .onSnapshot(snap => {
        setListings(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      }, err => {
        setTraceFault({ area: "Firestore Properties Node Listener", cause: err.message, fix: "Check Firestore Security Rules parameters." });
      });

    // Capture incoming Property Finder leads
    const killLeadsWatcher = firestoreDb.collection("leads").orderBy("timestamp", "desc")
      .onSnapshot(snap => {
        setLeads(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      }, err => {
        setTraceFault({ area: "Property Finder Cloud Webhook Portal", cause: err.message, fix: "Verify cloud function endpoint status logs." });
      });

    return () => {
      try { killListingsWatcher(); } catch(e){}
      try { killLeadsWatcher(); } catch(e){}
    };
  }, []);

  return (
    <div className="admin-grid">
      <aside className="sidebar">
        <div className="panel-title">SIERRA CONTROL</div>
        <nav style={{display:'flex', flexDirection:'column', gap:'4px'}}>
          <button onClick={() => setModule("dashboard")} className={`nav-btn ${module === 'dashboard' ? 'active' : ''}`}>📊 Live Dashboard</button>
          <button onClick={() => setModule("listings")} className={`nav-btn ${module === 'listings' ? 'active' : ''}`}>🏢 Live Properties ({listings.length})</button>
          <button onClick={() => setModule("crm")} className={`nav-btn ${module === 'crm' ? 'active' : ''}`}>👥 CRM Leads Pipeline ({leads.length})</button>
        </nav>
      </aside>

      <main className="main-stage">
        {traceFault && (
            <div className="error-banner">
                <strong>🚨 CRITICAL DATA STREAM ANOMALY INTERCEPTED:</strong><br/>
                <span>📍 Location Node: {traceFault.area}</span><br/>
                <span>❌ Error Message: {traceFault.cause}</span><br/>
                <span>🛠️ Required Fix Action: {traceFault.fix}</span>
            </div>
        )}

        {module === "dashboard" && (
          <div>
            <h1 className="stage-title">System Telemetry Dashboard</h1>
            <div className="telemetry-row">
              <div className="telemetry-card"><div>Database Sync Status</div><div className="telemetry-val">Live Firestore</div></div>
              <div className="telemetry-card"><div>Active Storefront Items</div><div className="telemetry-val">{listings.length}</div></div>
              <div className="telemetry-card"><div>Property Finder Webhooks</div><div className="telemetry-val">{leads.length}</div></div>
            </div>
          </div>
        )}

        {module === "listings" && (
          <div>
            <h1 className="stage-title">Synchronized Property Grid (Property Finder Matrix)</h1>
            <div className="data-table-card">
              <table className="data-table">
                <thead><tr><th>Asset Reference ID</th><th>Compound Target</th><th>Listing Title Parameters</th><th>Price Configuration</th><th>Status</th></tr></thead>
                <tbody>
                  {listings.map(l => (
                    <tr key={l.id}><td>{l.id}</td><td style={{color:'var(--gold-glow)', fontWeight:600}}>{l.compound}</td><td>{l.title}</td><td>{l.price}</td><td><span className="badge green">{l.status || 'Active'}</span></td></tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {module === "crm" && (
          <div>
            <h1 className="stage-title">CRM Intake Pipelines</h1>
            <div className="data-table-card">
              <table className="data-table">
                <thead><tr><th>Inbound Lead ID</th><th>Client Name</th><th>Primary Connection Channel</th><th>Target Budget Matrix</th><th>Desired Location Node</th></tr></thead>
                <tbody>
                  {leads.map(lead => (
                    <tr key={lead.id}><td>{lead.id}</td><td style={{fontWeight:600}}>{lead.client}</td><td>{lead.contact}</td><td>{lead.budget}</td><td>{lead.compound}</td></tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AdminMatrixApp />);
</script>
</body>
</html>
