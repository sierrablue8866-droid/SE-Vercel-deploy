<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Best Unit Matches — Sierra Estates</title>
  <link rel="stylesheet" href="../assets/sierra.css?v=5" />
  <style>
    .match-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin: 36px 0 28px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow-sm); }
    .match-bar .seg { display: flex; gap: 3px; padding: 3px; background: var(--ivory-alt); border-radius: 999px; }
    .match-bar .seg button { border: none; cursor: pointer; padding: 8px 16px; border-radius: 999px; font-family: var(--font-ui); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); background: transparent; }
    .match-bar .seg button.on { background: var(--navy); color: #fff; }
    .match-bar input { flex: 1; min-width: 180px; border: 1px solid var(--line); border-radius: 999px; padding: 11px 18px; font-family: var(--font-ui); font-size: 14px; outline: none; color: var(--navy); }
    .match-bar input:focus { border-color: var(--gold); }
    .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
    .mc-img { position: relative; height: 200px; overflow: hidden; }
    .mc-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 600ms var(--ease); }
    .sb-card:hover .mc-img img { transform: scale(1.07); }
    .mc-score { position: absolute; top: 12px; right: 12px; background: rgba(9,24,40,0.86); backdrop-filter: blur(6px); color: var(--gold-lt); font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 999px; border: 1px solid rgba(233,193,118,0.4); }
    .mc-body { padding: 18px; }
    .mc-loc { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold-deep); margin-bottom: 6px; }
    .mc-name { font-family: var(--font-display); font-size: 21px; font-weight: 600; color: var(--navy); margin-bottom: 8px; }
    .mc-price { font-size: 16px; font-weight: 700; color: var(--gold-deep); margin-bottom: 12px; }
    .mc-specs { display: flex; gap: 10px; padding-top: 12px; border-top: 1px solid var(--line); font-size: 12px; color: var(--navy-soft); }
    .mc-reason { margin-top: 12px; font-size: 12px; color: var(--navy-soft); background: var(--ivory); border-radius: 9px; padding: 10px 12px; line-height: 1.5; }
    .mc-reason b { color: var(--gold-deep); }
    .empty { text-align: center; padding: 70px 0; color: var(--muted); }
  </style>
</head>
<body>
  <div class="sb-topbar">
    <a class="sb-brand" href="../Sierra Estates Landing.html"><span class="sb-brand-mark">S</span><span><span class="sb-brand-name">SIERRA ESTATES</span><span class="sb-brand-sub" style="display:block;">NEW CAIRO · REALTY</span></span></a>
    <a class="sb-back" href="../Sierra Estates Landing.html">← Back to home</a>
  </div>

  <main class="ai-page">
    <div class="sb-section">
      <div class="ai-hero reveal">
        <span class="sb-eyebrow">AI Support · Matching</span>
        <h1>Best Unit Matches</h1>
        <p>Listing search ranked by Sierra's match score — direct-owner ratio, yield fit, and your stated criteria.</p>
      </div>

      <div class="match-bar reveal">
        <div class="seg" id="seg">
          <button class="on" data-v="all">All</button>
          <button data-v="rent">Rent</button>
          <button data-v="resale">Resale</button>
        </div>
        <input id="search" placeholder="Filter by compound or name (typos OK)…" />
      </div>

      <div class="match-grid" id="grid"></div>
    </div>
  </main>

  <script src="../assets/sierra.js?v=5"></script>
  <script>
    const IMGS = [
      'https://images.unsplash.com/photo-1613490493576-7fde63acd811?w=900&q=85',
      'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=900&q=85',
      'https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=900&q=85',
      'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=900&q=85',
      'https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=900&q=85',
      'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=900&q=85',
    ];
    const TYPES = ['Villa', 'Penthouse', 'Twin House', 'Apartment', 'Studio', 'Townhouse'];
    const REASONS = [
      'Direct-owner listing · <b>no commission markup</b>',
      'Yield <b>8.3% net</b> — top decile for the zone',
      'Priced <b>6% below</b> compound median',
      'Matches your <b>3-bed, finished</b> preference',
      'Hidden gem · <b>off-market</b> for 11 days',
    ];
    const LISTINGS = window.SIERRA_COMPOUNDS.slice(0, 9).map((c, i) => ({
      name: `${['The Glass Pavilion','Aurora Residence','The Meridian','Golden Estate','Palm Suite','Obsidian Loft','Elysian Villa','Skyline Penthouse','Garden Maison'][i]}`,
      compound: c.name, zone: c.zone,
      purpose: i % 3 === 1 ? 'rent' : 'resale',
      price: i % 3 === 1 ? `$${(800 + i * 350).toLocaleString()} / mo` : `EGP ${(4 + i * 1.6).toFixed(1)}M`,
      beds: 2 + (i % 4), baths: 2 + (i % 3), area: `${180 + i * 30} m²`,
      type: TYPES[i % TYPES.length], score: 99 - i * 2, img: IMGS[i % IMGS.length], reason: REASONS[i % REASONS.length],
    }));

    let mode = 'all', q = '';
    const grid = document.getElementById('grid');
    function render() {
      let rows = LISTINGS.filter(l => mode === 'all' || l.purpose === mode);
      if (q.trim()) {
        const matches = window.sbRankCompounds(q, 30).map(c => c.name);
        rows = rows.filter(l => matches.includes(l.compound) || l.name.toLowerCase().includes(q.toLowerCase()));
      }
      rows.sort((a, b) => b.score - a.score);
      grid.innerHTML = rows.length ? rows.map(l => `
        <article class="sb-card" style="overflow:hidden;">
          <div class="mc-img"><img src="${l.img}" alt="${l.name}"><span class="mc-score">${l.score}% match</span></div>
          <div class="mc-body">
            <div class="mc-loc">${l.compound} · ${l.zone}</div>
            <div class="mc-name">${l.name}</div>
            <div class="mc-price">${l.price}</div>
            <div class="mc-specs"><span>${l.type}</span><span>·</span><span>${l.beds} bed</span><span>·</span><span>${l.area}</span></div>
            <div class="mc-reason">${l.reason}</div>
          </div>
        </article>`).join('') : '<div class="empty">No matching units. Try another compound.</div>';
    }
    document.querySelectorAll('#seg button').forEach(b => b.onclick = () => {
      document.querySelectorAll('#seg button').forEach(x => x.classList.remove('on'));
      b.classList.add('on'); mode = b.dataset.v; render();
    });
    document.getElementById('search').addEventListener('input', e => { q = e.target.value; render(); });
    render();

    window.mountSierraAIHub('../');
    window.sbInitReveal();
  </script>
</body>
</html>
