name: Desktop feature release

# Manual-only, per-unmerged-PR prerelease build. Produces a signed Electron
# installer for a single PR's head SHA, published as a prerelease under the
# isolated `pr<N>` electron-updater channel. This channel NEVER writes
# `latest*` or `nightly*` manifests, so it cannot disrupt stable or nightly
# auto-updates. Only one live feature build per PR is allowed; a new run
# deletes the previous one before publishing. The build jobs are gated by the
# `release` environment (same required-reviewer approval as the stable release
# workflow). Cross-repository PRs are rejected unless `allow_fork` is set.
#
# QUOTA: at most 5 active feature releases are allowed at once. If the limit
# is hit, retire (delete) an old one before triggering a new build.
#
# Version format: <base>-pr<N>.<UTCts>+<sha>  (computed in the guard job via
# the GitHub contents API + bash; no PR-controlled code ever executes there)
# Feed channel:   pr<N>          (e.g. pr42.yml, pr42-mac.yml, pr42-linux.yml)

on:
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to build (required)"
        required: true
        type: string
      slug:
        description: "Short label for the build (display only, optional)"
        required: false
        type: string
        default: ""
      platforms:
        description: "Comma-separated platforms to build (default: mac,win,linux)"
        required: false
        type: string
        default: "mac,win,linux"
      allow_fork:
        description: "Allow cross-repository (fork) PRs"
        required: false
        type: boolean
        default: false

jobs:
  # ── guard ─────────────────────────────────────────────────────────────────
  # Validates the PR, enforces the active-build quota, and computes the version.
  # Runs on ubuntu with no environment and no secrets so it can be inspected
  # freely; secrets are consumed only in the gated build jobs below.
  guard:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      headSha: ${{ steps.pr.outputs.headSha }}
      shortSha: ${{ steps.pr.outputs.shortSha }}
      title: ${{ steps.pr.outputs.title }}
      base: ${{ steps.version.outputs.base }}
      channel: ${{ steps.version.outputs.channel }}
      build_mac: ${{ steps.platforms.outputs.build_mac }}
      build_win: ${{ steps.platforms.outputs.build_win }}
      build_linux: ${{ steps.platforms.outputs.build_linux }}
    steps:
      - name: Parse platform matrix
        id: platforms
        shell: bash
        env:
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          build_mac=false; build_win=false; build_linux=false
          IFS=',' read -ra parts <<< "$PLATFORMS"
          for p in "${parts[@]}"; do
            p="${p// /}"
            case "$p" in
              mac)   build_mac=true ;;
              win)   build_win=true ;;
              linux) build_linux=true ;;
              *) echo "::warning::Unknown platform '$p' ignored" ;;
            esac
          done
          {
            echo "build_mac=$build_mac"
            echo "build_win=$build_win"
            echo "build_linux=$build_linux"
          } >> "$GITHUB_OUTPUT"

      - name: "Quota check: at most 5 active feature releases"
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr }}
        run: |
          # Count UNIQUE, non-expired feature releases whose associated PR is
          # still open. If >= 5, fail fast.
          #  - dedupe by PR number: stray duplicate marked releases for the
          #    same PR must not each count against the quota.
          #  - ignore releases older than 7 days: a stale/abandoned build
          #    should not block new ones from being started.
          cutoff="$(date -u -d '7 days ago' +%s)"
          declare -A seen
          active=0
          while IFS=$'\t' read -r published_at body; do
            # Extract the JSON payload from the marker line and read .pr from it.
            json="$(echo "$body" | sed -n 's/.*<!-- ao-feature-build: \(.*\) -->.*/\1/p')"
            if [ -z "$json" ]; then continue; fi
            pr_num="$(echo "$json" | jq -r '.pr' 2>/dev/null)" || true
            if [ -z "$pr_num" ] || [ "$pr_num" = "null" ]; then continue; fi
            # A rebuild of a PR that already has a live build is net-zero (the
            # "delete prior build" step retires it before publishing), so
            # don't let it count against the quota.
            if [ "$pr_num" = "$PR_NUMBER" ]; then continue; fi
            if [ -n "${seen[$pr_num]:-}" ]; then continue; fi
            published_ts="$(date -u -d "$published_at" +%s 2>/dev/null || echo 0)"
            if [ "$published_ts" -lt "$cutoff" ]; then continue; fi
            state="$(gh api "repos/$REPO/pulls/$pr_num" --jq '.state' 2>/dev/null || echo closed)"
            if [ "$state" = "open" ]; then
              seen[$pr_num]=1
              active=$((active + 1))
            fi
          done < <(gh api "repos/$REPO/releases?per_page=100" --jq '.[] | select(.prerelease) | select(.body != null) | select(.body | contains("<!-- ao-feature-build:")) | [.published_at, .body] | @tsv')
          echo "Active feature releases: $active"
          if [ "$active" -ge 5 ]; then
            echo "::error::5 feature releases active - retire one first."
            exit 1
          fi

      - name: Resolve PR head and validate
        id: pr
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr }}
          ALLOW_FORK: ${{ inputs.allow_fork }}
        run: |
          pr_json="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid,state,title,isCrossRepository)"
          state="$(echo "$pr_json" | jq -r '.state')"
          is_cross="$(echo "$pr_json" | jq -r '.isCrossRepository')"
          head_sha="$(echo "$pr_json" | jq -r '.headRefOid')"
          title="$(echo "$pr_json" | jq -r '.title')"

          if [ "$state" != "OPEN" ]; then
            echo "::error::PR #$PR_NUMBER is not open (state=$state). Feature builds require an open PR."
            exit 1
          fi

          if [ "$is_cross" = "true" ] && [ "$ALLOW_FORK" != "true" ]; then
            echo "::error::PR #$PR_NUMBER is from a fork. Set allow_fork=true to build fork PRs."
            exit 1
          fi

          short_sha="${head_sha:0:7}"
          # Escape newlines/special chars in title for output; use printf for title.
          {
            echo "headSha=$head_sha"
            echo "shortSha=$short_sha"
            printf 'title=%s\n' "$title"
          } >> "$GITHUB_OUTPUT"

      - name: Read PR head package.json version (no checkout, no code execution)
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr }}
          HEAD_SHA: ${{ steps.pr.outputs.headSha }}
          SHORT_SHA: ${{ steps.pr.outputs.shortSha }}
        run: |
          # Fetch frontend/package.json AT THE PR HEAD via the contents API
          # and read .version with jq. This never checks out the PR head and
          # never runs any file from it (no node, no feature-version.mjs) -
          # guard has no `environment:` gate, so anything it executed from
          # PR-controlled content would bypass the release approval gate.
          base="$(gh api "repos/$REPO/contents/frontend/package.json?ref=$HEAD_SHA" --jq '.content' | base64 -d | jq -r '.version')"
          if [ -z "$base" ] || [ "$base" = "null" ]; then
            echo "::error::Could not read frontend/package.json version at $HEAD_SHA"
            exit 1
          fi
          # Mirror feature-version.mjs's bare-version normalization (strip an
          # optional desktop-/v prefix) before appending the pr/timestamp/sha.
          bare="${base#desktop-}"
          bare="${bare#v}"
          ts="$(date -u +%Y%m%d%H%M)"
          version="${bare}-pr${PR_NUMBER}.${ts}+${SHORT_SHA}"
          tag="v${version%%+*}"
          channel="pr${PR_NUMBER}"
          {
            echo "base=$bare"
            echo "version=$version"
            echo "tag=$tag"
            echo "channel=$channel"
          } >> "$GITHUB_OUTPUT"
          echo "Computed version: $version  tag: $tag  channel: $channel"

  # ── release (matrix: macos-latest, windows-latest, ubuntu-latest) ─────────
  # Mirrors frontend-nightly.yml's build steps exactly. Gated by the `release`
  # environment (same required-reviewer approval as stable). Checks out the PR
  # head SHA so we build exactly what the PR author pushed.
  release:
    needs: guard
    if: >-
      needs.guard.outputs.build_mac == 'true' ||
      needs.guard.outputs.build_win == 'true' ||
      needs.guard.outputs.build_linux == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    environment: release
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Skip if platform not requested
        id: gate
        shell: bash
        # Runs before checkout, so it must not use the job's `frontend`
        # working-directory (that dir does not exist yet). Read env only.
        working-directory: ${{ github.workspace }}
        env:
          PLATFORM: ${{ matrix.platform }}
          BUILD_MAC: ${{ needs.guard.outputs.build_mac }}
          BUILD_WIN: ${{ needs.guard.outputs.build_win }}
          BUILD_LINUX: ${{ needs.guard.outputs.build_linux }}
        run: |
          skip=false
          case "$PLATFORM" in
            mac)   [ "$BUILD_MAC"   = "true" ] || skip=true ;;
            win)   [ "$BUILD_WIN"   = "true" ] || skip=true ;;
            linux) [ "$BUILD_LINUX" = "true" ] || skip=true ;;
          esac
          echo "skip=$skip" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          ref: ${{ needs.guard.outputs.headSha }}

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v5
        if: steps.gate.outputs.skip != 'true'
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - run: npm ci
        if: steps.gate.outputs.skip != 'true'

      - name: Stamp feature version
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        env:
          FEATURE_VERSION: ${{ needs.guard.outputs.version }}
        run: |
          # Strip +build metadata: Forge stamps package.json with the semver
          # pre-release portion only; publisher-github names the release v<that>.
          node -e "const v=process.env.FEATURE_VERSION.split('+')[0]; const fs=require('fs'); const p=require('./package.json'); p.version=v; fs.writeFileSync('./package.json', JSON.stringify(p,null,'\t')+'\n');"

      - name: macOS signing setup
        if: steps.gate.outputs.skip != 'true' && startsWith(matrix.os, 'macos')
        uses: ./.github/actions/macos-signing-setup
        with:
          csc-link: ${{ secrets.CSC_LINK }}
          csc-key-password: ${{ secrets.CSC_KEY_PASSWORD }}
          apple-api-key-base64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          apple-api-key-id: ${{ secrets.APPLE_API_KEY_ID }}
          apple-api-issuer: ${{ secrets.APPLE_API_ISSUER }}
          apple-signing-identity: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Publish
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: |
          # Retry transient macOS sign/notary flakes (Apple notary -1009,
          # osx-sign keychain races) so the build self-heals instead of failing.
          for i in 1 2 3; do
            if npm run publish; then exit 0; fi
            echo "::warning::publish attempt $i/3 failed (likely a transient macOS sign/notary flake)"
            [ "$i" -lt 3 ] && sleep 30
          done
          echo "::error::publish failed after 3 attempts" >&2
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AO_RELEASE_REPO: ${{ github.repository }}
          AO_RELEASE_PRERELEASE: "true"
          # macOS signing + notarization env is exported by the "macOS signing
          # setup" step above via $GITHUB_ENV; the cert is in the keychain.

  # ── release-intel (dedicated darwin-x64 leg) ──────────────────────────────
  # Mirrors the release-intel job in frontend-nightly.yml. Only macOS can build
  # the x64 installer; this job is separate from the matrix so publish-feed can
  # wait on it. Runner is macos-15-intel (macos-13 deprecated/no capacity).
  release-intel:
    needs: guard
    if: needs.guard.outputs.build_mac == 'true'
    runs-on: macos-15-intel
    environment: release
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.guard.outputs.headSha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - run: npm ci

      - name: Stamp feature version
        shell: bash
        env:
          FEATURE_VERSION: ${{ needs.guard.outputs.version }}
        run: |
          node -e "const v=process.env.FEATURE_VERSION.split('+')[0]; const fs=require('fs'); const p=require('./package.json'); p.version=v; fs.writeFileSync('./package.json', JSON.stringify(p,null,'\t')+'\n');"

      - name: macOS signing setup
        uses: ./.github/actions/macos-signing-setup
        with:
          csc-link: ${{ secrets.CSC_LINK }}
          csc-key-password: ${{ secrets.CSC_KEY_PASSWORD }}
          apple-api-key-base64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          apple-api-key-id: ${{ secrets.APPLE_API_KEY_ID }}
          apple-api-issuer: ${{ secrets.APPLE_API_ISSUER }}
          apple-signing-identity: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Publish
        shell: bash
        run: |
          # Retry transient macOS sign/notary flakes (Apple notary -1009,
          # osx-sign keychain races) so the build self-heals instead of failing.
          for i in 1 2 3; do
            if npm run publish; then exit 0; fi
            echo "::warning::publish attempt $i/3 failed (likely a transient macOS sign/notary flake)"
            [ "$i" -lt 3 ] && sleep 30
          done
          echo "::error::publish failed after 3 attempts" >&2
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AO_RELEASE_REPO: ${{ github.repository }}
          AO_RELEASE_PRERELEASE: "true"

  # ── publish-feed ──────────────────────────────────────────────────────────
  # Generates the pr<N> electron-updater feed from the versioned prerelease
  # assets. Mirrors nightly's publish-feed but uses the pr<N> channel. Includes
  # a hard guard that rejects any feed file that would write latest* or nightly*
  # manifests, protecting stable and nightly channels from accidental clobber.
  # Gated by the `release` environment: this job also deletes/renames GitHub
  # releases with `contents: write`, so it must never run on PR-controlled
  # code without the same approval the build jobs require. `always()` is kept
  # so our own success checks below run instead of the default "skip if any
  # need failed or was skipped" behavior (release-intel is legitimately
  # skipped when mac isn't requested); we then require release to have
  # actually succeeded and release-intel to not have failed.
  publish-feed:
    needs: [guard, release, release-intel]
    if: >-
      always() &&
      needs.guard.result == 'success' &&
      needs.release.result == 'success' &&
      needs.release-intel.result != 'failure'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.guard.outputs.headSha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # feed.mjs imports app-builder-lib's blockmap generator, so deps are needed.
      - run: npm ci

      - name: Generate and upload the pr<N> feed
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FEATURE_VERSION: ${{ needs.guard.outputs.version }}
          PR_NUMBER: ${{ inputs.pr }}
        run: |
          # Forge stamps package.json to VERSION without +build metadata and
          # publishes to v<that>. Match it.
          version="${FEATURE_VERSION%%+*}"
          tag="v$version"
          channel="pr${PR_NUMBER}"
          mkdir -p dist
          gh release download "$tag" --dir dist --clobber
          node scripts/feed.mjs dist "$version" "$channel"

      - name: "Guard: assert feed channel and reject latest*/nightly* assets"
        shell: bash
        env:
          PR_NUMBER: ${{ inputs.pr }}
        run: |
          channel="pr${PR_NUMBER}"
          # Validate channel matches ^pr[0-9]+$
          if ! echo "$channel" | grep -qP '^pr[0-9]+$'; then
            echo "::error::Feed channel '$channel' does not match ^pr[0-9]+$ - aborting to protect stable/nightly channels."
            exit 1
          fi
          # Reject any generated feed file that matches latest* or nightly*.
          # Paths are relative to the job's `working-directory: frontend`, so
          # this must be dist/*, not frontend/dist/* (which would resolve to
          # the nonexistent frontend/frontend/dist and never match anything).
          shopt -s nullglob
          bad_files=()
          for f in dist/latest*.yml dist/nightly*.yml; do
            [ -f "$f" ] && bad_files+=("$f")
          done
          if [ ${#bad_files[@]} -gt 0 ]; then
            echo "::error::Feed guard triggered: found forbidden manifest(s): ${bad_files[*]}. Feature builds must not write latest* or nightly* manifests."
            exit 1
          fi
          echo "Feed guard passed: channel='$channel', no latest*/nightly* manifests found."

      - name: Upload pr<N> feed assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr }}
          FEATURE_VERSION: ${{ needs.guard.outputs.version }}
        run: |
          version="${FEATURE_VERSION%%+*}"
          tag="v$version"
          channel="pr${PR_NUMBER}"
          shopt -s nullglob
          feed_ymls=()
          blockmaps=()
          # Collect into separate arrays first (avoids SC2206 word-splitting on
          # a variable-containing glob pattern; nullglob means empty if no match).
          for f in dist/"${channel}"*.yml; do feed_ymls+=("$f"); done
          for f in dist/*.blockmap;        do blockmaps+=("$f"); done
          assets=("${feed_ymls[@]}" "${blockmaps[@]}")
          if [ ${#assets[@]} -eq 0 ]; then
            echo "::error::No feed assets generated for channel '$channel'" >&2
            exit 1
          fi
          gh release upload "$tag" "${assets[@]}" --clobber

      - name: Delete prior feature releases for this PR (one live build per PR)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr }}
          TAG: ${{ needs.guard.outputs.tag }}
        run: |
          # Find and delete any existing prerelease tagged v*-pr<N>.* for this
          # PR, EXCEPT the one we just built (TAG). This used to run once from
          # the ubuntu-latest leg of the `release` matrix, which meant it (and
          # the annotate step below) were skipped entirely when
          # platforms=mac/win only - the prior build was never retired and the
          # new one never got its ao-feature-build marker. publish-feed runs
          # exactly once regardless of which platforms were built, so both
          # steps belong here instead.
          matching="$(gh api "repos/$REPO/releases?per_page=100" --jq \
            ".[] | select(.prerelease) | select(.tag_name | test(\"-pr${PR_NUMBER}\\\\.\")) | select(.tag_name != \"${TAG}\") | .tag_name")"
          if [ -z "$matching" ]; then
            echo "No prior feature release found for PR #$PR_NUMBER."
          else
            while IFS= read -r old_tag; do
              echo "Deleting prior feature release: $old_tag"
              gh release delete "$old_tag" --repo "$REPO" --cleanup-tag --yes || true
            done <<< "$matching"
          fi

      - name: Annotate release with feature metadata
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr }}
          TAG: ${{ needs.guard.outputs.tag }}
          TITLE: ${{ needs.guard.outputs.title }}
          BASE: ${{ needs.guard.outputs.base }}
          SHORT_SHA: ${{ needs.guard.outputs.shortSha }}
          SLUG: ${{ inputs.slug }}
        run: |
          # Set the release name and append the machine-readable marker to the
          # body so the quota check can find it by PR number and the app can
          # parse it. Payload is JSON (matches feature-builds.ts parseMarker);
          # jq builds it so pr stays a number and slug is safely escaped.
          payload="$(jq -nc \
            --argjson pr "${PR_NUMBER}" \
            --arg base "${BASE}" \
            --arg sha "${SHORT_SHA}" \
            --arg slug "${SLUG}" \
            '{pr: $pr, base: $base, sha: $sha, slug: $slug}')"
          marker="<!-- ao-feature-build: ${payload} -->"
          current_body="$(gh release view "$TAG" --repo "$REPO" --json body --jq '.body' 2>/dev/null || echo '')"
          new_body="${current_body}"$'\n'"${marker}"
          gh release edit "$TAG" \
            --repo "$REPO" \
            --title "[feature] PR #${PR_NUMBER}: ${TITLE}" \
            --notes "$new_body"
