name: Desktop release

# Builds and publishes the Electron desktop app via electron-forge.
# Generates a GitHub Release with installers + update manifests, then uploads
# stable, version-free asset aliases so `ao start`'s constant
# releases/latest/download/<name> URL resolves (spec §8, §11.4).
#
# Each target OS builds on its own runner so the bundled `ao` daemon is compiled
# natively for that platform. build-daemon.mjs keys the binary off the build
# host's platform, so cross-OS packaging (e.g. building the Windows installer on
# macOS) would ship a non-Windows binary named `ao` and the app could not launch
# the daemon (issues #235/#256). The per-OS matrix keeps host == target, and the
# Linux daemon is built on the Linux runner (AgentWrapper/agent-orchestrator#2191).
#
# ⚠️ Until macOS code signing + notarization secrets are configured (see
# frontend/docs/desktop-release.md), published builds are UNSIGNED and will
# NOT auto-update on macOS. The workflow still produces installable artifacts.
#
# ── Cutting a FORK test release (dev loop) ────────────────────────────────────
# Test releases go to harshitsinghbhandari/agent-orchestrator (the fork), never
# to AgentWrapper. To cut one, on the FORK:
#   - push a `desktop-v*` tag (e.g. `git push fork desktop-v0.0.0-test1`), or
#   - run this workflow via `workflow_dispatch` from the fork's Actions tab.
# AO_RELEASE_REPO MUST be set to the fork for a test run. It is derived
# automatically below from `github.repository`, so a fork run publishes to the
# fork and a run on AgentWrapper publishes to AgentWrapper, with no edit. The
# matching test `ao` binary is built with
# `-ldflags -X ...cli.releaseRepo=harshitsinghbhandari/agent-orchestrator` so it
# fetches from the same fork (spec §6.3).

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      skip_e2e_gate:
        description: "Skip the advisory pod e2e gate (emergency/override)."
        type: boolean
        default: false

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    # Gates the signed release behind the `release` environment's required
    # reviewers: any write-access user can push a desktop-v* tag, but only
    # designated approvers can let the build that consumes the signing secrets
    # proceed. Configure reviewers in repo Settings > Environments > release.
    environment: release
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # The daemon is compiled by build-daemon.mjs during prepackage/premake, so
      # the Go toolchain must be present and pinned on every runner.
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: npm ci
      - name: macOS signing setup
        if: startsWith(matrix.os, 'macos')
        uses: ./.github/actions/macos-signing-setup
        with:
          csc-link: ${{ secrets.CSC_LINK }}
          csc-key-password: ${{ secrets.CSC_KEY_PASSWORD }}
          apple-api-key-base64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          apple-api-key-id: ${{ secrets.APPLE_API_KEY_ID }}
          apple-api-issuer: ${{ secrets.APPLE_API_ISSUER }}
          apple-signing-identity: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      - name: Publish
        shell: bash
        run: |
          # Retry transient macOS sign/notary flakes (Apple notary -1009,
          # osx-sign keychain races) so the build self-heals instead of failing.
          for i in 1 2 3; do
            if npm run publish; then exit 0; fi
            echo "::warning::publish attempt $i/3 failed (likely a transient macOS sign/notary flake)"
            [ "$i" -lt 3 ] && sleep 30
          done
          echo "::error::publish failed after 3 attempts" >&2
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AO_RELEASE_REPO: ${{ github.repository }}
          # macOS signing + notarization env (APPLE_SIGNING_IDENTITY, APPLE_API_KEY,
          # APPLE_API_KEY_ID, APPLE_API_ISSUER) is exported by the "macOS signing
          # setup" step above via $GITHUB_ENV; the Developer ID cert is in the
          # keychain. No-op on non-macOS runners.

      # Upload stable, version-free asset aliases for this runner's platform so
      # `ao start`'s constant releases/latest/download/<name> URL resolves. The
      # forge makers emit versioned, productName-derived filenames; we copy them
      # to the space-free names `ao start` fetches and upload to the v<version>
      # release the publish step just created, with --clobber (so re-runs replace).
      #
      # Arch-coverage note: each runner only builds its host arch. macos-latest
      # (Apple silicon) produces darwin-arm64; macos-15-intel (Intel x64) produces
      # darwin-x64. Both macOS runners run this step (see the `if` below), so the
      # arm64 and x64 stable aliases are now both built (spec §8).
      # The Linux stable name is undecided (spec §11.3), so we build the deb/rpm
      # but intentionally upload no Linux alias yet.
      - name: Upload stable asset aliases (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          # electron-forge publisher-github creates the release as v<package.json
          # version> (PublisherGithub.js: `${tagPrefix ?? 'v'}${version}`), NOT the
          # triggering git tag. Target that release, not GITHUB_REF_NAME, or the
          # upload hits a non-existent release.
          tag="v$(node -p "require('./package.json').version")"
          arch="$(uname -m)"
          case "$arch" in
            arm64) alias_name="agent-orchestrator-darwin-arm64.zip" ;;
            x86_64) alias_name="agent-orchestrator-darwin-x64.zip" ;;
            *) echo "unsupported macOS arch: $arch" >&2; exit 1 ;;
          esac
          # maker-zip output: out/make/zip/darwin/<arch>/<dir-basename>-<version>.zip
          src="$(ls out/make/zip/darwin/*/*.zip | head -n1)"
          if [ -z "$src" ]; then echo "no macOS zip found under out/make/zip/darwin" >&2; exit 1; fi
          cp "$src" "$alias_name"
          gh release upload "$tag" "$alias_name" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload stable asset aliases (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # Forge publishes to v<version> (see the macOS step), not the git tag.
          tag="v$(node -p "require('./package.json').version")"
          alias_name="agent-orchestrator-win32-x64.exe"
          # NSIS (electron-builder) output: out/make/<productName> Setup <version>.exe
          src="$(ls "out/make/"*Setup*.exe | head -n1)"
          if [ -z "$src" ]; then echo "no NSIS installer found under out/make" >&2; exit 1; fi
          cp "$src" "$alias_name"
          gh release upload "$tag" "$alias_name" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Linux: deb/rpm AND an AppImage build on this runner (issue #2191). The
      # AppImage is the fetch-and-run artifact for `ao start` (spec §11.3); we
      # copy it to the stable, space-free name the bootstrapper fetches and
      # upload to the v<version> release. The versioned deb/rpm are still
      # published by the forge publisher above for users who want a system package.
      - name: Upload stable asset aliases (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          # Forge publishes to v<version> (see the macOS step), not the git tag.
          tag="v$(node -p "require('./package.json').version")"
          alias_name="agent-orchestrator-linux-x64.AppImage"
          # AppImage (electron-builder) output: out/make/<productName>-<version>.AppImage
          src="$(ls out/make/*.AppImage | head -n1)"
          if [ -z "$src" ]; then echo "no AppImage found under out/make" >&2; exit 1; fi
          cp "$src" "$alias_name"
          gh release upload "$tag" "$alias_name" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Dedicated Intel (darwin-x64) build leg. Kept a separate job (not in the
  # release matrix) because only a macOS host can build the x64 installer, but
  # publish-feed now waits on it (needs: [release, release-intel]) so the x64
  # entry is always present in latest-mac.yml and Intel users get auto-updates.
  # Runner is macos-15-intel: macos-13 is deprecated/has no capacity (multi-hour
  # queues), so this leg uses the supported Intel x64 image.
  release-intel:
    runs-on: macos-15-intel
    environment: release # same approval gate as the matrix release job
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: npm ci
      - name: macOS signing setup
        uses: ./.github/actions/macos-signing-setup
        with:
          csc-link: ${{ secrets.CSC_LINK }}
          csc-key-password: ${{ secrets.CSC_KEY_PASSWORD }}
          apple-api-key-base64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          apple-api-key-id: ${{ secrets.APPLE_API_KEY_ID }}
          apple-api-issuer: ${{ secrets.APPLE_API_ISSUER }}
          apple-signing-identity: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      - name: Publish
        shell: bash
        run: |
          # Retry transient macOS sign/notary flakes (Apple notary -1009,
          # osx-sign keychain races) so the build self-heals instead of failing.
          for i in 1 2 3; do
            if npm run publish; then exit 0; fi
            echo "::warning::publish attempt $i/3 failed (likely a transient macOS sign/notary flake)"
            [ "$i" -lt 3 ] && sleep 30
          done
          echo "::error::publish failed after 3 attempts" >&2
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AO_RELEASE_REPO: ${{ github.repository }}
      - name: Upload stable asset aliases (macOS)
        shell: bash
        run: |
          tag="v$(node -p "require('./package.json').version")"
          arch="$(uname -m)"
          case "$arch" in
            arm64) alias_name="agent-orchestrator-darwin-arm64.zip" ;;
            x86_64) alias_name="agent-orchestrator-darwin-x64.zip" ;;
            *) echo "unsupported macOS arch: $arch" >&2; exit 1 ;;
          esac
          src="$(ls out/make/zip/darwin/*/*.zip | head -n1)"
          if [ -z "$src" ]; then echo "no macOS zip found under out/make/zip/darwin" >&2; exit 1; fi
          cp "$src" "$alias_name"
          gh release upload "$tag" "$alias_name" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # After every platform has built and uploaded its installers, generate the
  # electron-updater feed (latest*.yml + .blockmap sidecars) from the versioned
  # assets and upload them to the same release. Runs once, on Linux: it only
  # hashes already-built artifacts, so it needs no per-OS runner.
  # Advisory pod e2e gate. Installs the just-published Linux release build in an
  # ephemeral Daytona pod and runs the real-app smoke suite, posting an
  # `ao-stable-gate` commit status. NON-BLOCKING: publish-feed does NOT depend on
  # it, and the run step is continue-on-error, so it can prove itself on live
  # releases without ever blocking a good build. Once trusted, add `e2e-gate` to
  # publish-feed `needs` to make it a required gate. Override: skip_e2e_gate input.
  e2e-gate:
    needs: [release, release-intel]
    runs-on: ubuntu-latest
    # The Environment name is load-bearing: it is stamped into the GitHub OIDC
    # token's subject (repo:<owner>/<repo>:environment:e2e-gate), which is exactly
    # what the Azure federated credential trusts. Rename here => update the FIC.
    environment: e2e-gate
    permissions:
      contents: read # actions/checkout
      checks: write # publish the ao-stable-gate check-run (supports a neutral conclusion)
      id-token: write # mint the OIDC token azure/login exchanges for an Azure token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # The Daytona API key lives ONLY in Azure Key Vault — never a GitHub secret.
      # Authenticate via OIDC (no stored credential), then pull the key into the job
      # env. Both steps are continue-on-error and guarded on the AZURE_* variables:
      # if Azure isn't configured or is unreachable, DAYTONA_API_KEY stays unset,
      # the gate classifies itself `infra`, and the check below is NEUTRAL (never red).
      - name: Install pod-runner deps
        if: ${{ inputs.skip_e2e_gate != true }}
        # Runs BEFORE the Key Vault fetch so npm lifecycle/install scripts never
        # execute with DAYTONA_API_KEY in the environment. continue-on-error: a
        # failed install is infra, not a release failure — the runner then can't
        # import @daytona/sdk, classifies `infra`, and the check publishes NEUTRAL.
        continue-on-error: true
        run: npm --prefix scripts ci
      - name: Azure login (OIDC, no stored secret)
        if: ${{ inputs.skip_e2e_gate != true && vars.AZURE_CLIENT_ID != '' }}
        continue-on-error: true
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          # No subscription-id on purpose: the CI app has data-plane vault access
          # only (access policy), no subscription RBAC role. Reading a secret is a
          # data-plane call needing no subscription; passing one would make az try
          # to select a subscription it can't see. Least privilege = vault-only.
          allow-no-subscriptions: true
      - name: Run pod e2e gate (advisory)
        id: gate
        if: ${{ inputs.skip_e2e_gate != true }}
        continue-on-error: true
        run: |
          # Fetch the Daytona key and scope it to THIS step ONLY: it is a local
          # shell variable exported to the node process, never written to
          # $GITHUB_ENV — so no later step (artifact upload, check publish, the
          # blocking enforce step, or anything added below) can ever see it.
          # `az` is already authenticated by the Azure login step above. When Azure
          # isn't configured the key stays empty and the runner classifies the run
          # as infra -> NEUTRAL (never red).
          if [ -n "${{ vars.AZURE_CLIENT_ID }}" ]; then
            DAYTONA_API_KEY=$(az keyvault secret show --vault-name "${{ vars.AZURE_KEYVAULT_NAME }}" --name daytona-api-key --query value -o tsv 2>/dev/null || true)
            if [ -n "$DAYTONA_API_KEY" ]; then
              echo "::add-mask::$DAYTONA_API_KEY"
              export DAYTONA_API_KEY
            fi
          fi
          tag="v$(node -p "require('./frontend/package.json').version")"
          node scripts/ao-e2e-pod-gate.mjs --repo "$GITHUB_REPOSITORY" --sha "$GITHUB_SHA" --tag "$tag" --suite T0
      - name: Azure logout (revoke az auth for the rest of the job)
        # azure/login leaves `az` authenticated for the WHOLE job, so any later
        # step (upload, check publish, enforce) could re-run `az keyvault secret
        # show` and re-fetch DAYTONA_API_KEY even though the env var is
        # step-local. Clearing the auth here — always(), so it runs even if the
        # gate step failed — makes the secret genuinely unreachable afterwards.
        if: ${{ always() && inputs.skip_e2e_gate != true }}
        continue-on-error: true
        run: |
          az logout || true
          az account clear || true
      - name: Upload e2e artifacts
        # The runner saves the pod log + Playwright results tarball to e2e-artifacts/
        # before tearing the sandbox down. Attaching them to the run is what the
        # check's "Artifacts:" link points at.
        if: ${{ always() && inputs.skip_e2e_gate != true }}
        uses: actions/upload-artifact@v4
        with:
          name: ao-stable-gate-artifacts
          path: e2e-artifacts/
          # The runner always writes e2e-artifacts/pod.log (on green, red, infra,
          # and exception paths), so a missing artifact is genuinely anomalous —
          # surface it as a warning rather than swallowing it silently.
          if-no-files-found: warn
      - name: Publish ao-stable-gate check
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # RED (failure) is reserved for a real app smoke failure. Everything
          # else — missing DAYTONA_API_KEY, Daytona unavailable, setup/install
          # error, a broken gate — is INFRA and publishes a NEUTRAL check, so an
          # infra hiccup never makes an otherwise-good release look failed. A
          # deliberate skip publishes `skipped`.
          if [ "${{ inputs.skip_e2e_gate }}" = "true" ]; then
            conclusion=skipped; summary="e2e gate skipped via skip_e2e_gate."
          else
            # Single source of truth for the conclusion: the runner's own output
            # (deriveGateOutcome). We do NOT re-derive it from classification here —
            # the two mappings would drift. classification is used only for the
            # human summary text.
            conclusion="${{ steps.gate.outputs.conclusion }}"
            case "${{ steps.gate.outputs.classification }}" in
              passed)     summary="T0 pod smoke passed." ;;
              app_failed) summary="T0 pod smoke FAILED — the app under test failed the suite." ;;
              *)          summary="Gate could not run (infra/setup: missing DAYTONA_API_KEY, Daytona unavailable, or setup error) — NOT a release-build failure." ;;
            esac
            # If the gate never emitted a conclusion (e.g. an earlier step failed and
            # it never ran), fall back to neutral rather than an empty conclusion.
            [ -z "$conclusion" ] && conclusion=neutral
            # Link the check to the run, where the uploaded e2e artifacts live.
            summary="$summary  Artifacts: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          fi
          gh api "repos/$GITHUB_REPOSITORY/check-runs" \
            -f name="ao-stable-gate" -f head_sha="$GITHUB_SHA" \
            -f status="completed" -f conclusion="$conclusion" \
            -f "output[title]=AO stable e2e gate" -f "output[summary]=$summary"
      - name: Enforce gate (blocking mode, opt-in)
        # Advisory by default. When repo variable AO_GATE_BLOCKING=true, a real app
        # failure fails this job so that adding `e2e-gate` to `publish-feed.needs`
        # actually blocks the release. infra/neutral and skips never block — only
        # `app_failed` (a real smoke failure of the release build) does.
        if: ${{ always() && vars.AO_GATE_BLOCKING == 'true' && steps.gate.outputs.classification == 'app_failed' }}
        run: |
          echo "::error::ao-stable-gate: app smoke failed and AO_GATE_BLOCKING=true — failing the release."
          exit 1

  publish-feed:
    needs: [release, release-intel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # feed.mjs imports app-builder-lib's blockmap generator, so deps are needed.
      - run: npm ci
      - name: Generate and upload the latest feed
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Forge publishes to v<package.json version> (not the git tag).
          tag="v$(node -p "require('./package.json').version")"
          mkdir -p dist
          gh release download "$tag" --dir dist --clobber
          node scripts/feed.mjs dist "${tag#v}" latest
          shopt -s nullglob
          assets=(dist/latest*.yml dist/*.blockmap)
          if [ ${#assets[@]} -eq 0 ]; then echo "no feed assets generated" >&2; exit 1; fi
          gh release upload "$tag" "${assets[@]}" --clobber
