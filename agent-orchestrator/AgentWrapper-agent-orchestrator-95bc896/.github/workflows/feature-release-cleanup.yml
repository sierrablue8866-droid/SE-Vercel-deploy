# .github/workflows/feature-release-cleanup.yml
#
# Retires "feature build" prereleases created by feature-release.yml.
# Feature builds are tagged v<base>-pr<N>.<ts> and carry a release body
# marker of the form:
#   <!-- ao-feature-build: pr=<N> base=<base> sha=<sha> slug=<slug> -->
#
# Two retirement paths:
#
#   1. Immediate (pull_request: closed): when a PR is closed or merged,
#      any feature build(s) for that PR are deleted right away. Identified
#      by tag pattern v*-pr<PR_NUMBER>.* using the GitHub Releases API.
#
#   2. Expiry sweep (schedule, daily): any surviving feature build whose
#      published_at is older than 7 days is deleted. The sweep identifies
#      candidates by tag pattern v*-pr<digits>.* and skips all
#      nightly (*-nightly.*) and stable releases.
#
# Both jobs only ever delete pr<N> feature prereleases. They never touch
# latest/stable releases or nightly prereleases.

name: Feature release cleanup

on:
  pull_request:
    types: [closed]
  schedule:
    - cron: "0 12 * * *" # 12:00 UTC = 17:30 IST daily

permissions:
  contents: write

jobs:
  # ── Immediate cleanup on PR close ─────────────────────────────────────────
  cleanup-on-pr-close:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      # For fork PRs, pull_request: closed gets a read-only GITHUB_TOKEN, so
      # the delete below can fail silently for those builds; the daily
      # `cleanup-expired` schedule sweep is the real backstop for fork builds.
      - name: Delete feature build(s) for closed PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          echo "Looking for feature builds matching tag pattern v*-pr${PR_NUMBER}.*"

          # Fetch all releases and filter by tag pattern v*-pr<N>.<anything>.
          # --paginate ensures we catch repos with many releases.
          matching_tags="$(
            gh api "repos/${{ github.repository }}/releases" --paginate \
              --jq ".[] | select(.tag_name | test(\"^v.*-pr${PR_NUMBER}[.]\")) | .tag_name"
          )"

          if [ -z "$matching_tags" ]; then
            echo "No feature builds found for PR #${PR_NUMBER}. Nothing to delete."
            exit 0
          fi

          echo "Found feature build tag(s) to delete:"
          echo "$matching_tags"

          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Deleting release and tag: $tag"
            gh release delete "$tag" --cleanup-tag --yes
            echo "Deleted: $tag"
          done <<< "$matching_tags"

  # ── Daily expiry sweep (7-day cutoff) ─────────────────────────────────────
  cleanup-expired:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Delete feature builds older than 7 days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # Compute the cutoff timestamp (7 days ago, seconds since epoch).
          cutoff="$(date -u -d '7 days ago' '+%s' 2>/dev/null || date -u -v-7d '+%s')"
          echo "Cutoff: $(date -u -d "@${cutoff}" '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -r "${cutoff}" '+%Y-%m-%dT%H:%M:%SZ') (${cutoff})"

          echo "Fetching all releases..."
          # Pull all releases; filter candidates in jq before shell loop to
          # minimise API round-trips.
          # A candidate must:
          #   - have a tag matching v*-pr<digits>.<anything>  (feature build)
          #   - NOT match *-nightly.*  (skip nightly builds)
          #   - carry the ao-feature-build marker in the body (belt-and-suspenders)
          #   OR match the tag pattern alone (body may be absent in edge cases)
          # We use the tag pattern as the primary guard; the marker check is
          # secondary and advisory (logged but not blocking).
          releases_json="$(
            gh api "repos/${{ github.repository }}/releases" --paginate \
              --jq '[
                .[] |
                select(
                  (.tag_name | test("^v.*-pr[0-9]+\\.")) and
                  (.tag_name | test("-nightly\\.") | not) and
                  .prerelease == true
                ) |
                {tag: .tag_name, published_at: .published_at, body: (.body // "")}
              ]'
          )"

          if [ -z "$releases_json" ] || [ "$releases_json" = "[]" ]; then
            echo "No feature build prereleases found. Nothing to do."
            exit 0
          fi

          deleted=0
          skipped=0

          # Process each candidate.
          while IFS=$'\t' read -r tag published_at has_marker; do
            [ -z "$tag" ] && continue

            # Convert published_at (ISO 8601) to epoch seconds.
            pub_epoch="$(date -u -d "$published_at" '+%s' 2>/dev/null || date -u -j -f '%Y-%m-%dT%H:%M:%SZ' "$published_at" '+%s')"

            if [ "$pub_epoch" -gt "$cutoff" ]; then
              echo "SKIP (recent): $tag  published=$published_at"
              skipped=$((skipped + 1))
              continue
            fi

            marker_note=""
            if [ "$has_marker" = "true" ]; then
              marker_note=" [marker present]"
            else
              marker_note=" [no marker; deleting on tag pattern alone]"
            fi

            echo "DELETE (expired): $tag  published=$published_at${marker_note}"
            gh release delete "$tag" --cleanup-tag --yes
            echo "Deleted: $tag"
            deleted=$((deleted + 1))
          done < <(
            echo "$releases_json" | \
            python3 -c "import sys,json; rows=json.load(sys.stdin); [print(r['tag']+'\t'+r['published_at']+'\t'+str('<!-- ao-feature-build:' in r['body']).lower()) for r in rows]"
          )

          echo ""
          echo "Sweep complete. Deleted: ${deleted}  Skipped (recent): ${skipped}"
