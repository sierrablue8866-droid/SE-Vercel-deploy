version: '3.8'

# Sierra Estates — n8n Workflow Automation Engine
# docker-compose -f docker-compose.n8n.yml up -d
# Dashboard: http://localhost:5678

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: sierra-estates-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=Africa/Cairo
      - TZ=Africa/Cairo
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
    name: sierra_estates_n8n_data
