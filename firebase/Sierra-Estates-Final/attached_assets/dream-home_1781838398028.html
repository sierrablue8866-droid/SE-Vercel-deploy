<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream Home Advisor — Sierra Estates</title>
  <link rel="stylesheet" href="../assets/sierra.css?v=5" />
  <style>
    .wiz { max-width: 640px; margin: 36px auto 0; }
    .wiz-card { background: var(--surface); border: 1px solid var(--line); border-radius: 20px; padding: 34px; box-shadow: var(--shadow-md); }
    .wiz-prog { display: flex; gap: 7px; margin-bottom: 26px; }
    .wiz-prog span { flex: 1; height: 5px; border-radius: 3px; background: var(--ivory-alt); transition: background 360ms var(--ease); }
    .wiz-prog span.on { background: linear-gradient(90deg, var(--gold-lt), var(--gold)); }
    .wiz-q { font-family: var(--font-display); font-size: 30px; font-weight: 600; color: var(--navy); margin: 0 0 6px; }
    .wiz-hint { font-size: 13px; color: var(--navy-soft); margin: 0 0 26px; }
    .opts { display: flex; flex-direction: column; gap: 11px; }
    .opt { display: flex; align-items: center; gap: 14px; padding: 16px 18px; border: 1px solid var(--line); border-radius: 13px; cursor: pointer; transition: all 240ms var(--ease); }
    .opt:hover { border-color: var(--gold); background: rgba(200,150,26,0.05); transform: translateX(3px); }
    .opt-ic { font-size: 22px; width: 44px; height: 44px; display: grid; place-items: center; border-radius: 11px; background: var(--ivory-alt); flex-shrink: 0; }
    .opt-t { font-size: 15px; font-weight: 600; color: var(--navy); }
    .opt-d { font-size: 12px; color: var(--muted); }
    .wiz-back { margin-top: 22px; background: none; border: none; color: var(--muted); font-family: var(--font-ui); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; }
    .wiz-back:hover { color: var(--navy); }
    /* result */
    .result { text-align: center; animation: sbScaleIn 0.4s var(--ease) both; }
    .result .crown { font-size: 40px; margin-bottom: 10px; }
    .result .kick { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-deep); }
    .result .name { font-family: var(--font-display); font-size: 44px; font-weight: 600; color: var(--navy); margin: 8px 0 4px; }
    .result .zone { font-size: 13px; color: var(--navy-soft); margin-bottom: 22px; }
    .result-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 26px; }
    .rs { background: var(--ivory); border-radius: 13px; padding: 16px 10px; }
    .rs .v { font-size: 22px; font-weight: 700; color: var(--gold-deep); }
    .rs .l { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }
    .result-why { font-size: 13px; color: var(--navy-soft); line-height: 1.6; background: var(--ivory); border-radius: 13px; padding: 16px 18px; margin-bottom: 24px; text-align: left; }
  </style>
</head>
<body>
  <div class="sb-topbar">
    <a class="sb-brand" href="../Sierra Estates Landing.html"><span class="sb-brand-mark">S</span><span><span class="sb-brand-name">SIERRA ESTATES</span><span class="sb-brand-sub" style="display:block;">NEW CAIRO · REALTY</span></span></a>
    <a class="sb-back" href="../Sierra Estates Landing.html">← Back to home</a>
  </div>

  <main class="ai-page">
    <div class="sb-section">
      <div class="ai-hero reveal">
        <span class="sb-eyebrow">AI Support · Decision Engine</span>
        <h1>Dream Home Advisor</h1>
        <p>Answer four quick questions. Sierra's AI recommends the compound and unit that fit you best.</p>
      </div>

      <div class="wiz reveal">
        <div class="wiz-card" id="card"></div>
      </div>
    </div>
  </main>

  <script src="../assets/sierra.js?v=5"></script>
  <script>
    const QUESTIONS = [
      { q: 'What matters most?', hint: 'Your top priority shapes the match.', key: 'priority', opts: [
        { ic: '📈', t: 'Investment return', d: 'Maximise rental yield & appreciation', tag: 'roi' },
        { ic: '🏡', t: 'Family living', d: 'Space, greenery, schools nearby', tag: 'family' },
        { ic: '✨', t: 'Prestige & lifestyle', d: 'Premium address, amenities', tag: 'lux' },
      ]},
      { q: 'Your budget band?', hint: 'In EGP, for purchase.', key: 'budget', opts: [
        { ic: '◔', t: 'Up to 5M', d: 'Entry & smart buys', tag: 'low' },
        { ic: '◑', t: '5M – 12M', d: 'Mid-market sweet spot', tag: 'mid' },
        { ic: '●', t: '12M+', d: 'Premium & villas', tag: 'high' },
      ]},
      { q: 'Unit type?', hint: 'How do you want to live?', key: 'type', opts: [
        { ic: '🏙️', t: 'Apartment', d: 'Low-maintenance, central', tag: 'apt' },
        { ic: '🏘️', t: 'Twin / Townhouse', d: 'Space with community', tag: 'twin' },
        { ic: '🏰', t: 'Standalone Villa', d: 'Privacy & garden', tag: 'villa' },
      ]},
      { q: 'Move-in horizon?', hint: 'When do you need it?', key: 'time', opts: [
        { ic: '⚡', t: 'Ready now', d: 'Finished & available', tag: 'now' },
        { ic: '🗓️', t: 'Within a year', d: 'Near-delivery', tag: 'soon' },
        { ic: '🌱', t: 'Off-plan ok', d: 'Best entry prices', tag: 'plan' },
      ]},
    ];
    // recommendation logic → pick a compound
    const RECO = {
      roi: { name: 'Eastown', zone: 'New Cairo', yield: '8.3%', why: 'Highest net rental yield in New Cairo with strong tenant demand from the nearby business district — ideal for an income-first buyer.' },
      family: { name: 'Mivida', zone: 'New Cairo', yield: '6.4%', why: 'Lakes, walkable greenery and top international schools make Mivida the standout family compound — calm, secure and well-served.' },
      lux: { name: 'Hyde Park', zone: 'New Cairo', yield: '7.1%', why: 'A landmark address with the Central Park, premium retail and concierge-grade amenities — prestige with solid appreciation.' },
    };
    let step = 0; const answers = {};
    const card = document.getElementById('card');

    function progress() { return Array.from({ length: QUESTIONS.length }, (_, i) => `<span class="${i <= step ? 'on' : ''}"></span>`).join(''); }
    function renderQ() {
      const Q = QUESTIONS[step];
      card.innerHTML = `
        <div class="wiz-prog">${progress()}</div>
        <h2 class="wiz-q">${Q.q}</h2>
        <p class="wiz-hint">${Q.hint}</p>
        <div class="opts">
          ${Q.opts.map((o, i) => `<div class="opt" data-i="${i}"><div class="opt-ic">${o.ic}</div><div><div class="opt-t">${o.t}</div><div class="opt-d">${o.d}</div></div></div>`).join('')}
        </div>
        ${step > 0 ? '<button class="wiz-back" id="back">← Back</button>' : ''}`;
      card.querySelectorAll('.opt').forEach(el => el.onclick = () => {
        answers[Q.key] = Q.opts[+el.dataset.i].tag;
        if (step < QUESTIONS.length - 1) { step++; renderQ(); } else renderResult();
      });
      const b = document.getElementById('back'); if (b) b.onclick = () => { step--; renderQ(); };
    }
    function renderResult() {
      const r = RECO[answers.priority] || RECO.family;
      card.innerHTML = `
        <div class="result">
          <div class="crown">👑</div>
          <div class="kick">Your best-fit compound</div>
          <div class="name">${r.name}</div>
          <div class="zone">${r.zone} · matched ${94 + Math.floor(Math.random()*5)}%</div>
          <div class="result-stats">
            <div class="rs"><div class="v">${r.yield}</div><div class="l">Net Yield</div></div>
            <div class="rs"><div class="v">${answers.budget === 'high' ? '12M+' : answers.budget === 'mid' ? '5–12M' : '<5M'}</div><div class="l">Budget Fit</div></div>
            <div class="rs"><div class="v">${answers.type === 'villa' ? 'Villa' : answers.type === 'twin' ? 'Twin' : 'Apt'}</div><div class="l">Unit Type</div></div>
          </div>
          <div class="result-why"><b style="color:var(--gold-deep)">Why Sierra picked this:</b> ${r.why}</div>
          <a class="btn-gold" style="width:100%;" href="matches.html">See matching units in ${r.name} →</a>
          <button class="wiz-back" id="restart">↺ Start over</button>
        </div>`;
      document.getElementById('restart').onclick = () => { step = 0; renderQ(); };
    }
    renderQ();

    window.mountSierraAIHub('../');
    window.sbInitReveal();
  </script>
</body>
</html>
