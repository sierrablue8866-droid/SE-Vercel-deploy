<style>
/* ══ SIERRA BLU 2.6 — DESIGN TOKENS ══════════════════════════════════════ */
:root{
  --navy:#002D62;--navy2:#0A1928;--navy3:#173456;
  --gold:#D3A747;--gold-lt:#E8CC88;--gold-dk:#B8903C;
  --ivory:#F7F4EE;--white:#F8F8F8;--grey:#3C3C3C;
  --text:#1C2430;--text-m:#5A6475;--text-f:#8A94A0;
  --border:rgba(211,167,71,.2);--border-n:rgba(255,255,255,.12);
}
*{-webkit-font-smoothing:antialiased;box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--ivory);color:var(--text);font-family:'Inter',sans-serif;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:rgba(211,167,71,.3);border-radius:3px;}

/* ══ ANIMATIONS ═══════════════════════════════════════════════════════════ */
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
@keyframes sRipple{0%{transform:scale(1);opacity:.65}100%{transform:scale(3.8);opacity:0}}
@keyframes dotPulse{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes aiGlow{0%,100%{box-shadow:0 0 0 0 rgba(211,167,71,.5)}50%{box-shadow:0 0 0 10px rgba(211,167,71,0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes markerPop{from{transform:scale(0) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}

.gold-text{background:linear-gradient(90deg,var(--gold-lt),var(--gold) 40%,var(--gold-lt));background-size:200%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 5s linear infinite;}
.ease{transition:all .36s cubic-bezier(.16,1,.3,1);}
.fu{animation:fadeUp .65s cubic-bezier(.16,1,.3,1) both;}

/* ══ ANN BAR ══════════════════════════════════════════════════════════════ */
.ann-bar{position:fixed;left:0;right:0;z-index:65;height:38px;background:linear-gradient(110deg,var(--navy2),var(--navy3),var(--navy2));border-bottom:1px solid rgba(211,167,71,.2);display:flex;align-items:center;justify-content:center;gap:10px;transition:top .4s cubic-bezier(.16,1,.3,1);}

/* ══ NAV ══════════════════════════════════════════════════════════════════ */
.main-nav{position:fixed;left:0;right:0;z-index:60;height:58px;background:var(--navy);border-bottom:1px solid rgba(211,167,71,.18);display:flex;align-items:center;padding:0 28px;transition:top .4s cubic-bezier(.16,1,.3,1);}

/* ══ GLASS FILTER ═════════════════════════════════════════════════════════ */
.glass-bar{position:sticky;z-index:50;background:rgba(0,45,98,.93);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-bottom:1px solid rgba(211,167,71,.16);padding:8px 28px;}

/* ══ HERO ═════════════════════════════════════════════════════════════════ */
.hero-bg{
  background:linear-gradient(105deg,rgba(0,13,32,.9) 38%,rgba(0,26,54,.55) 62%,rgba(0,0,0,.18)),
  url('https://images.unsplash.com/photo-1613977257363-707ba9348227?w=1920&q=85') center/cover no-repeat;
}

/* ══ PROP CARDS ═══════════════════════════════════════════════════════════ */
.prop-card{background:var(--white);border:1px solid rgba(211,167,71,.12);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .36s cubic-bezier(.16,1,.3,1),box-shadow .36s ease,border-color .2s;}
.prop-card:hover{transform:translateY(-6px) scale(1.013);box-shadow:0 20px 44px rgba(211,167,71,.12);border-color:rgba(211,167,71,.4);}
.p-img{position:relative;height:185px;overflow:hidden;}
.p-img img{width:100%;height:100%;object-fit:cover;transition:transform .7s cubic-bezier(.16,1,.3,1);}
.prop-card:hover .p-img img{transform:scale(1.07);}
.ai-bdg{position:absolute;top:10px;right:10px;background:rgba(0,45,98,.88);border:1px solid rgba(211,167,71,.5);border-radius:20px;padding:3px 10px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--gold);animation:aiGlow 2.5s ease-in-out infinite;}
.verified{display:inline-flex;align-items:center;gap:4px;background:rgba(22,163,74,.1);border:1px solid rgba(22,163,74,.3);color:#15803d;padding:2px 8px;border-radius:20px;font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;}
.card-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,45,98,.72),transparent);opacity:0;transition:opacity .36s ease;display:flex;align-items:flex-end;padding:12px;}
.prop-card:hover .card-ov{opacity:1;}

/* ══ MAP S-PIN ════════════════════════════════════════════════════════════ */
.s-pin{display:flex;flex-direction:column;align-items:center;cursor:pointer;animation:markerPop .4s cubic-bezier(.16,1,.3,1) both;}
.s-pin-wrap{position:relative;width:32px;height:32px;}
.s-body{width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:var(--navy);border:2.5px solid var(--gold);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,45,98,.5);position:relative;z-index:2;}
.s-txt{transform:rotate(45deg);color:var(--gold);font-size:12px;font-weight:700;font-family:'Georgia',serif;line-height:1;}
.s-ring{position:absolute;inset:-6px;border-radius:50% 50% 50% 0;border:1.5px solid rgba(211,167,71,.55);animation:sRipple 2.6s ease-out infinite;z-index:1;}
.s-ring2{animation-delay:1.3s;}
.s-dot{width:5px;height:5px;background:var(--gold);border-radius:50%;margin-top:2px;}

/* ══ LEAFLET OVERRIDES ════════════════════════════════════════════════════ */
.leaflet-container{background:#c0d4e8!important;}
.leaflet-control-attribution{display:none!important;}
.leaflet-tile-pane{filter:hue-rotate(198deg) saturate(.62) brightness(.86);}
.leaflet-control-zoom{border:none!important;}
.leaflet-control-zoom a{background:var(--navy)!important;color:var(--gold)!important;border:1px solid rgba(211,167,71,.3)!important;font-weight:700!important;}
.leaflet-control-zoom a:hover{background:var(--navy3)!important;}

/* ══ SLIDE DRAWER ═════════════════════════════════════════════════════════ */
.slide-drawer{position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--white);border-radius:22px 22px 0 0;box-shadow:0 -20px 80px rgba(0,45,98,.24);animation:slideUp .42s cubic-bezier(.16,1,.3,1) both;max-height:72vh;overflow-y:auto;}

/* ══ SPEC GRID ════════════════════════════════════════════════════════════ */
.spec-grid{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid rgba(0,45,98,.09);border-radius:8px;overflow:hidden;margin:9px 0;}
.spec-item{padding:7px 6px;text-align:center;border-right:1px solid rgba(0,45,98,.07);}
.spec-item:last-child{border-right:none;}
.sv{font-size:11px;font-weight:700;color:var(--text);line-height:1;}
.sl{font-size:7.5px;color:var(--text-f);margin-top:2px;text-transform:uppercase;letter-spacing:.06em;}

/* ══ MODAL ════════════════════════════════════════════════════════════════ */
.modal-ov{position:fixed;inset:0;z-index:500;background:rgba(0,45,98,.55);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;}
.modal-card{background:white;border-radius:22px 22px 0 0;width:100%;max-width:540px;max-height:86vh;overflow-y:auto;animation:slideUp .45s cubic-bezier(.16,1,.3,1) both;box-shadow:0 -20px 80px rgba(0,45,98,.26);}
.field-w{border:1px solid rgba(0,45,98,.12);border-radius:10px;padding:11px 14px;transition:border-color .22s;}
.field-w:focus-within{border-color:var(--gold);}
.f-lbl{font-size:8.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text-m);margin-bottom:4px;}
.f-in{width:100%;background:none;border:none;outline:none;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;}

@media(max-width:768px){.hide-sm{display:none!important;}.map-split{flex-direction:column!important;}.map-left{flex-basis:auto!important;height:320px!important;}.map-right{flex:1!important;}}
select option{background:var(--navy);color:#fff;}
</style>
</head>

/* ── MAP SECTION ─────────────────────────────────────────────────────────── */
function MapSection() {
  const mapRef = useRef(null);
  const instRef = useRef(null);
  const setterRef = useRef(null);
  const [drawer, setDrawer] = useState(null);
  const [clock, setClock] = useState('');
  setterRef.current = setDrawer;

  useEffect(()=>{
    const tick=()=>{ const d=new Date(),h=String(d.getHours()).padStart(2,'0'),m=String(d.getMinutes()).padStart(2,'0'); setClock(`${h}:${m}`); };
    tick(); const id=setInterval(tick,30000); return ()=>clearInterval(id);
  },[]);

  useEffect(()=>{
    if(!mapRef.current||instRef.current) return;
    const map=L.map(mapRef.current,{center:[30.04,31.48],zoom:11,zoomControl:false});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
    L.control.zoom({position:'bottomright'}).addTo(map);

    MAP_CPDS.forEach((c,idx)=>{
      // Compound name label (slightly offset north)
      const lblIcon=L.divIcon({className:'',html:`<div style="color:rgba(0,45,98,.78);font-family:'Inter',sans-serif;font-size:10px;font-weight:600;white-space:nowrap;text-shadow:0 0 3px white,0 0 6px white;pointer-events:none;letter-spacing:.02em;">${c.name}</div>`,iconSize:[140,14],iconAnchor:[70,7]});
      L.marker([c.coords[0]+0.009,c.coords[1]],{icon:lblIcon,interactive:false}).addTo(map);

      // S-pin marker
      const pinIcon=L.divIcon({className:'',html:`<div class="s-pin" style="animation-delay:${idx*0.06}s"><div class="s-pin-wrap"><div class="s-ring"></div><div class="s-ring s-ring2"></div><div class="s-body"><span class="s-txt">S</span></div></div><div class="s-dot"></div></div>`,iconSize:[32,40],iconAnchor:[16,38]});
      const mk=L.marker(c.coords,{icon:pinIcon}).addTo(map);
      mk.on('click',()=>{
        map.flyTo(c.coords,15,{animate:true,duration:1.3,easeLinearity:.3});
        setTimeout(()=>{ if(setterRef.current) setterRef.current(c); },500);
      });
    });

    instRef.current=map;
    return ()=>{ map.remove(); instRef.current=null; };
  },[]);

  const drawerListings = drawer ? LISTINGS.filter(l=>l.cmp===drawer.name) : [];

  return (
    <section style={{background:'var(--ivory)'}}>
      {/* Section header */}
      <div style={{padding:'60px 28px 22px',maxWidth:1280,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
          <span style={{width:20,height:1.5,background:'var(--gold)',display:'block'}}/>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:'.22em',color:'var(--gold)',textTransform:'uppercase'}}>LIVE COMPOUND INTELLIGENCE MAP</span>
        </div>
        <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(30px,3.5vw,50px)',fontWeight:400,color:'var(--navy)',margin:'0 0 3px',lineHeight:1.06}}>
          NEW CAIRO REAL ESTATE
        </h2>
        <p style={{fontSize:13,color:'var(--text-m)',margin:0}}>Rent &amp; Resale Solutions · Click any S-pin to explore units</p>
      </div>

      {/* Map + Insights split */}
      <div className="map-split" style={{display:'flex',height:580,borderTop:'1px solid rgba(0,45,98,.07)'}}>
        {/* MAP (65%) */}
        <div className="map-left" style={{flex:'0 0 65%',position:'relative',overflow:'hidden'}}>
          {/* Search overlay */}
          <div style={{position:'absolute',top:14,left:14,zIndex:400,width:'min(380px, calc(100% - 28px))'}}>
            <div style={{position:'relative'}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(0,45,98,.5)" strokeWidth="2.5" style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              <input placeholder="Explore Verified Units…" style={{width:'100%',paddingLeft:34,paddingRight:14,paddingTop:11,paddingBottom:11,background:'rgba(255,255,255,.95)',border:'1px solid rgba(0,45,98,.14)',borderRadius:10,fontSize:13,color:'var(--text)',outline:'none',fontFamily:'inherit',boxShadow:'0 4px 20px rgba(0,45,98,.12)'}}/>
            </div>
          </div>
          {/* Legend overlay */}
          <div style={{position:'absolute',top:14,right:14,zIndex:400,display:'flex',gap:6}}>

          </div>
          <div style={{flex:1,overflowY:'auto'}}>
            {LISTINGS.slice(0,7).map(l=><InsightCard key={l.id} listing={l}/>)}
          </div>
        </div>
      </div>

      {/* Compound drawer */}
      {drawer && (
        <div className="slide-drawer">
          <div style={{textAlign:'center',padding:'10px 0 0'}}><div style={{width:40,height:3,borderRadius:2,background:'rgba(0,45,98,.12)',margin:'0 auto'}}/></div>
          <div style={{padding:'16px 24px 28px'}}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14}}>
              <div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:'.16em',color:'var(--gold)',textTransform:'uppercase',marginBottom:4}}>{drawer.zone}</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,color:'var(--navy)',lineHeight:1.1}}>{drawer.name}</div>
              </div>
              <button onClick={()=>setDrawer(null)} style={{background:'none',border:'none',cursor:'pointer',color:'rgba(0,45,98,.4)',fontSize:24}}>×</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:18}}>
              {[['Avg Price',drawer.price],['Units',drawer.units.toLocaleString()],['Growth',drawer.growth],['AI Score',`${drawer.ai}/10`]].map(([l,v],i)=>(
                <div key={i} style={{padding:'11px',borderRadius:10,background:'rgba(0,45,98,.04)',border:'1px solid rgba(0,45,98,.08)',textAlign:'center'}}>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:'var(--gold)',marginBottom:3}}>{v}</div>
                  <div style={{fontSize:8.5,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-f)'}}>{l}</div>
                </div>
              ))}
            </div>
            <div style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",letterSpacing:'.14em',color:'var(--gold)',textTransform:'uppercase',marginBottom:10}}>Available Units</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:10}}>
              {drawerListings.length>0?drawerListings.slice(0,4).map(l=>(
                <div key={l.id} style={{padding:'10px',borderRadius:10,background:'white',border:'1px solid rgba(0,45,98,.1)',display:'flex',gap:10,alignItems:'center'}}>
                  <img src={l.img} alt="" style={{width:48,height:48,borderRadius:8,objectFit:'cover',flexShrink:0}} loading="lazy"/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text)',marginBottom:2}}>{l.type} · {l.beds} bed</div>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:'var(--gold)',fontWeight:700}}>{l.price}</div>
                    <div style={{fontSize:9,color:'var(--text-f)'}}>{l.area}m²</div>
                  </div>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,fontWeight:700,color:l.ai>=9.5?'#15803d':'var(--gold)'}}>{l.ai}</span>
                </div>
              )):<p style={{fontSize:12,color:'var(--text-m)',gridColumn:'1/-1',padding:'8px 0'}}>Loading from Firestore…</p>}
            </div>
            <button style={{width:'100%',marginTop:14,padding:'13px',borderRadius:10,background:'var(--navy)',color:'#fff',fontSize:11,fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase',border:'none',cursor:'pointer',fontFamily:'inherit'}}>
              View All {drawer.units.toLocaleString()} Units →
            </button>
          </div>
        </div>
      )}
    </section>
  );
}

/* ── REQUEST MODAL ───────────────────────────────────────────────────────── */
function ReqModal({ open, onClose }) {
  const [form, setForm] = useState({name:'',phone:'',compound:'Any',budget:'Any'});
  const [done, setDone] = useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const submit = () => { if(form.name.trim()&&form.phone.trim()) setDone(true); };
  const close = () => { setDone(false); setForm({name:'',phone:'',compound:'Any',budget:'Any'}); onClose(); };
  useEffect(()=>{ if(open) document.body.style.overflow='hidden'; else document.body.style.overflow=''; return()=>{ document.body.style.overflow=''; }; },[open]);
  if(!open) return null;
  return (
    <div className="modal-ov" onClick={e=>e.target===e.currentTarget&&close()}>
      <div className="modal-card">
        <div style={{padding:'18px 22px',borderBottom:'1px solid rgba(0,45,98,.08)',position:'sticky',top:0,background:'white',zIndex:1}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:600,color:'var(--navy)'}}>Request a Property</div>
            <button onClick={close} style={{background:'none',border:'none',cursor:'pointer',color:'rgba(0,45,98,.4)',fontSize:24}}>×</button>
          </div>
          <div style={{padding:'9px 12px',borderRadius:9,background:'linear-gradient(110deg,rgba(0,45,98,.04),rgba(211,167,71,.1))',border:'1px solid rgba(211,167,71,.25)',display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:16}}>🏷️</span>
            <span style={{fontSize:11,color:'var(--navy)'}}><strong style={{color:'var(--gold)'}}>25% OFF</strong> service fees — applied automatically. 47 spots remaining.</span>
          </div>
        </div>
        {done?(
          <div style={{padding:'44px 22px',textAlign:'center'}}>
            <div style={{width:66,height:66,borderRadius:'50%',background:'#16a34a',margin:'0 auto 16px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,color:'white'}}>✓</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,color:'var(--navy)',marginBottom:8}}>Request Received!</div>
            <p style={{fontSize:13,color:'var(--text-m)',lineHeight:1.6,marginBottom:14}}>Our team contacts you within 24 hours with matched listings.</p>
            <div style={{display:'inline-flex',alignItems:'center',gap:6,padding:'8px 16px',borderRadius:8,background:'rgba(211,167,71,.1)',border:'1px solid rgba(211,167,71,.25)',marginBottom:20}}>
              <span>🎁</span><span style={{fontSize:11,color:'var(--gold)',fontWeight:700}}>Your 25% discount has been reserved.</span>
            </div><br/>
            <button onClick={close} style={{padding:'9px 24px',borderRadius:8,border:'1px solid rgba(0,45,98,.14)',background:'none',color:'var(--text-m)',fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>Close</button>
          </div>
        ):(
          <div style={{padding:'20px 22px 28px',display:'flex',flexDirection:'column',gap:13}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              {[['Full Name *','name','text','Your full name'],['WhatsApp *','phone','tel','+20 1XX XXX XXXX']].map(([l,k,t,p])=>(
                <div key={k} className="field-w"><div className="f-lbl">{l}</div><input type={t} placeholder={p} value={form[k]} onChange={e=>set(k,e.target.value)} className="f-in"/></div>
              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              {[['Compound','compound',['Any',...TOP12]],['Budget','budget',['Any','Under 5M EGP','5–10M EGP','10–20M EGP','20M+ EGP','Under $2K/mo','$2K–$5K/mo','$5K+/mo']]].map(([l,k,opts])=>(
                <div key={k} className="field-w"><div className="f-lbl">{l}</div>
                  <select value={form[k]} onChange={e=>set(k,e.target.value)} className="f-in" style={{cursor:'pointer'}}>
                    {opts.map(o=><option key={o}>{o}</option>)}
                  </select>
                </div>
              ))}
            </div>
            <button onClick={submit} style={{padding:'14px',borderRadius:10,background:'linear-gradient(135deg,var(--gold),var(--gold-lt))',color:'var(--navy)',fontSize:12,fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase',border:'none',cursor:'pointer',fontFamily:'inherit',boxShadow:'0 6px 22px rgba(211,167,71,.3)',display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
              <span>✈</span>Submit Request — 25% OFF
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── AI CHAT FAB ─────────────────────────────────────────────────────────── */
function AIChat({ lang }) {
  const [open, setOpen] = useState(false);
  const [msgs, setMsgs] = useState([{r:'ai',t:AI_R.default}]);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const bRef = useRef(null);
  const isAr = lang==='ar';
  useEffect(()=>{ if(bRef.current) bRef.current.scrollTop=bRef.current.scrollHeight; },[msgs,typing]);
  const send = () => {
    if(!input.trim()) return;
    const txt=input.trim(); setInput('');
    setMsgs(m=>[...m,{r:'user',t:txt}]); setTyping(true);
    setTimeout(()=>{
      const q=txt.toLowerCase();
      const rep=q.includes('hyde')?AI_R.hyde:q.includes('mivida')?AI_R.mivida:q.includes('roi')||q.includes('invest')?AI_R.roi:q.includes('rent')?AI_R.rent:AI_R.default;
      setMsgs(m=>[...m,{r:'ai',t:rep}]); setTyping(false);
    },1300);
  };
  return (
    <>
      <button onClick={()=>setOpen(o=>!o)} style={{position:'fixed',bottom:28,right:28,zIndex:100,width:54,height:54,borderRadius:'50%',background:'var(--navy)',border:'2px solid var(--gold)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 8px 32px rgba(0,45,98,.38)',animation:'aiGlow 3s ease-in-out infinite',transition:'all .28s cubic-bezier(.16,1,.3,1)'}}>
        <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:'var(--gold)',fontWeight:700}}>AI</span>
        {!open&&<span style={{position:'absolute',top:-2,right:-2,width:13,height:13,borderRadius:'50%',background:'#16a34a',border:'2px solid white'}}/>}
      </button>
      {open&&(
        <div style={{position:'fixed',bottom:92,right:28,zIndex:100,width:340,background:'white',borderRadius:20,boxShadow:'0 24px 80px rgba(0,45,98,.22)',border:'1px solid rgba(0,45,98,.1)',animation:'slideUp .38s cubic-bezier(.16,1,.3,1) both',overflow:'hidden'}}>
          <div style={{padding:'14px 16px',background:'var(--navy)',display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:36,height:36,borderRadius:'50%',background:'linear-gradient(135deg,var(--gold),var(--gold-lt))',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:'var(--navy)',fontWeight:700}}>S</div>
            <div><div style={{fontSize:13,fontWeight:700,color:'white',lineHeight:1}}>Sierra AI</div><div style={{fontSize:9,color:'#4ade80',letterSpacing:'.1em',marginTop:2}}>● Online · Gemini 2.0</div></div>
            <button onClick={()=>setOpen(false)} style={{marginInlineStart:'auto',background:'none',border:'none',cursor:'pointer',color:'rgba(255,255,255,.4)',fontSize:20}}>×</button>
          </div>
          <div ref={bRef} style={{height:220,overflowY:'auto',padding:'12px 12px 6px',display:'flex',flexDirection:'column',gap:8}}>
            {msgs.map((m,i)=>(
              <div key={i} style={{maxWidth:'84%',padding:'8px 12px',borderRadius:m.r==='ai'?'4px 12px 12px 12px':'12px 4px 12px 12px',fontSize:11.5,lineHeight:1.55,background:m.r==='ai'?'rgba(0,45,98,.05)':'linear-gradient(135deg,var(--gold),var(--gold-lt))',color:'var(--text)',border:m.r==='ai'?'1px solid rgba(0,45,98,.1)':'none',alignSelf:m.r==='ai'?'flex-start':'flex-end'}}>
                {m.t}
              </div>
            ))}
            {typing&&<div style={{display:'flex',gap:4,padding:'8px 12px',borderRadius:'4px 12px 12px 12px',background:'rgba(0,45,98,.05)',border:'1px solid rgba(0,45,98,.1)',alignSelf:'flex-start',width:52}}>
              {[0,1,2].map(i=><span key={i} style={{width:6,height:6,borderRadius:'50%',background:'var(--gold)',display:'block',animation:`dotPulse 1.4s ease-in-out ${i*.16}s infinite both`}}/>)}
            </div>}
          </div>
          <div style={{padding:'0 12px 8px',display:'flex',gap:5,flexWrap:'wrap'}}>
            {['Best ROI','Hyde Park','Mivida rentals','AI analysis'].map((s,i)=>(
              <button key={i} onClick={()=>setInput(s)} style={{padding:'3px 9px',borderRadius:20,fontSize:9.5,fontWeight:600,background:'rgba(0,45,98,.05)',border:'1px solid rgba(0,45,98,.1)',color:'var(--navy)',cursor:'pointer',fontFamily:'inherit'}}>{s}</button>
            ))}
          </div>
          <div style={{padding:'6px 12px 12px',display:'flex',gap:8}}>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder={isAr?'اسأل سييرا…':'Ask Sierra anything…'} style={{flex:1,padding:'9px 12px',borderRadius:9,border:'1px solid rgba(0,45,98,.14)',background:'rgba(0,45,98,.03)',fontSize:12,color:'var(--text)',outline:'none',fontFamily:'inherit'}}/>
            <button onClick={send} style={{padding:'9px 14px',borderRadius:9,background:'var(--navy)',color:'var(--gold)',border:'none',cursor:'pointer',fontSize:14,fontWeight:700}}>→</button>
          </div>
        </div>
      )}
    </>
  );
}

/* ── APP ─────────────────────────────────────────────────────────────────── */
function App() {
  const [purpose, setPurpose] = useState('resale');
  const [search, setSearch] = useState('');
  const [activeCmp, setActiveCmp] = useState(null);
  const [lang, setLang] = useState('en');
  const [annVis, setAnnVis] = useState(true);
  const [modal, setModal] = useState(false);

  const annTop = 0;
  const navTop = annVis ? 38 : 0;
  const filterTop = navTop + 58;
  const wrapPad = filterTop;

  useEffect(()=>{ document.documentElement.dir=lang==='ar'?'rtl':'ltr'; document.documentElement.lang=lang; },[lang]);

  return (
    <div style={{minHeight:'100vh',background:'var(--ivory)'}}>
      <AnnBar top={annTop} onDismiss={()=>setAnnVis(false)} onClaim={()=>setModal(true)}/>
      <NavBar top={navTop} lang={lang} setLang={setLang} onRequest={()=>setModal(true)}/>
      <div style={{paddingTop:wrapPad}}>
        <GlassBar top={filterTop} purpose={purpose} setPurpose={setPurpose} onSearch={setSearch} activeCmp={activeCmp} setActiveCmp={setActiveCmp}/>
        <Hero purpose={purpose} lang={lang} onRequest={()=>setModal(true)}/>
        <PropGrid purpose={purpose} search={search} activeCmp={activeCmp}/>
        <MapSection/>
      </div>
      <AIChat lang={lang}/>
      <ReqModal open={modal} onClose={()=>setModal(false)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
