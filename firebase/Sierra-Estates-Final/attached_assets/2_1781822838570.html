<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sierra Estates 3.0 · New Cairo AI Real Estate</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600;700;800&family=Cairo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ── TOKENS ──────────────────────────────────────────────────────────────── */
:root{--gold:#C8961A;--gold-lt:#E9C176;--gold-dk:#A07614;--navy:#0D2035;--navy-lt:#173456;--emerald:#34D399;--red:#E63946;}
[data-theme="dark"]{
  --bg:#07111E;--bg-s:#0B1A2E;--bg-e:#0F2035;
  --surf:rgba(255,255,255,.055);--bd:rgba(255,255,255,.08);--bd-s:rgba(255,255,255,.14);
  --tx:#F0EDE5;--tx-m:rgba(240,237,229,.62);--tx-f:rgba(240,237,229,.32);
  --hdr-bg:rgba(10,18,30,.9);--hdr-bd:rgba(200,150,26,.14);
  --card-bg:#0F2035;--card-bd:rgba(255,255,255,.07);--card-sh:rgba(0,0,0,.25);
}
[data-theme="light"]{
  --bg:#FAF8F4;--bg-s:#F2EDD8;--bg-e:#FFFFFF;
  --surf:rgba(200,150,26,.05);--bd:rgba(200,150,26,.15);--bd-s:rgba(200,150,26,.30);
  --tx:#0A1A2B;--tx-m:rgba(10,26,43,.58);--tx-f:rgba(10,26,43,.32);
  --hdr-bg:rgba(250,249,245,.98);--hdr-bd:rgba(200,150,26,.22);
  --card-bg:#FFFFFF;--card-bd:transparent;--card-sh:rgba(10,26,43,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);transition:background .3s,color .3s;}
[dir="rtl"] body{font-family:'Cairo','Inter',sans-serif;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(200,150,26,.28);border-radius:2px;}
a{text-decoration:none;color:inherit;}

/* ── HEADER ──────────────────────────────────────────────────────────────── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:500;height:56px;display:flex;align-items:center;padding:0 22px;gap:12px;background:var(--hdr-bg);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-bottom:1px solid var(--hdr-bd);}
.hdr-brand{display:flex;align-items:center;gap:9px;flex-shrink:0;text-decoration:none;}
.hdr-name{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);}
.hdr-center{flex:1;display:flex;justify-content:center;}
.hdr-pill{display:flex;align-items:center;gap:2px;}
.hdr-seg{display:flex;gap:2px;padding-right:5px;margin-right:3px;border-right:1px solid var(--bd);}
.hdr-mode{padding:5px 12px;border-radius:0;border:none;border-bottom:1.5px solid transparent;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .22s;background:transparent;color:var(--tx-m);font-family:inherit;}
.hdr-mode.on{background:transparent;color:var(--gold);border-bottom-color:var(--gold);}
.hdr-dd{position:relative;}
.hdr-dd-btn{display:flex;align-items:center;gap:5px;padding:6px 11px;border:none;background:transparent;color:var(--tx-m);font-size:10px;font-weight:600;cursor:pointer;transition:color .18s;font-family:inherit;white-space:nowrap;}
.hdr-dd-btn:hover,.hdr-dd-btn.open{color:var(--gold);}
.hdr-dd-btn:last-of-type{border-right:none;}
.hdr-cta{padding:6px 17px;border-radius:24px;border:1.5px solid rgba(200,150,26,.5);background:transparent;color:var(--gold);font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:inherit;white-space:nowrap;margin-left:6px;transition:all .22s;}
.hdr-cta:hover{background:rgba(200,150,26,.1);border-color:var(--gold);box-shadow:0 4px 18px rgba(200,150,26,.3);}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.hdr-link{color:var(--tx-f);font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;transition:color .18s;cursor:pointer;}
.hdr-link:hover{color:var(--gold);}
.hdr-icon{width:30px;height:30px;border-radius:50%;background:var(--surf);border:1px solid var(--bd);color:var(--tx-m);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit;}
.hdr-icon:hover{border-color:rgba(200,150,26,.4);color:var(--gold);}
.hdr-drop{position:absolute;top:calc(100% + 12px);background:var(--bg-e);border:1px solid var(--bd-s);border-radius:14px;padding:7px;z-index:700;box-shadow:0 18px 56px var(--card-sh);max-height:340px;overflow-y:auto;min-width:220px;}
.hdr-drop.right{right:0;}
.fdd-search{width:100%;padding:7px 11px;background:var(--surf);border:1px solid var(--bd);border-radius:8px;font-size:11px;color:var(--tx);outline:none;font-family:inherit;margin-bottom:5px;}
.fdd-search::placeholder{color:var(--tx-f);}
.fdd-sep{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);opacity:.55;padding:6px 11px 3px;}
.fdd-item{display:flex;align-items:center;gap:8px;padding:6px 11px;border-radius:8px;font-size:11px;color:var(--tx-m);cursor:pointer;background:none;border:none;width:100%;text-align:left;font-family:inherit;transition:background .12s;}
.fdd-item:hover,.fdd-item.sel{background:rgba(200,150,26,.09);color:var(--gold);}
[dir="rtl"] .fdd-item{text-align:right;}
.chk{width:14px;height:14px;border-radius:4px;border:1.5px solid var(--bd-s);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:8px;transition:all .14s;}
.fdd-item.sel .chk{background:rgba(200,150,26,.15);border-color:var(--gold);color:var(--gold);}
@media(max-width:900px){.hdr-center{display:none;}}

/* ── HERO ────────────────────────────────────────────────────────────────── */
.hero{position:relative;height:100svh;min-height:640px;overflow:hidden;cursor:grab;}
.hero.grabbing{cursor:grabbing;}
.hero-bg{position:absolute;inset:-10%;width:120%;height:120%;background-size:cover;background-position:center;will-change:transform;transition:background-image .55s ease;}
.hero-vignette{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,17,30,.12) 0%,rgba(7,17,30,.45) 40%,rgba(7,17,30,.97) 100%);}
.hero-particles{position:absolute;inset:0;z-index:2;pointer-events:none;}
.hero-content{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;padding:0 24px 120px;text-align:center;gap:22px;}
.hero-eyebrow{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.32em;color:var(--gold-lt);text-transform:uppercase;animation:fadeUp .9s both;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(46px,7.2vw,88px);font-weight:300;color:#fff;line-height:1.02;letter-spacing:-.015em;animation:fadeUp .9s .1s both;}
.hero-title em{font-style:italic;font-weight:400;background:linear-gradient(135deg,var(--gold),var(--gold-lt));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.hero-sub{font-size:13px;font-weight:300;color:rgba(255,255,255,.45);letter-spacing:.05em;animation:fadeUp .9s .22s both;}
.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);background:rgba(7,17,30,.6);backdrop-filter:blur(22px);border:1px solid rgba(200,150,26,.16);border-radius:18px;padding:18px 24px;max-width:560px;width:100%;animation:fadeUp .9s .34s both;}
.hero-stat+.hero-stat{border-left:1px solid rgba(200,150,26,.1);}
.hero-stat-v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--gold-lt),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.hero-stat-l{font-size:8px;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:.12em;margin-top:4px;}
.scene-thumbs{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:4;animation:fadeUp .9s .46s both;}
.scene-thumb{width:72px;height:48px;border-radius:10px;overflow:hidden;border:2px solid rgba(255,255,255,.15);cursor:pointer;transition:all .3s;flex-shrink:0;}
.scene-thumb.active{border-color:var(--gold);box-shadow:0 0 16px rgba(200,150,26,.5);}
.scene-thumb img{width:100%;height:100%;object-fit:cover;display:block;}

/* ── SECTION BASE ────────────────────────────────────────────────────────── */
.sec{padding:90px 24px;max-width:1320px;margin:0 auto;}
.sec-eyebrow{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.28em;color:var(--gold);text-transform:uppercase;margin-bottom:9px;}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,4vw,58px);font-weight:400;color:var(--tx);line-height:1.06;margin-bottom:12px;}
.sec-sub{font-size:13px;color:var(--tx-m);line-height:1.8;margin-bottom:42px;}
/* Scroll reveal */
.rv{opacity:0;transform:translateY(26px);transition:opacity .75s cubic-bezier(.16,1,.3,1),transform .75s cubic-bezier(.16,1,.3,1);}
.rv.in{opacity:1;transform:none;}

/* ── VIRTUAL TOUR ────────────────────────────────────────────────────────── */
.tour-dark{background:#040c16;}
.tour-viewport{height:72vh;min-height:500px;position:relative;overflow:hidden;user-select:none;}
.tour-badge{position:absolute;top:18px;left:20px;background:rgba(4,12,22,.92);border:1px solid rgba(200,150,26,.28);backdrop-filter:blur(12px);padding:11px 18px;border-radius:14px;z-index:10;pointer-events:none;}
.tour-badge .rname{font-family:'Cormorant Garamond',serif;font-size:22px;color:#fff;font-weight:400;line-height:1;}
.tour-badge .rof{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--gold);margin-top:4px;letter-spacing:.18em;text-transform:uppercase;}
.tour-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(4,12,22,.78);border:1px solid rgba(200,150,26,.18);color:rgba(255,255,255,.68);padding:10px 20px;border-radius:24px;font-size:11.5px;pointer-events:none;z-index:10;white-space:nowrap;animation:fadeUp .6s both;}
.tour-ctrls{position:absolute;top:18px;right:20px;display:flex;gap:7px;z-index:10;}
.tour-btn{width:40px;height:40px;background:rgba(4,12,22,.88);border:1px solid rgba(200,150,26,.22);border-radius:11px;color:rgba(255,255,255,.72);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;font-family:inherit;}
.tour-btn:hover{border-color:var(--gold);color:var(--gold-lt);}
.tour-dpad{position:absolute;right:20px;top:50%;transform:translateY(-50%);display:grid;grid-template-columns:repeat(3,36px);grid-template-rows:repeat(3,36px);gap:4px;z-index:10;}
.tour-dpad-btn{width:36px;height:36px;background:rgba(4,12,22,.82);border:1px solid rgba(200,150,26,.18);border-radius:9px;color:rgba(255,255,255,.6);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;font-family:inherit;}
.tour-dpad-btn:hover{border-color:var(--gold);color:var(--gold-lt);}
.tour-dpad-center{width:36px;height:36px;background:rgba(200,150,26,.08);border:1px solid rgba(200,150,26,.12);border-radius:9px;}
.tour-loading{position:absolute;inset:0;background:rgba(4,12,22,.9);display:flex;align-items:center;justify-content:center;z-index:20;}
.tour-load-inner{text-align:center;}
.tour-load-bar{width:130px;height:2px;background:rgba(200,150,26,.12);border-radius:1px;overflow:hidden;margin:10px auto 0;}
.tour-load-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-lt));border-radius:1px;animation:shimmer 1.4s ease-in-out infinite;background-size:200%;}
.tour-pills{display:flex;gap:10px;padding:18px 24px;background:#040c16;overflow-x:auto;justify-content:center;border-top:1px solid rgba(200,150,26,.09);scrollbar-width:none;}
.tour-pills::-webkit-scrollbar{display:none;}
.tour-pill{padding:9px 22px;border-radius:30px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.52);font-size:11px;font-weight:600;cursor:pointer;transition:all .25s;white-space:nowrap;font-family:inherit;}
.tour-pill.active{border-color:var(--gold);background:rgba(200,150,26,.1);color:var(--gold-lt);}

/* ── LISTINGS ────────────────────────────────────────────────────────────── */
.lst-bg{background:var(--bg-s);}
.l-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:28px;}
.l-select{background:var(--bg-e);border:1px solid var(--bd);border-radius:10px;padding:8px 14px;font-size:11px;color:var(--tx);outline:none;cursor:pointer;font-family:inherit;transition:border-color .2s;}
.l-select:hover{border-color:rgba(200,150,26,.35);}
.l-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tx-f);}
.vbtn{width:34px;height:34px;border:1px solid var(--bd);background:var(--bg-e);border-radius:9px;color:var(--tx-m);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;}
.vbtn.on{background:rgba(200,150,26,.09);border-color:var(--gold);color:var(--gold);}
.l-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:18px;}
@media(max-width:1500px){.l-grid{grid-template-columns:repeat(4,1fr);}}
@media(max-width:1100px){.l-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:768px){.l-grid{grid-template-columns:repeat(2,1fr);gap:14px;}}
@media(max-width:480px){.l-grid{grid-template-columns:1fr;}}
.l-list .lc{display:flex;}
.l-list .lc-img{width:220px;flex-shrink:0;height:auto;}
.l-list .lc-body{display:flex;align-items:center;gap:20px;flex:1;flex-wrap:wrap;padding:16px;}

/* ── LISTING CARD ────────────────────────────────────────────────────────── */
.lc{background:var(--card-bg);border:1px solid var(--card-bd);border-radius:16px;overflow:hidden;transition:all .38s cubic-bezier(.16,1,.3,1);cursor:pointer;box-shadow:0 1px 6px var(--card-sh);}
.lc:hover{transform:translateY(-9px) scale(1.013);border-color:rgba(200,150,26,.36);box-shadow:0 24px 60px rgba(0,0,0,.12),0 0 0 1px rgba(200,150,26,.1);}
.lc-img{position:relative;height:178px;overflow:hidden;}
.lc-img img{width:100%;height:100%;object-fit:cover;transition:transform .55s ease;display:block;}
.lc:hover .lc-img img{transform:scale(1.08);}
.lc-ai{position:absolute;top:10px;right:10px;background:rgba(7,17,30,.88);border:1px solid rgba(200,150,26,.44);color:var(--gold-lt);padding:3px 9px;border-radius:20px;font-size:7.5px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.06em;}
.lc-heart{position:absolute;top:10px;left:10px;width:30px;height:30px;background:rgba(7,17,30,.65);border:1px solid rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:all .2s;opacity:0;}
.lc:hover .lc-heart,.lc-heart.saved{opacity:1;}
.lc-heart.saved{background:rgba(230,57,70,.15);border-color:var(--red);}
.lc-view{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(200,150,26,.06);opacity:0;transition:opacity .28s;}
.lc:hover .lc-view{opacity:1;}
.lc-view span{background:linear-gradient(135deg,var(--gold),var(--gold-lt));color:#07111E;padding:8px 22px;border-radius:22px;font-size:10.5px;font-weight:700;letter-spacing:.08em;}
.lc-body{padding:14px 16px;}
.lc-cmp{font-family:'JetBrains Mono',monospace;font-size:7.5px;color:var(--gold);text-transform:uppercase;letter-spacing:.15em;margin-bottom:5px;font-weight:700;}
.lc-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:var(--tx);margin-bottom:10px;line-height:1.22;}
.lc-specs{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px;}
.lc-spec{text-align:center;background:var(--surf);border:1px solid var(--bd);border-radius:8px;padding:6px 4px;}
.lc-sv{font-weight:700;font-size:11.5px;color:var(--tx);display:block;}
.lc-sl{font-size:7px;color:var(--tx-f);text-transform:uppercase;letter-spacing:.06em;}
.lc-price{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:800;color:var(--gold);margin-bottom:8px;}
.lc-bar{height:2px;background:var(--bd);border-radius:1px;overflow:hidden;}
.lc-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-lt));border-radius:1px;transition:width 1.1s ease .1s;}
.lc:hover .lc-bar-fill{width:100%!important;}

/* ── INTELLIGENCE OS ─────────────────────────────────────────────────────── */
.intel-bg{background:#040c16;}
.intel-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:14px;margin-bottom:14px;}
@media(max-width:960px){.intel-grid{grid-template-columns:1fr;}}
.ic{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px;overflow:hidden;transition:border-color .28s;}
.ic:hover{border-color:rgba(200,150,26,.18);}
.ic-hd{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.055);}
.ic-dot{width:6px;height:6px;border-radius:50%;background:var(--emerald);flex-shrink:0;animation:pulse-dot 2.4s infinite;}
.ic-lbl{font-family:'JetBrains Mono',monospace;font-size:7.5px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.32);}
.feat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:860px){.feat-grid{grid-template-columns:repeat(2,1fr);}}
.feat-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.065);border-radius:14px;padding:20px;text-decoration:none;display:block;position:relative;transition:all .3s;}
.feat-card:hover{background:rgba(200,150,26,.07);border-color:rgba(200,150,26,.26);transform:translateY(-3px);}
.feat-arrow{position:absolute;top:16px;right:16px;color:rgba(255,255,255,.18);font-size:12px;transition:all .28s;}
.feat-card:hover .feat-arrow{color:var(--gold);transform:translate(2px,-2px);}

/* ── AI HUB ──────────────────────────────────────────────────────────────── */
.ai-bg{background:var(--bg);}
.ai-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
@media(max-width:900px){.ai-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:580px){.ai-grid{grid-template-columns:1fr;}}
.ai-card{background:var(--card-bg);border:1px solid var(--card-bd);border-radius:18px;padding:28px;transition:all .38s cubic-bezier(.16,1,.3,1);cursor:pointer;position:relative;overflow:hidden;display:block;}
.ai-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-lt));transform:scaleX(0);transform-origin:left;transition:transform .42s cubic-bezier(.16,1,.3,1);}
.ai-card:hover{border-color:rgba(200,150,26,.32);transform:translateY(-6px);box-shadow:0 18px 48px rgba(0,0,0,.09);}
.ai-card:hover::before{transform:scaleX(1);}
.ai-ico{width:52px;height:52px;border-radius:14px;background:rgba(200,150,26,.09);border:1px solid rgba(200,150,26,.18);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:18px;transition:transform .3s;}
.ai-card:hover .ai-ico{transform:scale(1.07);}
.ai-card h3{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--tx);margin-bottom:9px;line-height:1.1;}
.ai-card p{font-size:12px;color:var(--tx-m);line-height:1.72;margin-bottom:16px;}
.ai-arrow{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;transition:letter-spacing .3s;}
.ai-card:hover .ai-arrow{letter-spacing:.2em;}

/* ── WHY SIERRA ──────────────────────────────────────────────────────────── */

.prop-btn img{width:100%;height:44px;object-fit:cover;display:block;}
.prop-btn span{display:block;font-size:9px;font-weight:600;color:rgba(255,255,255,.48);padding:4px 6px;}

.brow{display:flex;gap:5px;flex-wrap:wrap;}
.bchip{padding:5px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.09);background:none;color:rgba(255,255,255,.45);font-size:9.5px;cursor:pointer;transition:all .2s;font-family:inherit;}

.dt{width:100%;border-collapse:collapse;font-size:11.5px;}

/* ═════════════════════════════ HERO ════════════════════════════════════ */
function HeroSection({lang}){
  const isAr=lang==='ar';
  const [scene,setScene]=useState(0);
  const [drag,setDrag]=useState(false);
  const pRef=useRef(null);
  const bgRef=useRef(null);
  const rafRef=useRef(null);
  const lastRef=useRef(null);
  // All motion state in a single ref — no re-renders on every frame
  const ms=useRef({panX:50,panY:50,driftTX:52,driftTY:48,driftT:320,isDragging:false,scrollY:0});

  const applyBg=useCallback(()=>{
    const b=bgRef.current;if(!b)return;
    const s=ms.current;
    b.style.backgroundPosition=`${s.panX}% ${s.panY}%`;
    b.style.transform=`translateY(${s.scrollY*0.28}px) scale(1.0)`;
  },[]);

  // Scroll parallax
  useEffect(()=>{
    const onScroll=()=>{ms.current.scrollY=window.scrollY;applyBg();};
    window.addEventListener('scroll',onScroll,{passive:true});
    return()=>window.removeEventListener('scroll',onScroll);
  },[applyBg]);

  // Particles + Ken Burns auto-drift RAF loop
  useEffect(()=>{
    const cv=pRef.current;if(!cv)return;
    const ctx=cv.getContext('2d');
    const resize=()=>{cv.width=cv.offsetWidth;cv.height=cv.offsetHeight;};
    resize();window.addEventListener('resize',resize);
    const pts=Array.from({length:60},()=>({
      x:Math.random()*cv.width,y:Math.random()*cv.height,
      r:Math.random()*1.3+.35,
      vx:(Math.random()-.5)*.22,vy:-Math.random()*.32-.07,
      op:Math.random()*.32+.07,
    }));
    const newTarget=()=>{
      const s=ms.current;
      s.driftTX=36+Math.random()*28;
      s.driftTY=36+Math.random()*28;
      s.driftT=300+Math.random()*200;
    };
    newTarget();
    const tick=()=>{
      rafRef.current=requestAnimationFrame(tick);
      ctx.clearRect(0,0,cv.width,cv.height);
      pts.forEach(p=>{
        p.x+=p.vx;p.y+=p.vy;
        if(p.y<-4){p.y=cv.height+4;p.x=Math.random()*cv.width;}
        if(p.x<-4)p.x=cv.width+4;else if(p.x>cv.width+4)p.x=-4;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(200,150,26,${p.op})`;ctx.fill();
      });
      const s=ms.current;
      if(!s.isDragging){
        if(--s.driftT<=0)newTarget();
        s.panX+=(s.driftTX-s.panX)*.0045;
        s.panY+=(s.driftTY-s.panY)*.0045;
        applyBg();
      }
    };
    tick();
    return()=>{window.removeEventListener('resize',resize);cancelAnimationFrame(rafRef.current);};
  },[applyBg]);

  const onD=e=>{ms.current.isDragging=true;setDrag(true);lastRef.current={x:e.clientX,y:e.clientY};};
  const onM=e=>{
    const s=ms.current;if(!s.isDragging||!lastRef.current)return;
    s.panX=Math.max(20,Math.min(80,s.panX-(e.clientX-lastRef.current.x)*.038));
    s.panY=Math.max(20,Math.min(80,s.panY-(e.clientY-lastRef.current.y)*.038));
    lastRef.current={x:e.clientX,y:e.clientY};
    applyBg();
  };
  const onU=()=>{ms.current.isDragging=false;setDrag(false);};

  return(
    <section className={`hero${drag?' grabbing':''}`} onMouseDown={onD} onMouseMove={onM} onMouseUp={onU} onMouseLeave={onU}>
      <div ref={bgRef} className="hero-bg" style={{backgroundImage:`url(${SCENES[scene].bg})`,backgroundPosition:'50% 50%',transition:'background-image .55s ease'}}/>
      <div className="hero-vignette"/>
      <canvas ref={pRef} className="hero-particles" style={{position:'absolute',inset:0,width:'100%',height:'100%'}}/>
      <div className="hero-content">
        <div className="hero-eyebrow">{isAr?'ذكاء اصطناعي · القاهرة الجديدة':'Artificial Intelligence · New Cairo'}</div>
        <h1 className="hero-title">
          {isAr
            ?<>اعثر على <em>بيتك المثالي</em><br/>مدعوم بالذكاء الاصطناعي</>
            :<>Find Your <em>Dream Home</em><br/>Driven by AI</>
          }
        </h1>
        <p className="hero-sub">{isAr?'١٩ مجمعاً فاخراً · مطابقة فورية':'19 premium compounds · instant AI-powered matching'}</p>
        <div className="hero-stats">
          {[['26','Listings'],['19','Compounds'],['9.8','AI Score'],['24h','Response']].map(([v,l],i)=>(
            <div key={i} className="hero-stat" style={{padding:'2px 8px'}}>
              <div className="hero-stat-v">{v}</div>
              <div className="hero-stat-l">{l}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="scene-thumbs">
        {SCENES.map((s,i)=>(
          <div key={i} className={`scene-thumb${scene===i?' active':''}`} onClick={e=>{e.stopPropagation();setScene(i);}}>
            <img src={s.thumb} alt={s.lbl} loading="lazy"/>
          </div>
        ))}
      </div>
    </section>
  );
}

/* ═══════════════════════ VIRTUAL TOUR (Three.js) ════════════════════════ */
function VirtualTour({lang}){
  const isAr=lang==='ar';
  const containerRef=useRef(null);
  const threeRef=useRef({});
  const stRef=useRef({lon:0,lat:0,tLon:0,tLat:0,down:false,sx:0,sy:0,pLon:0,pLat:0});
  const rafRef=useRef(null);
  const [room,setRoom]=useState(0);
  const [hint,setHint]=useState(true);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    const el=containerRef.current;if(!el||!window.THREE)return;
    const W=el.clientWidth||window.innerWidth;
    const H=el.clientHeight||500;
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
    renderer.setSize(W,H);
    renderer.toneMapping=THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure=1.7;
    renderer.domElement.style.cssText='position:absolute;inset:0;width:100%;height:100%;';
    el.appendChild(renderer.domElement);
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(75,W/H,1,2000);
    camera.position.set(0,0,.001);
    const geo=new THREE.SphereGeometry(500,64,40);
    geo.scale(-1,1,1);
    const mat=new THREE.MeshBasicMaterial({color:0x142840});
    scene.add(new THREE.Mesh(geo,mat));
    threeRef.current={renderer,camera,mat};
    const loader=new THREE.TextureLoader();
    loader.crossOrigin='anonymous';
    loader.load(TOUR_ROOMS[0].bg,tex=>{
      if(THREE.SRGBColorSpace)tex.colorSpace=THREE.SRGBColorSpace;
      tex.minFilter=THREE.LinearFilter;tex.generateMipmaps=false;
      mat.map=tex;mat.needsUpdate=true;setLoading(false);
    });
    const tick=()=>{
      rafRef.current=requestAnimationFrame(tick);
      const s=stRef.current;
      s.lon+=(s.tLon-s.lon)*.082;
      s.lat+=(s.tLat-s.lat)*.082;
      s.lat=Math.max(-85,Math.min(85,s.lat));
      const phi=THREE.MathUtils.degToRad(90-s.lat);
      const theta=THREE.MathUtils.degToRad(s.lon);
      camera.lookAt(500*Math.sin(phi)*Math.cos(theta),500*Math.cos(phi),500*Math.sin(phi)*Math.sin(theta));
      renderer.render(scene,camera);
    };
    tick();
    const onResize=()=>{
      const W2=el.clientWidth,H2=el.clientHeight;
      if(W2&&H2){camera.aspect=W2/H2;camera.updateProjectionMatrix();renderer.setSize(W2,H2);}
    };
    window.addEventListener('resize',onResize);
    return()=>{cancelAnimationFrame(rafRef.current);window.removeEventListener('resize',onResize);renderer.dispose();if(el.contains(renderer.domElement))el.removeChild(renderer.domElement);};
  },[]);

  useEffect(()=>{
    const{mat}=threeRef.current;if(!mat)return;
    setLoading(true);stRef.current.tLon=0;stRef.current.tLat=0;
    const loader=new THREE.TextureLoader();loader.crossOrigin='anonymous';
    loader.load(TOUR_ROOMS[room].bg,tex=>{if(THREE.SRGBColorSpace)tex.colorSpace=THREE.SRGBColorSpace;tex.minFilter=THREE.LinearFilter;tex.generateMipmaps=false;mat.map=tex;mat.needsUpdate=true;setLoading(false);});
  },[room]);

  const onPD=e=>{const s=stRef.current;s.down=true;s.sx=e.clientX;s.sy=e.clientY;s.pLon=s.tLon;s.pLat=s.tLat;setHint(false);};
  const onPM=e=>{const s=stRef.current;if(!s.down)return;s.tLon=s.pLon-(e.clientX-s.sx)*.24;s.tLat=Math.max(-85,Math.min(85,s.pLat+(e.clientY-s.sy)*.24));};
  const onPU=()=>{stRef.current.down=false;};
  const zi=()=>{const{camera}=threeRef.current;if(camera){camera.fov=Math.max(35,camera.fov-12);camera.updateProjectionMatrix();}};
  const zo=()=>{const{camera}=threeRef.current;if(camera){camera.fov=Math.min(105,camera.fov+12);camera.updateProjectionMatrix();}};
  const rst=()=>{const s=stRef.current;s.tLon=0;s.tLat=0;const{camera}=threeRef.current;if(camera){camera.fov=75;camera.updateProjectionMatrix();}};
  const pan=(dl,dlt)=>{const s=stRef.current;s.tLon+=dl;s.tLat=Math.max(-85,Math.min(85,s.tLat+dlt));};

  return(
    <section className="tour-dark" id="tour">
      <div style={{padding:'88px 24px 0',maxWidth:1320,margin:'0 auto'}}>
        <div className="sec-eyebrow rv">{isAr?'الجولة الافتراضية':'Virtual Tour'}</div>
        <div className="sec-title rv" style={{color:'#fff'}}>{isAr?'استكشف كل غرفة بحرية كاملة':'Explore Every Room in Full 360°'}</div>
        <p className="rv" style={{fontSize:13,color:'rgba(255,255,255,.38)',marginBottom:22,lineHeight:1.7}}>{isAr?'اسحب في أي اتجاه · أعلى وأسفل ويميناً وشمالاً · تكبير وتصغير':'Drag freely · up · down · left · right · zoom in and out'}</p>
      </div>
      <div style={{position:'relative',height:'72vh',minHeight:500,userSelect:'none',cursor:'grab'}}
        onPointerDown={onPD} onPointerMove={onPM} onPointerUp={onPU} onPointerLeave={onPU}
        onTouchStart={e=>{const t=e.touches[0];onPD({clientX:t.clientX,clientY:t.clientY});}}
        onTouchMove={e=>{e.preventDefault();const t=e.touches[0];onPM({clientX:t.clientX,clientY:t.clientY});}}
        onTouchEnd={onPU}>
        <div ref={containerRef} style={{position:'absolute',inset:0,overflow:'hidden'}}/>
        {loading&&(
          <div className="tour-loading">
            <div className="tour-load-inner">
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,color:'var(--gold-lt)',marginBottom:8}}>Sierra Estates</div>
              <div className="tour-load-bar"><div className="tour-load-fill"/></div>
            </div>
          </div>
        )}
        <div className="tour-badge">
          <div className="rname">{TOUR_ROOMS[room].name}</div>
          <div className="rof">{room+1} / {TOUR_ROOMS.length}</div>
        </div>
        {hint&&<div className="tour-hint">{isAr?'اسحب في أي اتجاه للاستكشاف':'Drag in any direction to explore'}</div>}
        {/* Zoom + reset */}
        <div className="tour-ctrls">
          <button className="tour-btn" onClick={zi} title="Zoom in">＋</button>
          <button className="tour-btn" onClick={zo} title="Zoom out">－</button>
          <button className="tour-btn" onClick={rst} title="Reset">↺</button>
        </div>
        {/* D-pad */}
        <div className="tour-dpad">
          <div/><button className="tour-dpad-btn" onClick={()=>pan(0,-22)} title="Up">↑</button><div/>
          <button className="tour-dpad-btn" onClick={()=>pan(-32,0)} title="Left">←</button>
          <div className="tour-dpad-center"/>
          <button className="tour-dpad-btn" onClick={()=>pan(32,0)} title="Right">→</button>
          <div/><button className="tour-dpad-btn" onClick={()=>pan(0,22)} title="Down">↓</button><div/>
        </div>
      </div>
      <div className="tour-pills">
        {TOUR_ROOMS.map((r,i)=>(
          <button key={i} className={`tour-pill${room===i?' active':''}`} onClick={()=>setRoom(i)}>{r.name}</button>
        ))}
      </div>
    </section>
  );
}

function ListingsSection({lang,gMode,gCmps,gRooms}){
  const isAr=lang==='ar';
  const [sort,setSort]=useState('ai');
  const [view,setView]=useState('grid');
  const [saved,setSaved]=useState(new Set());
  const isRent=gMode==='rent';
  const items=useMemo(()=>{
    let r=[...ALL_LISTINGS];
    if(gCmps.length)r=r.filter(l=>gCmps.includes(l.cmp));
    if(gRooms)r=r.filter(l=>l.beds===gRooms);
    if(sort==='ai')r.sort((a,b)=>b.ai-a.ai);
    else if(sort==='pa')r.sort((a,b)=>a.price-b.price);
    else if(sort==='pd')r.sort((a,b)=>b.price-a.price);
    else r.sort((a,b)=>b.area-a.area);
    return r;
  },[gCmps,gRooms,sort]);
  const toggleSave=id=>setSaved(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  return(
    <section className="lst-bg" id="listings">
      <div className="sec">
        <div className="sec-eyebrow rv">{isAr?'المخزون المنسق':'AI-Curated Inventory'}</div>

          <select className="l-select" value={sort} onChange={e=>setSort(e.target.value)}>

            <option value="pd">Price ↓</option>
            <option value="pa">Price ↑</option>
            <option value="area">Largest</option>
          </select>
          <span className="l-count">{items.length} listings</span>
          <div style={{marginLeft:'auto',display:'flex',gap:5}}>
            {['grid','list'].map(v=>(
              <button key={v} className={`vbtn${view===v?' on':''}`} onClick={()=>setView(v)} title={v}>
                {v==='grid'?'⊞':'☰'}

            ))}
          </div>
        </div>
        <div className={`l-grid${view==='list'?' l-list':''}`}>
          {items.map(l=><ListingCard key={l.id} l={l} isRent={isRent} saved={saved.has(l.id)} onSave={toggleSave}/>)}
        </div>
      </div>
    </section>
  );
}

                )}

          ):(
            <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12}}>

}

/* ══════════════════════════ MAP SECTION ════════════════════════════════ */
function MapSection({lang}){
  const isAr=lang==='ar';
  const mapRef=useRef(null);const mapInst=useRef(null);const stterRef=useRef(null);
  const [isRent,setIsRent]=useState(false);
  const [bedF,setBedF]=useState(0);
  const [selCpd,setSelCpd]=useState(null);
  stterRef.current=setSelCpd;
  const PTYPES=[
    {t:'Villa',img:'https://images.unsplash.com/photo-1613977257363-707ba9348227?w=120&q=60'},
    {t:'Apartment',img:'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=120&q=60'},
    {t:'Penthouse',img:'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=120&q=60'},
    {t:'Twin House',img:'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=120&q=60'},
    {t:'Townhouse',img:'https://images.unsplash.com/photo-1598228723793-52759bba239c?w=120&q=60'},
    {t:'Duplex',img:'https://images.unsplash.com/photo-1600566753086-00f18fb6b3ea?w=120&q=60'},
  ];
  useEffect(()=>{
    if(!mapRef.current||mapInst.current)return;
    const map=L.map(mapRef.current,{center:[30.04,31.50],zoom:12,zoomControl:false,scrollWheelZoom:false,doubleClickZoom:false,dragging:true});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
    map.fitBounds([[29.90,31.10],[30.25,31.80]]);
    MAP_COMPOUNDS.forEach((c,idx)=>{
      const html=`<div style="display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;animation:markerIn .4s ${idx*.04}s both">
        <div style="background:rgba(7,17,30,.96);border:1.5px solid #C8961A;color:#F0E8C8;padding:6px 14px;border-radius:20px;font-family:monospace;font-size:11px;font-weight:800;white-space:nowrap;box-shadow:0 4px 18px rgba(0,0,0,.55);letter-spacing:.04em;">${c.units} <span style="font-size:9px;opacity:.7;font-weight:600">UNITS</span></div>
        <div style="background:rgba(200,150,26,.18);border:1px solid rgba(200,150,26,.6);color:#E9C176;padding:3px 10px;border-radius:10px;font-family:monospace;font-size:8px;font-weight:700;white-space:nowrap;letter-spacing:.06em;">${c.name.split(' ').slice(0,2).join(' ')}</div>
      </div>`;
      const pin=L.divIcon({className:'',html,iconSize:[130,52],iconAnchor:[65,50]});
      const mk=L.marker(c.coords,{icon:pin}).addTo(map);
      mk.on('click',()=>{if(stterRef.current)stterRef.current(c);});
    });
    mapInst.current=map;
    return()=>{if(mapInst.current){mapInst.current.remove();mapInst.current=null;}};
  },[]);
  const zm=d=>{if(mapInst.current)d>0?mapInst.current.zoomIn():mapInst.current.zoomOut();};
  return(
    <section className="map-bg" id="map">
      <div style={{padding:'88px 24px 32px',maxWidth:1320,margin:'0 auto'}}>
        <div className="sec-eyebrow rv" style={{color:'var(--gold)'}}>{isAr?'الخريطة الذكية':'Smart Map'}</div>
        <div className="sec-title rv" style={{color:'#fff'}}>{isAr?'مجمعات القاهرة الجديدة · حية':'New Cairo Compounds · Live'}</div>
        <p className="rv" style={{fontSize:13,color:'rgba(255,255,255,.34)',marginBottom:28,lineHeight:1.7}}>{isAr?'انقر على عدد الوحدات لعرض جميع التفاصيل · استخدم + و − للتكبير فقط':'Click unit count on any compound to view all details · use + and − buttons only to zoom'}</p>
      </div>
      <div style={{padding:'0 24px 88px',maxWidth:1320,margin:'0 auto'}}>
        <div className="map-frame">
          {/* Filters */}
          <div className="map-filter">
            <div>
              <div className="mf-lbl">{isAr?'المعاملة':'Transaction'}</div>
              <div style={{display:'flex',gap:6}}>
                {[['false',isAr?'مبيعات':'Resale'],['true',isAr?'إيجار':'Rent']].map(([k,l])=>(
                  <button key={k} className={`bchip${String(isRent)===k?' on':''}`} onClick={()=>setIsRent(k==='true')}>{l}</button>
                ))}
              </div>
            </div>
            <div>
              <div className="mf-lbl">{isAr?'نوع العقار':'Property Type'}</div>
              <div className="prop-grid">
                {PTYPES.map(p=><button key={p.t} className="prop-btn"><img src={p.img} alt={p.t} loading="lazy"/><span>{p.t}</span></button>)}
              </div>
            </div>
            <div>
              <div className="mf-lbl">{isAr?'الغرف':'Bedrooms'}</div>
              <div className="brow">
                {['Any',2,3,4,5,'6+'].map(b=>(
                  <button key={b} className={`bchip${bedF===(b==='Any'?0:b==='6+'?6:b)?' on':''}`} onClick={()=>setBedF(b==='Any'?0:b==='6+'?6:b)}>{b}</button>
                ))}
              </div>
            </div>
            <div>
              <div className="mf-lbl">{isAr?'الحد الأقصى للسعر':'Max Price'}</div>
              <input type="range" min={isRent?200:500000} max={isRent?15000:50000000} step={isRent?200:500000} style={{width:'100%',accentColor:'var(--gold)',cursor:'pointer'}}/>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'rgba(255,255,255,.3)',fontFamily:'monospace',marginTop:4}}>
                <span>{isRent?'$200/mo':'EGP 0.5M'}</span><span>{isRent?'$15K/mo':'EGP 50M'}</span>
              </div>
            </div>
            <button style={{padding:'9px',borderRadius:9,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.09)',color:'rgba(255,255,255,.46)',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit',transition:'all .2s'}} onMouseEnter={e=>e.currentTarget.style.borderColor='rgba(200,150,26,.4)'} onMouseLeave={e=>e.currentTarget.style.borderColor='rgba(255,255,255,.09)'}>
              ↺ {isAr?'إعادة تعيين':'Reset Filters'}
            </button>
          </div>
          {/* Map */}
          <div className="map-center">
            <div ref={mapRef} id="lmap"/>
            <div className="map-zoom">
              <button className="mzb" onClick={()=>zm(1)}>+</button>
              <button className="mzb" onClick={()=>zm(-1)}>−</button>
            </div>
          </div>
          {/* List */}
          <div className="map-right">
            <div className="mr-head">
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:'var(--gold)',letterSpacing:'.2em',textTransform:'uppercase'}}>COMPOUNDS</span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'rgba(255,255,255,.26)'}}>{MAP_COMPOUNDS.length} active</span>
            </div>
            {MAP_COMPOUNDS.map((c,i)=>(
              <div key={i} className="ml-item" onClick={()=>setSelCpd(c)}>
                <div className="ml-ai">AI {c.ai}</div>
                <div className="ml-name">{c.name}</div>
                <div className="ml-price">{isRent?c.priceRent:c.priceResale}</div>
                <div className="ml-meta">{c.units} units · {c.zone}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      {selCpd&&<CompoundModal cpd={selCpd} onClose={()=>setSelCpd(null)} isRent={isRent}/>}
    </section>
  );
}

/* ════════════════════════ CHAT FAB ═════════════════════════════════════ */
function ChatFAB({lang}){
  const isAr=lang==='ar';
  const [open,setOpen]=useState(false);
  const [msgs,setMsgs]=useState([{r:'ai',t:AI_RESP.default}]);
  const [inp,setInp]=useState('');
  const [typing,setTyping]=useState(false);
  const mRef=useRef(null);
  const send=t=>{
    if(!t.trim())return;
    setMsgs(m=>[...m,{r:'user',t}]);setInp('');setTyping(true);
    const tl=t.toLowerCase();
    const resp=tl.includes('mivida')?AI_RESP.mivida:tl.includes('hyde')?AI_RESP.hyde:tl.includes('invest')?AI_RESP.invest:tl.includes('rent')?AI_RESP.rent:tl.includes('madinaty')?AI_RESP.madinaty:AI_RESP.default;
    setTimeout(()=>{setTyping(false);setMsgs(m=>[...m,{r:'ai',t:resp}]);},1100);
  };
  useEffect(()=>{if(mRef.current)mRef.current.scrollTop=mRef.current.scrollHeight;},[msgs,typing]);
  return(
    <div className="fab-wrap">
      {open&&(
        <div className="chat-panel">
          <div className="cp-hd">
            <span className="cp-dot"/>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:'#fff',lineHeight:1}}>Sierra AI</div>
              <div style={{fontSize:8,color:'rgba(255,255,255,.4)',letterSpacing:'.14em',marginTop:2}}>NEW CAIRO CONCIERGE</div>
            </div>
            <button onClick={()=>setOpen(false)} style={{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',color:'rgba(255,255,255,.36)',fontSize:22,lineHeight:1}}>×</button>
          </div>
          <div className="cp-msgs" ref={mRef}>
            {msgs.map((m,i)=>(
              <div key={i} className={m.r==='ai'?'cp-ai':'cp-user'}>{m.t}</div>
            ))}
            {typing&&<div style={{display:'flex',gap:4,padding:'8px 10px'}}>
              {[0,1,2].map(i=><span key={i} style={{width:6,height:6,borderRadius:'50%',background:'var(--gold)',display:'block',animation:`dotPulse 1.4s ${i*.16}s infinite both`}}/>)}
            </div>}
          </div>
          <div className="cp-chips">
            {['Hyde Park ROI','Mivida','Invest 5M','Best rental'].map((c,i)=>(
              <button key={i} className="cp-chip" onClick={()=>send(c)}>{c}</button>
            ))}
          </div>
          <div className="cp-foot">
            <input className="cp-inp" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send(inp)} placeholder={isAr?'اسأل سيييرا…':'Ask Sierra…'}/>
            <button className="cp-send" onClick={()=>send(inp)}>↗</button>
          </div>
        </div>
      )}
      <button className="fab-btn" onClick={()=>setOpen(o=>!o)}>{open?'×':'⟡'}</button>
      {!open&&<div className="fab-badge">AI</div>}
    </div>
  );
}

/* ═════════════════════════════ APP ══════════════════════════════════════ */
function App(){
  const [lang,setLang]=useState('en');
  const [theme,setTheme]=useState(()=>localStorage.getItem('se3-theme')||'light');
  const [mode,setMode]=useState('all');
  const [selCmps,setSelCmps]=useState([]);
  const [rooms,setRooms]=useState(null);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',theme);
    document.documentElement.setAttribute('dir',lang==='ar'?'rtl':'ltr');
    localStorage.setItem('se3-theme',theme);
  },[theme,lang]);

  // Scroll reveal
  useEffect(()=>{
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target);}});
    },{threshold:.1,rootMargin:'0px 0px -36px 0px'});
    const run=()=>document.querySelectorAll('.rv').forEach(el=>obs.observe(el));
    setTimeout(run,300);
    return()=>obs.disconnect();
  },[]);

  return(
    <>
      <Header lang={lang} setLang={setLang} theme={theme} setTheme={setTheme}
        mode={mode} setMode={setMode} selCmps={selCmps} setSelCmps={setSelCmps}
        rooms={rooms} setRooms={setRooms}/>
      <main style={{paddingTop:56}}>
        <HeroSection lang={lang}/>
        <ListingsSection lang={lang} gMode={mode} gCmps={selCmps} gRooms={rooms}/>
        <IntelligenceOS lang={lang}/>
        <AIHub lang={lang}/>
        <WhySierra lang={lang}/>
        <MapSection lang={lang}/>
        <QuickRequest lang={lang}/>
      </main>
      <Footer lang={lang}/>
      <ChatFAB lang={lang}/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
