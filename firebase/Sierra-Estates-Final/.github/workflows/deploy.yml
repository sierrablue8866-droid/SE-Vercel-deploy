name: Deploy Sierra Estates 3.0

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────
  # JOB 1: CLIENT PORTAL → Vercel
  # ─────────────────────────────────────────────────
  deploy-client:
    name: "Client Portal to Vercel"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Client Portal
        run: pnpm --filter "@workspace/sierra-estates" build
        env:
          NODE_ENV: production

      - name: Deploy Client Portal to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_CLIENT_PROJECT_ID }}
          working-directory: ./artifacts/sierra-estates
          vercel-args: --prod

  # ─────────────────────────────────────────────────
  # JOB 2: ADMIN DASHBOARD → Vercel
  # ─────────────────────────────────────────────────
  deploy-admin:
    name: "Admin Dashboard to Vercel"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Admin Dashboard
        run: pnpm --filter admin-dashboard build
        env:
          NODE_ENV: production
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Admin Dashboard to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
          working-directory: ./apps/admin-dashboard
          vercel-args: --prod

  # ─────────────────────────────────────────────────
  # JOB 3: FIRESTORE RULES → Firebase
  # ─────────────────────────────────────────────────
  deploy-firestore-rules:
    name: "Firestore Rules to Firebase"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firestore Rules
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore:rules,firestore:indexes,storage
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
