name: Deploy · Firebase (Admin Nexus)

# Deploys apps/admin-dashboard to Firebase Hosting (target: sierra-estates-admin,
# Web Frameworks SSR via Cloud Run — see firebase.json/.firebaserc). The public
# site (apps/sierra-estates-realty) stays on Vercel and is untouched by this
# workflow. Manual trigger only — run from the Actions tab when ready to ship;
# nothing here runs automatically on push, per the "no deploys without explicit
# approval" project rule.
#
# Required repo secret:
#   FIREBASE_SERVICE_ACCOUNT_SIERRA_BLU — JSON key for a service account with
#   Firebase Hosting Admin + Cloud Run Admin + Service Account User roles on
#   the sierra-estates Firebase project.
# Optional repo secrets (public Firebase web config — safe to omit short-term,
# but the deployed app's client-side Firebase init will fail without them):
#   NEXT_PUBLIC_FIREBASE_API_KEY, NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,
#   NEXT_PUBLIC_FIREBASE_PROJECT_ID, NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,
#   NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID, NEXT_PUBLIC_FIREBASE_APP_ID

on:
  workflow_dispatch: {}

concurrency:
  group: firebase-deploy-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SIERRA_BLU }}

      - name: Deploy to Firebase Hosting
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
        run: npx firebase-tools@latest deploy --only hosting:sierra-estates-admin --project sierra-estates --non-interactive
