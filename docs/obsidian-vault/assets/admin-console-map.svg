<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .node { fill: #0f1f33; stroke: #C9A24D; stroke-width: 1.5; }
      .node-alt { fill: #0a1628; stroke: #C9A24D; stroke-opacity: 0.55; stroke-width: 1.2; }
      .label { font-family: Georgia, 'Playfair Display', serif; fill: #F4F0E8; }
      .sub { font-family: Arial, Helvetica, sans-serif; fill: #C9A24D; letter-spacing: 1.5px; }
      .meta { font-family: Arial, Helvetica, sans-serif; fill: #71717A; }
      .edge { stroke: #C9A24D; stroke-width: 1.2; stroke-opacity: 0.6; fill: none; }
      .edge-dash { stroke: #C9A24D; stroke-width: 1.2; stroke-opacity: 0.45; fill: none; stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1000" fill="#0A1628" />

  <!-- Title -->
  <text x="800" y="70" text-anchor="middle" class="label" font-size="34">SIERRA ADMIN CONSOLE</text>
  <text x="800" y="98" text-anchor="middle" class="sub" font-size="14">WHO DOES WHAT — ROUTE &amp; WORKER MAP</text>

  <!-- Login gate -->
  <rect x="640" y="150" width="320" height="70" rx="10" class="node" />
  <text x="800" y="180" text-anchor="middle" class="label" font-size="20">/admin/login</text>
  <text x="800" y="203" text-anchor="middle" class="meta" font-size="13">Firebase auth — role read from users/{uid}</text>

  <!-- Role split -->
  <text x="800" y="255" text-anchor="middle" class="sub" font-size="13">admin · manager pass  ·  agent / other → bounced</text>

  <!-- Four room boxes -->
  <rect x="120" y="300" width="300" height="130" rx="10" class="node" />
  <text x="270" y="335" text-anchor="middle" class="label" font-size="20">Dashboard</text>
  <text x="270" y="360" text-anchor="middle" class="meta" font-size="12">/admin</text>
  <text x="270" y="385" text-anchor="middle" class="meta" font-size="12">live lead + listing counts</text>
  <text x="270" y="405" text-anchor="middle" class="meta" font-size="12">quick-action launchpad</text>

  <rect x="460" y="300" width="300" height="130" rx="10" class="node" />
  <text x="610" y="335" text-anchor="middle" class="label" font-size="20">Leads</text>
  <text x="610" y="360" text-anchor="middle" class="meta" font-size="12">/admin/leads</text>
  <text x="610" y="385" text-anchor="middle" class="meta" font-size="12">stakeholder pipeline</text>
  <text x="610" y="405" text-anchor="middle" class="meta" font-size="12">viewing-request approvals</text>

  <rect x="800" y="300" width="300" height="130" rx="10" class="node" />
  <text x="950" y="335" text-anchor="middle" class="label" font-size="20">Listings</text>
  <text x="950" y="360" text-anchor="middle" class="meta" font-size="12">/admin/listings</text>
  <text x="950" y="385" text-anchor="middle" class="meta" font-size="12">portfolio inventory</text>
  <text x="950" y="405" text-anchor="middle" class="meta" font-size="12">PropertyFinder sync trigger</text>

  <rect x="1140" y="300" width="340" height="130" rx="10" class="node" />
  <text x="1310" y="335" text-anchor="middle" class="label" font-size="20">Intelligence OS</text>
  <text x="1310" y="360" text-anchor="middle" class="meta" font-size="12">/admin/intelligence-os</text>
  <text x="1310" y="385" text-anchor="middle" class="meta" font-size="12">embedded Remix console</text>
  <text x="1310" y="405" text-anchor="middle" class="meta" font-size="12">Sierra + Leila cognition</text>

  <!-- edges from login to four rooms -->
  <path d="M 700 220 C 600 260, 350 260, 270 300" class="edge" />
  <path d="M 760 220 C 700 250, 650 260, 610 300" class="edge" />
  <path d="M 840 220 C 900 250, 940 260, 950 300" class="edge" />
  <path d="M 900 220 C 1050 260, 1250 260, 1310 300" class="edge" />

  <!-- Worker layer -->
  <text x="800" y="500" text-anchor="middle" class="sub" font-size="13">TRIGGERS — NEVER RUNS HEAVY WORK IN-REQUEST</text>

  <rect x="380" y="540" width="300" height="110" rx="10" class="node-alt" />
  <text x="530" y="575" text-anchor="middle" class="label" font-size="18">n8n</text>
  <text x="530" y="598" text-anchor="middle" class="meta" font-size="12">Docker :5678</text>
  <text x="530" y="620" text-anchor="middle" class="meta" font-size="12">WhatsApp scraping · automation</text>

  <rect x="700" y="540" width="300" height="110" rx="10" class="node-alt" />
  <text x="850" y="575" text-anchor="middle" class="label" font-size="18">apps/api (Python)</text>
  <text x="850" y="598" text-anchor="middle" class="meta" font-size="12">Cloud Run</text>
  <text x="850" y="620" text-anchor="middle" class="meta" font-size="12">PropertyFinder sync · bot integration</text>

  <rect x="1020" y="540" width="300" height="110" rx="10" class="node-alt" />
  <text x="1170" y="575" text-anchor="middle" class="label" font-size="18">Intelligence OS</text>
  <text x="1170" y="598" text-anchor="middle" class="meta" font-size="12">Cloud Run</text>
  <text x="1170" y="620" text-anchor="middle" class="meta" font-size="12">Sierra + Leila reasoning</text>

  <path d="M 610 430 L 530 540" class="edge-dash" />
  <path d="M 950 430 L 850 540" class="edge-dash" />
  <path d="M 1310 430 L 1170 540" class="edge-dash" />

  <!-- Firestore base -->
  <rect x="600" y="720" width="400" height="90" rx="10" class="node" />
  <text x="800" y="755" text-anchor="middle" class="label" font-size="18">Firestore</text>
  <text x="800" y="778" text-anchor="middle" class="meta" font-size="12">users · leads · properties · rawScrapeData</text>

  <path d="M 530 650 L 700 720" class="edge-dash" />
  <path d="M 850 650 L 800 720" class="edge-dash" />
  <path d="M 1170 650 L 900 720" class="edge-dash" />

  <text x="800" y="900" text-anchor="middle" class="meta" font-size="12">docs/obsidian-vault/Admin Console Map.md</text>
</svg>
