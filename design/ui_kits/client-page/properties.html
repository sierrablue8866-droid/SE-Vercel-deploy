<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Properties · Sierra Estates</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500&family=Cairo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>
<script src="data.js"></script>
<script src="shared.js"></script>
<style>
/* ── page hero ── */
.page-hero{background:var(--navy);color:#fff;padding:56px 0 40px;position:relative;overflow:hidden;}
[data-theme="dark"] .page-hero{background:linear-gradient(135deg,#0b0d10,#141109);border-bottom:1px solid rgba(200,150,26,.2);}
.page-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(700px 340px at 88% -10%,rgba(0,174,255,.22),transparent 60%);pointer-events:none;}
[data-theme="dark"] .page-hero::before{background:radial-gradient(700px 340px at 88% -10%,rgba(200,150,26,.16),transparent 60%);}
.page-hero .wrap{position:relative;z-index:2;}
.page-hero .crumb{font-family:var(--mono);text-transform:uppercase;letter-spacing:.2em;font-size:11px;color:#8fe1ff;margin-bottom:14px;display:flex;gap:8px;align-items:center;}
[data-theme="dark"] .page-hero .crumb{color:#e9c176;}
.page-hero .crumb a{color:inherit;opacity:.85;}
.page-hero h1{color:#fff;font-family:var(--display);font-size:48px;font-weight:700;letter-spacing:-.02em;line-height:1.05;}
.page-hero p{color:rgba(255,255,255,.78);font-size:16px;margin-top:12px;max-width:560px;line-height:1.6;}

/* ── filter bar ── */
.filter-bar{position:sticky;top:70px;z-index:40;display:flex;flex-wrap:wrap;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow-s);margin-bottom:28px;}
.seg-tabs{display:flex;gap:4px;background:var(--surface-2);border-radius:11px;padding:4px;}
.seg-tabs button{border:none;background:none;font-family:var(--font);font-size:13.5px;font-weight:700;color:var(--muted);padding:9px 15px;border-radius:8px;cursor:pointer;transition:.18s;white-space:nowrap;}
.seg-tabs button:hover{color:var(--ink);}
.seg-tabs button.on{background:var(--pri);color:#fff;box-shadow:0 3px 10px rgba(0,0,0,.12);}
[data-theme="dark"] .seg-tabs button.on{color:#0d0d0f;}
.fb-sel{position:relative;}
.fb-sel select{appearance:none;-webkit-appearance:none;font-family:var(--font);font-size:13.5px;font-weight:600;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:11px 38px 11px 14px;cursor:pointer;transition:.18s;}
.fb-sel select:hover{border-color:var(--pri);}
.fb-sel::after{content:"";position:absolute;inset-inline-end:14px;top:50%;width:8px;height:8px;border-inline-end:2px solid var(--muted);border-bottom:2px solid var(--muted);transform:translateY(-70%) rotate(45deg);pointer-events:none;}
.fb-count{margin-inline-start:auto;font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--muted);white-space:nowrap;}
.fb-count b{color:var(--pri);}
.no-props{grid-column:1/-1;text-align:center;color:var(--muted);font-size:16px;padding:60px 0;}
@media(max-width:940px){.filter-bar{top:0;}}
@media(max-width:680px){
  .page-hero h1{font-size:34px;}
  .filter-bar{gap:9px;padding:12px;}
  .seg-tabs{width:100%;}
  .seg-tabs button{flex:1;padding:10px 6px;font-size:12.5px;}
  .fb-sel,.fb-sel select{flex:1;width:100%;}
  .fb-sel{flex:1 1 46%;}
  .fb-count{width:100%;margin:2px 0 0;text-align:center;}
}
</style>
</head>
<body>

<div id="site-chrome"></div>

<header class="page-hero" data-screen-label="Properties header">
  <div class="wrap">
    <div class="crumb"><a href="index.html">Home</a> <span>/</span> <span>Properties</span></div>
    <h1>Curated New Cairo homes</h1>
    <p>Every listing AI-scored, legally verified and priced against live market comparables.</p>
  </div>
</header>

<section class="block" style="padding-top:32px;" data-screen-label="Listings">
  <div class="wrap">
    <div class="filter-bar" id="pf-bar">
      <div class="seg-tabs" id="pf-mode">
        <button type="button" class="on" data-mode="all">All</button>
        <button type="button" data-mode="buy">Buy</button>
        <button type="button" data-mode="rent">Rent</button>
        <button type="button" data-mode="new">New</button>
      </div>
      <div class="fb-sel">
        <select id="pf-type">
          <option value="">Any type</option>
          <option>Villa</option><option>Apartment</option><option>Penthouse</option>
          <option>Twin House</option><option>Duplex</option>
        </select>
      </div>
      <div class="fb-sel">
        <select id="pf-beds">
          <option value="0">Any beds</option>
          <option value="1">1+ beds</option><option value="2">2+ beds</option>
          <option value="3">3+ beds</option><option value="4">4+ beds</option><option value="5">5+ beds</option>
        </select>
      </div>
      <div class="fb-sel">
        <select id="pf-sort">
          <option value="ai">Top AI score</option>
          <option value="asc">Price: low to high</option>
          <option value="desc">Price: high to low</option>
          <option value="area">Largest area</option>
        </select>
      </div>
      <div class="fb-count" id="pf-count"></div>
    </div>
    <div class="grid-props" id="grid"></div>
  </div>
</section>

<footer id="site-footer" data-screen-label="Footer"></footer>

<script>
(function () {
  var D = window.HZDATA, HZ = window.HZ;
  var state = { mode:'all', type:'', beds:0, sort:'ai' };

  function matches(p){
    if (state.mode === 'buy'  && p.tag === 'Rent') return false;
    if (state.mode === 'rent' && p.tag !== 'Rent') return false;
    if (state.mode === 'new'  && p.tag !== 'New')  return false;
    if (state.type && p.type !== state.type) return false;
    if (state.beds && p.beds < state.beds) return false;
    return true;
  }
  function sortFn(a, b){
    if (state.sort === 'asc')  return a.priceM - b.priceM;
    if (state.sort === 'desc') return b.priceM - a.priceM;
    if (state.sort === 'area') return b.area - a.area;
    return b.ai - a.ai;
  }
  function render(){
    var list = D.listings.filter(matches).sort(sortFn);
    var grid = document.getElementById('grid');
    grid.innerHTML = list.length
      ? list.map(HZ.pcard).join('')
      : '<div class="no-props">No homes match these filters — try widening your search.</div>';
    document.getElementById('pf-count').innerHTML = '<b>' + list.length + '</b> ' + (list.length === 1 ? 'home' : 'homes');
    if (window.lucide) lucide.createIcons();
    HZ.reveal();
  }

  document.querySelectorAll('#pf-mode button').forEach(function (b){
    b.addEventListener('click', function (){
      document.querySelectorAll('#pf-mode button').forEach(function (x){ x.classList.remove('on'); });
      b.classList.add('on');
      state.mode = b.dataset.mode;
      render();
    });
  });
  document.getElementById('pf-type').addEventListener('change', function (){ state.type = this.value; render(); });
  document.getElementById('pf-beds').addEventListener('change', function (){ state.beds = +this.value; render(); });
  document.getElementById('pf-sort').addEventListener('change', function (){ state.sort = this.value; render(); });

  HZ.mount('props');

  /* deep-link support: ?mode=rent&type=Villa&beds=3 */
  try {
    var q = new URLSearchParams(location.search);
    if (q.get('mode')){ state.mode = q.get('mode');
      document.querySelectorAll('#pf-mode button').forEach(function (x){ x.classList.toggle('on', x.dataset.mode === state.mode); }); }
    if (q.get('type')){ state.type = q.get('type'); document.getElementById('pf-type').value = state.type; }
    if (q.get('beds')){ state.beds = +q.get('beds'); document.getElementById('pf-beds').value = String(state.beds); }
  } catch (e) {}

  render();
})();
</script>
</body>
</html>
