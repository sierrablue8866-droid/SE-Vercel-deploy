<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Compounds · Sierra Estates</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500&family=Cairo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>
<script src="data.js"></script>
<script src="shared.js"></script>
<style>
.page-hero{background:var(--navy);color:#fff;padding:56px 0 40px;position:relative;overflow:hidden;}
[data-theme="dark"] .page-hero{background:linear-gradient(135deg,#0b0d10,#141109);border-bottom:1px solid rgba(200,150,26,.2);}
.page-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(700px 340px at 88% -10%,rgba(0,174,255,.22),transparent 60%);pointer-events:none;}
[data-theme="dark"] .page-hero::before{background:radial-gradient(700px 340px at 88% -10%,rgba(200,150,26,.16),transparent 60%);}
.page-hero .wrap{position:relative;z-index:2;}
.page-hero .crumb{font-family:var(--mono);text-transform:uppercase;letter-spacing:.2em;font-size:11px;color:#8fe1ff;margin-bottom:14px;display:flex;gap:8px;align-items:center;}
[data-theme="dark"] .page-hero .crumb{color:#e9c176;}
.page-hero .crumb a{color:inherit;opacity:.85;}
.page-hero h1{color:#fff;font-family:var(--display);font-size:48px;font-weight:700;letter-spacing:-.02em;line-height:1.05;}
.page-hero p{color:rgba(255,255,255,.78);font-size:16px;margin-top:12px;max-width:560px;line-height:1.6;}

.grid-comp{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;}
.comp{position:relative;height:290px;border-radius:var(--r-card);overflow:hidden;cursor:pointer;display:block;border:1px solid var(--line);transition:.28s var(--silk);}
.comp:hover{transform:translateY(-4px);box-shadow:var(--shadow-m);}
.comp img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--silk);}
.comp:hover img{transform:scale(1.06);}
.comp .co-scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,25,45,0) 30%,rgba(0,25,45,.85) 100%);z-index:2;pointer-events:none;}
.comp .co-body{position:absolute;inset-inline-start:18px;inset-inline-end:18px;bottom:16px;z-index:3;color:#fff;pointer-events:none;}
.comp .co-body h4{color:#fff;font-size:19px;margin-bottom:3px;}
.comp .co-body span{font-family:var(--mono);font-size:12px;color:#bfeaff;letter-spacing:.04em;}
[data-theme="dark"] .comp .co-body span{color:#e9c176;}
.comp .co-count{position:absolute;top:14px;inset-inline-end:14px;z-index:3;background:rgba(255,255,255,.92);color:var(--navy);font-family:var(--mono);font-weight:700;font-size:12px;padding:5px 10px;border-radius:20px;}
.comp .co-view{position:absolute;top:14px;inset-inline-start:14px;z-index:3;display:flex;align-items:center;gap:6px;background:var(--pri);color:#fff;font-size:12px;font-weight:700;padding:6px 12px;border-radius:20px;opacity:0;transform:translateY(-6px);transition:.25s var(--silk);}
[data-theme="dark"] .comp .co-view{color:#0d0d0f;}
.comp:hover .co-view{opacity:1;transform:none;}
@media(max-width:1100px){.grid-comp{grid-template-columns:repeat(3,1fr);}}
@media(max-width:760px){.grid-comp{grid-template-columns:repeat(2,1fr);}}
@media(max-width:680px){.page-hero h1{font-size:34px;}}
@media(max-width:460px){.grid-comp{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="site-chrome"></div>

<header class="page-hero" data-screen-label="Compounds header">
  <div class="wrap">
    <div class="crumb"><a href="index.html">Home</a> <span>/</span> <span>Compounds</span></div>
    <h1>New Cairo's finest compounds</h1>
    <p>Explore the most sought-after gated communities, ranked by Sierra's AI. Tap any compound to open it on the live map.</p>
  </div>
</header>

<section class="block" style="padding-top:36px;" data-screen-label="Compounds grid">
  <div class="wrap">
    <div class="grid-comp" id="comp-grid"></div>
  </div>
</section>

<footer id="site-footer" data-screen-label="Footer"></footer>

<script>
(function () {
  var D = window.HZDATA, HZ = window.HZ;
  document.getElementById('comp-grid').innerHTML = D.compounds.map(function (c, i) {
    var img = D.compoundImgs[c.n] || '';
    return '<a class="comp rv d' + ((i % 4) + 1) + '" href="map.html">' +
      '<img src="' + img + '" alt="' + c.n + '" loading="lazy"/>' +
      '<div class="co-scrim"></div>' +
      '<div class="co-view"><i data-lucide="map-pin" class="i" style="width:14px;height:14px"></i> View on map</div>' +
      '<div class="co-count">AI ' + c.ai.toFixed(1) + ' · ' + c.g + '</div>' +
      '<div class="co-body"><h4>' + c.n + '</h4><span>' + c.z + ' · EGP ' + c.priceM + 'M avg</span></div></a>';
  }).join('');

  HZ.mount('compounds');
  if (window.lucide) lucide.createIcons();
  HZ.reveal();
})();
</script>
</body>
</html>
