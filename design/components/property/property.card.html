<!-- @dsCard group="Components" viewport="700x470" name="Property — Listing Card & Stats" subtitle="The signature PropertyCard + headline StatBlock" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 26px 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { PropertyCard, StatBlock } = window.SierraEstatesDesignSystem_210542;
    function Demo() {
      const [saved, setSaved] = React.useState(false);
      return (
        <div className="grid">
          <PropertyCard
            image="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1200&q=85"
            code="MV-VL-02" title="Villa Lumière"
            location="Mountain View · 5th Settlement"
            price="EGP 14.2M" badge="Featured" badgeColor="#C8961A"
            aiScore={9.6} beds={5} baths={4} area={480}
            saved={saved} onSave={setSaved} />
          <div style={{display:'flex',flexDirection:'column',gap:22}}>
            <PropertyCard
              image="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1200&q=85"
              code="MVD-DX-05" title="Mivida Duplex Suite"
              location="Mivida · 5th Settlement"
              price="EGP 850K/yr" badge="Premium Rental" badgeColor="#E63946"
              aiScore={8.9} beds={3} baths={3} area={280} />
            <StatBlock columns={2} stats={[
              {value:'1,500+',label:'Live listings'},
              {value:'19',label:'Compounds'},
              {value:'9.6',label:'Avg AI score'},
              {value:'24/7',label:'Sierra concierge'},
            ]} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
