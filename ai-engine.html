/* ── HOOKS ── */
function useInView(threshold=0.15){
  const ref=useRef(null);const[vis,setVis]=useState(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVis(true);obs.disconnect();}},{threshold});
    if(ref.current)obs.observe(ref.current);return()=>obs.disconnect();
  },[]);
  return[ref,vis];
}

/* ── AVM CHART ── */
function AVMChart(){
  const[ref,vis]=useInView();
  const W=500,H=220,PAD={t:20,r:20,b:40,l:50};
  const maxV=Math.max(...PRICE_DATA.map(d=>d.v))*1.1;
  const pts=PRICE_DATA.map((d,i)=>{
    const x=PAD.l+(i/(PRICE_DATA.length-1))*(W-PAD.l-PAD.r);
    const y=H-PAD.b-((d.v/maxV)*(H-PAD.t-PAD.b));
    return{x,y,...d};
  });
  const pathD=`M ${pts.map(p=>`${p.x},${p.y}`).join(' L ')}`;
  const fillD=`M ${pts[0].x},${H-PAD.b} L ${pts.map(p=>`${p.x},${p.y}`).join(' L ')} L ${pts[pts.length-1].x},${H-PAD.b} Z`;
  const[hover,setHover]=useState(null);
  return(
    <div ref={ref} style={{opacity:vis?1:0,transform:vis?'none':'translateY(24px)',transition:'all .7s .1s cubic-bezier(.16,1,.3,1)'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
        <div style={{width:8,height:8,borderRadius:'50%',background:G,animation:'pulse 2s ease infinite'}}/>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:'.18em',color:'rgba(240,237,229,.45)',textTransform:'uppercase'}}>AVM PREDICTIVE PRICING ENGINE</span>
        <span style={{marginLeft:'auto',padding:'2px 8px',borderRadius:4,background:'rgba(52,211,153,.12)',border:'1px solid rgba(52,211,153,.25)',fontFamily:"'JetBrains Mono',monospace",fontSize:8,fontWeight:700,color:'#34d399'}}>LIVE</span>
      </div>
      <div style={{fontSize:11,color:'rgba(240,237,229,.35)',marginBottom:16,fontFamily:'Inter'}}>Avg compound price · EGP millions · 2020–2026</div>
      <div style={{position:'relative'}}>
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
          <defs>
            <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={G} stopOpacity=".25"/>
              <stop offset="100%" stopColor={G} stopOpacity="0"/>
            </linearGradient>
            <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stopColor={GL}/>
              <stop offset="100%" stopColor={G}/>
            </linearGradient>
          </defs>
          {/* Grid lines */}
          {[0,.25,.5,.75,1].map((t,i)=>{
            const y=PAD.t+(1-t)*(H-PAD.t-PAD.b);
            return(<g key={i}>
              <line x1={PAD.l} y1={y} x2={W-PAD.r} y2={y} stroke="rgba(255,255,255,.04)" strokeWidth="1"/>
              <text x={PAD.l-6} y={y+4} fill="rgba(240,237,229,.25)" fontSize="9" textAnchor="end" fontFamily="JetBrains Mono, monospace">{(maxV*t).toFixed(0)}</text>
            </g>);
          })}
          {/* Fill */}
          {vis&&<path d={fillD} fill="url(#fillGrad)"/>}
          {/* Line */}
          {vis&&<path d={pathD} fill="none" stroke="url(#lineGrad)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="1000" strokeDashoffset="0" style={{animation:'lineGrow 1.5s .3s cubic-bezier(.16,1,.3,1) both'}}/>}
          {/* Dots */}
          {pts.map((p,i)=>(
            <g key={i} style={{cursor:'pointer'}} onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)}>
              <circle cx={p.x} cy={p.y} r={hover===i?7:5} fill={G} stroke="rgba(9,9,15,.8)" strokeWidth="2" style={{transition:'r .2s',animation:`dotAppear .5s ${.3+i*.12}s both`}}/>
              {hover===i&&(
                <g>
                  <rect x={p.x-36} y={p.y-38} width="72" height="28" rx="6" fill="rgba(9,9,15,.95)" stroke="rgba(200,150,26,.35)" strokeWidth="1"/>
                  <text x={p.x} y={p.y-20} fill={G} fontSize="10" fontWeight="700" textAnchor="middle" fontFamily="JetBrains Mono, monospace">{p.label}</text>
                  <text x={p.x} y={p.y-10} fill="rgba(240,237,229,.45)" fontSize="8" textAnchor="middle" fontFamily="Inter">{p.y_}</text>
                </g>
              )}
              <text x={p.x} y={H-8} fill="rgba(240,237,229,.3)" fontSize="9" textAnchor="middle" fontFamily="JetBrains Mono, monospace">{p.y}</text>
            </g>
          ))}
        </svg>
      </div>
      {/* Compound snapshots */}
      <div style={{display:'flex',gap:8,marginTop:16}}>
        {COMPOUND_PRICES.slice(0,3).map((c,i)=>(
          <div key={i} style={{flex:1,padding:'10px 12px',borderRadius:10,background:'rgba(255,255,255,.04)',border:'1px solid rgba(200,150,26,.12)'}}>
            <div style={{fontFamily:'Inter',fontSize:10,color:'rgba(240,237,229,.45)',marginBottom:4}}>{c.name}</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:G}}>{c.price}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

        <p style={{fontSize:11,color:'rgba(240,237,229,.6)',lineHeight:1.6,fontFamily:'Inter'}}>Strong buy signals across 5th Settlement corridors. Avg 22% YoY growth projected. Hyde Park and Uptown Cairo outperforming baseline by 2.4σ.</p>
      </div>
    </div>
  );
}
